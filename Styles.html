  background: linear-gradient(135deg, rgba(15,23,42,0.95) 0%, rgba(30,41,59,0.9) 100%);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  flex-wrap: wrap;
}
.mgmt-header h2 {
  margin: 4px 0 6px;
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: #f8fafc;
}
.mgmt-header-meta {
  font-size: 12px;
  color: var(--muted);
  margin: 0;
  opacity: 0.7;
}

/* ── Live badge ─────────────────────────────────────────────── */
.mgmt-live-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 6px 14px;
  border-radius: 999px;
  background: rgba(34,197,94,0.12);
  border: 1px solid rgba(34,197,94,0.3);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #4ade80;
  white-space: nowrap;
  align-self: flex-start;
  margin-top: 4px;
}
.mgmt-live-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #4ade80;
  animation: mgmt-pulse 1.8s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes mgmt-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.4; transform: scale(0.75); }
}

/* ── KPI strip ──────────────────────────────────────────────── */
.mgmt-kpi-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
}
.mgmt-kpi-card {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 20px 18px 18px;
  background: rgba(15,23,42,0.7);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  border-left: 3px solid rgba(255,255,255,0.1);
  transition: border-left-color 0.2s;
}
.mgmt-kpi-card.signal-good { border-left-color: #4ade80; }
.mgmt-kpi-card.signal-mid  { border-left-color: #fbbf24; }
.mgmt-kpi-card.signal-low  { border-left-color: #f87171; }
.mgmt-kpi-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  opacity: 0.7;
}
.mgmt-kpi-value {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -1px;
  color: #f8fafc;
  line-height: 1.1;
}
.mgmt-kpi-sub {
  font-size: 11px;
  color: var(--muted);
  opacity: 0.5;
}

/* ── Two-column layout ──────────────────────────────────────── */
.mgmt-two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

/* ── Section card ───────────────────────────────────────────── */
.mgmt-section {
  background: rgba(15,23,42,0.7);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  padding: 24px 22px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-width: 0;
}

/* ── Section head ───────────────────────────────────────────── */
.mgmt-section-head {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.mgmt-section-head .eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--accent, #38bdf8);
  opacity: 0.8;
  margin: 0;
}
.mgmt-section-head h3 {
  margin: 0;
  font-size: 16px;
  font-weight: 700;
  color: #f1f5f9;
}

/* ── Subsection label & count badge ────────────────────────── */
.mgmt-subsection-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  opacity: 0.65;
  display: flex;
  align-items: center;
  gap: 8px;
}
.mgmt-count-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 999px;
  background: rgba(255,255,255,0.07);
  color: #94a3b8;
  text-transform: none;
  letter-spacing: 0;
}

/* ── Rating list ────────────────────────────────────────────── */
.mgmt-rating-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.mgmt-rating-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: rgba(255,255,255,0.03);
  border-radius: 8px;
  flex-wrap: wrap;
}
.mgmt-rating-stars {
  font-size: 13px;
  letter-spacing: 1px;
  flex-shrink: 0;
}
.mgmt-rating-id {
  font-size: 11px;
  color: #94a3b8;
  font-family: 'Courier New', monospace;
  flex: 1;
  min-width: 60px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.mgmt-rating-score {
  font-size: 13px;
  font-weight: 700;
  color: #f8fafc;
  white-space: nowrap;
}
.mgmt-rating-count {
  font-size: 10px;
  color: var(--muted);
  opacity: 0.6;
  white-space: nowrap;
}

/* ── Comment cards ──────────────────────────────────────────── */
.mgmt-comment-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.mgmt-comment-card {
  padding: 14px 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.mgmt-comment-stars {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: #fbbf24;
}
.mgmt-comment-stars span {
  font-size: 11px;
  color: #94a3b8;
}
.mgmt-comment-text {
  font-size: 13px;
  color: #cbd5e1;
  line-height: 1.55;
  margin: 0;
  font-style: italic;
}
.mgmt-comment-meta {
  font-size: 10px;
  color: var(--muted);
  opacity: 0.5;
}

/* ── Quote grid (student voice) ─────────────────────────────── */
.mgmt-quote-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.mgmt-quote-card {
  padding: 16px 18px 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-left: 3px solid var(--accent, #38bdf8);
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  font-size: 13px;
  color: #cbd5e1;
  line-height: 1.55;
  font-style: italic;
}
.mgmt-quote-mark {
  font-size: 32px;
  line-height: 1;
  color: var(--accent, #38bdf8);
  opacity: 0.35;
  font-style: normal;
  align-self: flex-start;
  margin-bottom: -10px;
}

/* ── Empty state ────────────────────────────────────────────── */
.mgmt-empty-state {
  font-size: 12px;
  color: var(--muted);
  opacity: 0.45;
  text-align: center;
  padding: 20px 0;
  margin: 0;
}

/* ── Feedback bar label ─────────────────────────────────────── */
.fb-label {
  font-size: 11px;
  font-weight: 600;
  color: #94a3b8;
  width: 34px;
  flex-shrink: 0;
}

/* ── Table cell helpers ─────────────────────────────────────── */
.td-mono {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: #94a3b8;
}
.td-num {
  font-variant-numeric: tabular-nums;
  font-weight: 600;
  text-align: right;
  color: #f1f5f9;
}
.td-muted {
  font-size: 11px;
  color: var(--muted);
  opacity: 0.55;
}
.td-empty {
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  opacity: 0.4;
  padding: 16px 0;
}

/* ── Responsive: stack two-col at ≤768px ────────────────────── */
@media (max-width: 768px) {
  .admin-analytics-shell {
    padding: 16px 12px 40px;
    gap: 14px;
  }
  .mgmt-header {
    padding: 20px 18px;
  }
  .mgmt-header h2 {
    font-size: 20px;
  }
  .mgmt-two-col {
    grid-template-columns: 1fr;
  }
  .mgmt-kpi-strip {
    grid-template-columns: repeat(2, 1fr);
  }
  .mgmt-kpi-value {
    font-size: 22px;
  }
  .mgmt-quote-grid {
    grid-template-columns: 1fr;
  }
}

/* ═══════════════════════════════════════════════════════════════
   SCENARIO PERFORMANCE PANEL  (sc-* system)
   ═══════════════════════════════════════════════════════════════ */

.sc-perf-panel {
  gap: 18px;
}

/* ── Mini KPI strip ─────────────────────────────────────────── */
.sc-perf-kpis {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.sc-kpi {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 12px 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  flex: 1;
  min-width: 90px;
}
.sc-kpi-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  opacity: 0.6;
}
.sc-kpi-value {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: #f1f5f9;
}
.sc-kpi-value.sig-good { color: #4ade80; }
.sc-kpi-value.sig-mid  { color: #fbbf24; }
.sc-kpi-value.sig-low  { color: #f87171; }

/* ── Two-col body ───────────────────────────────────────────── */
.sc-perf-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* ── Score band bars ────────────────────────────────────────── */
.sc-band-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 8px;
}
.sc-band-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.sc-band-label {
  font-size: 10px;
  font-weight: 600;
  width: 88px;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.sc-band-label.excellent { color: #4ade80; }
.sc-band-label.good      { color: #86efac; }
.sc-band-label.fair      { color: #fbbf24; }
.sc-band-label.poor      { color: #f87171; }
.sc-band-track {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 999px;
  overflow: hidden;
}
.sc-band-fill {
  height: 100%;
  border-radius: 999px;
  transition: width 0.4s ease;
}
.sc-band-fill.excellent { background: #4ade80; }
.sc-band-fill.good      { background: #86efac; }
.sc-band-fill.fair      { background: #fbbf24; }
.sc-band-fill.poor      { background: #f87171; }
.sc-band-n {
  font-size: 11px;
  font-weight: 700;
  color: #94a3b8;
  width: 24px;
  text-align: right;
  flex-shrink: 0;
}

/* ── Missed keywords ────────────────────────────────────────── */
.sc-missed-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 8px;
}
.sc-missed-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 10px;
  background: rgba(248,113,113,0.06);
  border: 1px solid rgba(248,113,113,0.12);
  border-radius: 7px;
  gap: 8px;
}
.sc-missed-kw {
  font-size: 12px;
  font-weight: 600;
  color: #fca5a5;
  font-family: 'Courier New', monospace;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.sc-missed-count {
  font-size: 11px;
  font-weight: 700;
  color: #f87171;
  flex-shrink: 0;
}

/* ── Responsive ─────────────────────────────────────────────── */
@media (max-width: 768px) {
  .sc-perf-body {
    grid-template-columns: 1fr;
  }
  .sc-perf-kpis {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* ═══════════════════════════════════════════════════════════════
   ENTERPRISE DASHBOARD  (ent-* system — B2B only)
   ═══════════════════════════════════════════════════════════════ */

/* ── Shell & header ─────────────────────────────────────────── */
.ent-shell {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 24px 20px 48px;
  max-width: 1200px;
  margin: 0 auto;
}
.ent-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  padding: 28px 32px;
  background: linear-gradient(135deg, rgba(15,23,42,0.95) 0%, rgba(30,41,59,0.9) 100%);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.ent-header h2 {
  margin: 4px 0 6px;
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: #f8fafc;
}
.ent-sub-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  opacity: 0.55;
  margin: 16px 0 6px;
  padding-left: 2px;
}

/* ── Scorecard row ──────────────────────────────────────────── */
.ent-scorecard-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.ent-scorecard {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 20px 18px;
  background: rgba(15,23,42,0.7);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  border-left: 3px solid rgba(255,255,255,0.1);
}
.ent-scorecard.ent-sig-good { border-left-color: #4ade80; }
.ent-scorecard.ent-sig-mid  { border-left-color: #fbbf24; }
.ent-scorecard.ent-sig-low  { border-left-color: #f87171; }
.ent-sc-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  opacity: 0.65;
}
.ent-sc-value {
  font-size: 30px;
  font-weight: 800;
  letter-spacing: -1px;
  color: #f8fafc;
  line-height: 1.1;
}
.ent-sc-sub {
  font-size: 11px;
  color: var(--muted);
  opacity: 0.5;
}

/* ── Performance middle row ─────────────────────────────────── */
.ent-middle-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.ent-chart-section {
  background: rgba(15,23,42,0.7);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  padding: 22px 20px 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-width: 0;
}

/* Pass/Fail bars */
.ent-passfail-bars { display: flex; flex-direction: column; gap: 10px; }
.ent-pf-row { display: flex; align-items: center; gap: 10px; }
.ent-pf-label { font-size: 11px; font-weight: 700; width: 30px; flex-shrink: 0; }
.ent-pf-label.pass { color: #4ade80; }
.ent-pf-label.fail { color: #f87171; }
.ent-pf-track { flex: 1; height: 8px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; }
.ent-pf-fill { height: 100%; border-radius: 999px; transition: width 0.5s ease; }
.ent-pf-fill.pass { background: #4ade80; }
.ent-pf-fill.fail { background: #f87171; }
.ent-pf-pct { font-size: 12px; font-weight: 700; color: #f1f5f9; width: 36px; text-align: right; flex-shrink: 0; }

/* Velocity display */
.ent-vel-display {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 16px 0 4px;
}
.ent-vel-num {
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -1px;
  color: #f8fafc;
}
.ent-vel-unit { font-size: 12px; color: var(--muted); opacity: 0.6; }
.ent-vel-display.ent-sig-good .ent-vel-num { color: #4ade80; }
.ent-vel-display.ent-sig-mid  .ent-vel-num { color: #fbbf24; }
.ent-vel-display.ent-sig-low  .ent-vel-num { color: #f87171; }

/* Phase 2 metrics strip */
.ent-perf-phase2 {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  padding: 12px 0 0;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.ent-p2-item { display: flex; flex-direction: column; gap: 2px; }
.ent-p2-item span { font-size: 10px; color: var(--muted); opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
.ent-p2-item strong { font-size: 16px; font-weight: 700; color: #f1f5f9; }

.ent-data-src { font-size: 10px; color: var(--muted); opacity: 0.4; margin: 0; }

/* ── Risk section ───────────────────────────────────────────── */
.ent-risk-section { display: flex; flex-direction: column; gap: 14px; }

/* Alert cards */
.ent-risk-alerts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.ent-alert-card {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 16px 18px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
}
.ent-alert-card.ent-alert-red   { border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.05); }
.ent-alert-card.ent-alert-amber { border-color: rgba(251,191,36,0.3);  background: rgba(251,191,36,0.05); }
.ent-alert-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
.ent-alert-num  { font-size: 22px; font-weight: 800; color: #f8fafc; }
.ent-alert-label { font-size: 13px; color: #94a3b8; }
.ent-alert-sub  { font-size: 10px; color: var(--muted); opacity: 0.55; margin-top: 4px; display: block; }

/* Bottom 3-col risk tables */
.ent-bottom-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.ent-risk-col {
  background: rgba(15,23,42,0.7);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  padding: 20px 18px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-width: 0;
}

/* Signal helpers */
.ent-sig-good { color: #4ade80 !important; }
.ent-sig-mid  { color: #fbbf24 !important; }
.ent-sig-low  { color: #f87171 !important; }

/* ── Skeleton loader ────────────────────────────────────────── */
.ent-skeleton {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 32px 20px;
  background: rgba(15,23,42,0.5);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 14px;
}
.ent-skel-bar {
  height: 10px;
  border-radius: 6px;
  background: rgba(255,255,255,0.06);
  animation: shimmer 1.4s infinite linear;
  max-width: 400px;
  width: 100%;
}
.ent-skel-bar.w80 { width: 80%; }
.ent-skel-bar.w60 { width: 60%; }
.ent-skel-bar.w45 { width: 45%; }
.ent-skel-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  opacity: 0.4;
  margin: 4px 0 0;
}

/* ── Responsive ─────────────────────────────────────────────── */
@media (max-width: 900px) {
  .ent-bottom-row { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 768px) {
  .ent-shell { padding: 16px 12px 40px; }
  .ent-header { padding: 20px 18px; }
  .ent-header h2 { font-size: 18px; }
  .ent-scorecard-row { grid-template-columns: 1fr 1fr; }
  .ent-middle-row { grid-template-columns: 1fr; }
  .ent-risk-alerts { grid-template-columns: 1fr; }
  .ent-bottom-row { grid-template-columns: 1fr; }
}

/* ── Category tab navigation ──────────────────────────────────── */
.cat-tab-nav {
  display: flex;
  gap: 2px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  margin: 0 0 28px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.cat-tab-nav::-webkit-scrollbar { display: none; }
.cat-tab-btn {
  flex-shrink: 0;
  padding: 10px 20px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: #64748b;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.2px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap;
  margin-bottom: -1px;
}
.cat-tab-btn:hover { color: #cbd5e1; }
.cat-tab-btn.active {
  color: #e2e8f0;
  border-bottom-color: #6366f1;
}
.cat-pane {
  animation: catFadeIn 0.15s ease;
}
@keyframes catFadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0);   }
}
.ent-cat-section {
  margin-bottom: 28px;
}
.psy-callout {
  background: rgba(99,102,241,0.04);
  border: 1px solid rgba(99,102,241,0.12);
  border-radius: 10px;
  padding: 20px 22px;
}
.psy-callout p { color: #94a3b8; font-size: 13px; line-height: 1.6; margin: 0; }
.psy-callout strong { color: #e2e8f0; }
@media (max-width: 640px) {
  .cat-tab-btn { padding: 9px 14px; font-size: 12px; }
}

/* ── Simulator subtab strip ───────────────────────────────────── */
.sim-subtab-strip {
  display: flex;
  gap: 6px;
  margin-bottom: 24px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  padding-bottom: 12px;
}
.sim-subtab-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 8px;
  color: #6b8aad;
  font-size: 13px;
  font-weight: 600;
  padding: 8px 18px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.sim-subtab-btn:hover { background: rgba(255,255,255,0.05); color: #dde6f0; }
.sim-subtab-btn.active {
  background: rgba(0,212,142,0.1);
  border-color: rgba(0,212,142,0.4);
  color: #00d48e;
  font-weight: 700;
}

/* ── LMS module hub cards ─────────────────────────────────────── */
.lms-module-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}
.lms-module-card {
  background: rgba(15,23,42,0.7);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  padding: 24px 22px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  transition: border-color 0.18s, transform 0.15s;
}
.lms-module-card:hover { border-color: rgba(0,212,142,0.3); transform: translateY(-2px); }
.lms-module-card--soon { opacity: 0.55; pointer-events: none; }
.lms-module-icon { font-size: 28px; line-height: 1; }
.lms-module-body { flex: 1; }
.lms-module-title { margin: 0 0 6px; font-size: 15px; font-weight: 700; color: #f0f6ff; }
.lms-module-desc  { margin: 0; font-size: 13px; color: #6b8aad; line-height: 1.55; }
.lms-module-footer { display: flex; align-items: center; }
.lms-coming-soon {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #6b8aad;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 6px;
  padding: 5px 10px;
}

/* ── LMS matching game ────────────────────────────────────────── */
.lms-columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
@media (max-width: 600px) { .lms-columns { grid-template-columns: 1fr; } }
.lms-col-label {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #6b8aad;
  margin-bottom: 10px;
}
.lms-card {
  background: rgba(13,21,32,0.8);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 13px 16px;
  font-size: 13px;
  line-height: 1.5;
  cursor: pointer;
  margin-bottom: 9px;
  user-select: none;
  transition: border-color 0.15s, background 0.15s, transform 0.12s;
  position: relative;
}
.lms-card:hover:not(.lms-card--matched):not(.lms-card--selected) {
  border-color: rgba(255,255,255,0.18);
  background: rgba(19,34,64,0.9);
  transform: translateY(-1px);
}
.lms-card--selected { border-color: #00d48e; background: rgba(0,212,142,0.1); box-shadow: 0 0 0 1px #00d48e; }
.lms-card--matched  { border-color: #00d48e; background: rgba(0,212,142,0.08); opacity: 0.65; pointer-events: none; }
.lms-card--matched::after { content: '✓'; position: absolute; right: 13px; top: 50%; transform: translateY(-50%); color: #00d48e; font-weight: 800; }
.lms-card--wrong    { border-color: #ef4444; background: rgba(239,68,68,0.1); animation: lmsShake 0.35s ease; }
@keyframes lmsShake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-5px); }
  40%     { transform: translateX(5px); }
  60%     { transform: translateX(-3px); }
  80%     { transform: translateX(3px); }
}

/* ── Non-Routine drag layout ─────────────────────────────────── */
.nr-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 20px;
  align-items: start;
}
@media (max-width: 700px) { .nr-layout { grid-template-columns: 1fr; } }
.nr-pool-panel {
  background: rgba(15,23,42,0.7);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  padding: 18px 16px;
  position: sticky;
  top: 20px;
}
.nr-zones {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
  gap: 14px;
}
.nr-zone {
  background: rgba(15,23,42,0.6);
  border: 2px dashed rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 18px 16px;
  min-height: 200px;
  display: flex;
  flex-direction: column;
  transition: border-color 0.2s, background 0.2s;
}
.nr-zone.drag-over  { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.04); }
.nr-zone.drop-accept{ border-color: #00d48e; background: rgba(0,212,142,0.08); }
.nr-zone.drop-reject{ border-color: #ef4444; background: rgba(239,68,68,0.08); }

.lms-card-idx {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 10px;
  font-weight: 700;
  color: #6b8aad;
  margin-right: 9px;
  vertical-align: middle;
  flex-shrink: 0;
}
.lms-card--selected .lms-card-idx,
.lms-card--matched  .lms-card-idx { background: #00d48e; border-color: #00d48e; color: #07101e; }

.lms-card--img-term {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px 16px;
  background: #000000;
  border-color: rgba(255,255,255,0.12);
}
.lms-card--img-term:hover:not(.lms-card--matched):not(.lms-card--selected) {
  background: #111111;
}
.lms-card--img-term.lms-card--selected { background: #000000; }
.lms-card--img-term.lms-card--matched  { background: rgba(0,212,142,0.12); }
.lms-term-img {
  width: 120px;
  height: 88px;
  border-radius: 4px;
  object-fit: contain;
  flex-shrink: 0;
}
.lms-term-label {
  font-size: 13px;
  color: #dde6f0;
  line-height: 1.4;
}

/* ── Human Factors Module (inline) ─────────────────────────────────── */
.hf-concept-card {
  background: #0d1b2e;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.18s;
  margin-bottom: 10px;
}
.hf-concept-card:hover   { border-color: rgba(168,85,247,0.3); }
.hf-concept-card.playing { border-color: #a855f7; box-shadow: 0 0 0 1px rgba(168,85,247,0.35); }

.hf-concept-main {
  display: flex; align-items: center; gap: 14px; padding: 16px 18px;
}
.hf-concept-index {
  width: 28px; height: 28px; border-radius: 7px;
  background: rgba(168,85,247,0.10);
  border: 1px solid rgba(168,85,247,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; color: #a855f7;
  flex-shrink: 0;
}
.hf-concept-text  { flex: 1; min-width: 0; }
.hf-concept-name  { font-size: 14px; font-weight: 700; color: #f0f6ff; margin-bottom: 3px; line-height: 1.3; }
.hf-concept-desc  { font-size: 12.5px; color: #6b8aad; line-height: 1.55; }

.hf-play-btn {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 7px;
  background: rgba(168,85,247,0.10);
  border: 1px solid rgba(168,85,247,0.25);
  border-radius: 8px; padding: 9px 14px;
  font-size: 12px; font-weight: 700; color: #a855f7;
  cursor: pointer; white-space: nowrap;
  transition: background 0.15s, border-color 0.15s, opacity 0.15s;
}
.hf-play-btn:hover:not(:disabled) { background: rgba(168,85,247,0.18); border-color: rgba(168,85,247,0.5); }
.hf-play-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.hf-play-btn.loading  { color: #6b8aad; border-color: rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); }
.hf-play-btn.playing  { color: #00d48e; border-color: rgba(0,212,142,0.4); background: rgba(0,212,142,0.10); }

.hf-wave-bars { display: none; align-items: flex-end; gap: 2px; height: 14px; }
.hf-wave-bars.active { display: flex; }
.hf-wave-bar {
  width: 3px; border-radius: 2px; background: #00d48e;
  animation: hfWavePulse 0.6s ease-in-out infinite alternate;
}
.hf-wave-bar:nth-child(1) { height: 5px;  animation-delay: 0s;    }
.hf-wave-bar:nth-child(2) { height: 10px; animation-delay: 0.1s;  }
.hf-wave-bar:nth-child(3) { height: 14px; animation-delay: 0.2s;  }
.hf-wave-bar:nth-child(4) { height: 8px;  animation-delay: 0.15s; }
.hf-wave-bar:nth-child(5) { height: 5px;  animation-delay: 0.05s; }
@keyframes hfWavePulse {
  from { opacity: 0.4; transform: scaleY(0.5); }
  to   { opacity: 1;   transform: scaleY(1);   }
}

.hf-concept-loader {
  height: 2px;
  background: linear-gradient(90deg, #a855f7, #00d48e);
  border-radius: 0 0 12px 12px;
  display: none;
  animation: hfLoaderSlide 1.4s ease-in-out infinite;
}
.hf-concept-loader.active { display: block; }
@keyframes hfLoaderSlide {
  0%   { transform: translateX(-100%); opacity: 0.6; }
  50%  { transform: translateX(0%);    opacity: 1;   }
  100% { transform: translateX(100%);  opacity: 0.6; }
}

.hf-search-input {
  width: 100%; background: #0d1b2e;
  border: 1px solid rgba(255,255,255,0.08); border-radius: 9px;
  padding: 11px 14px 11px 38px;
  font-size: 13px; color: #dde6f0; outline: none;
  transition: border-color 0.15s;
}
.hf-search-input::placeholder { color: #6b8aad; }
.hf-search-input:focus { border-color: rgba(168,85,247,0.5); }

.hf-spinner {
  width: 28px; height: 28px;
  border: 2px solid rgba(255,255,255,0.08); border-top-color: #a855f7;
  border-radius: 50%;
  animation: hfSpin 0.8s linear infinite;
  margin: 0 auto 14px;
}
@keyframes hfSpin { to { transform: rotate(360deg); } }

/* ── First Flight ────────────────────────────────────────────────────────── */
.ff-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  animation: ffFadeIn 0.35s ease;
}
.ff-overlay.ff-fade-out { animation: ffFadeOut 0.3s ease forwards; }
@keyframes ffFadeIn  { from { opacity:0; } to { opacity:1; } }
@keyframes ffFadeOut { from { opacity:1; } to { opacity:0; } }

.ff-card {
  background: #111;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  width: 100%; max-width: 480px;
  overflow: hidden; position: relative;
}

/* ── Briefing ── */
.ff-card-briefing { min-height: 460px; }
.ff-radar-bg {
  position: absolute; inset: 0; overflow: hidden;
  pointer-events: none; opacity: 0.07;
}
.ff-radar-bg::before, .ff-radar-bg::after {
  content: ''; position: absolute; border-radius: 50%;
  border: 2px solid #00d48e;
  left: 50%; transform: translateX(-50%);
}
.ff-radar-bg::before {
  top: -55%; width: 620px; height: 620px;
  animation: ffRadar 3s ease-in-out infinite;
}
.ff-radar-bg::after {
  top: -35%; width: 420px; height: 420px;
  border-width: 1px;
  animation: ffRadar 3s ease-in-out 1s infinite;
}
@keyframes ffRadar {
  0%,100% { transform:translateX(-50%) scale(1); opacity:.8; }
  50%      { transform:translateX(-50%) scale(1.1); opacity:.25; }
}
.ff-briefing-content {
  position: relative; z-index: 1;
  padding: 40px 36px;
  display: flex; flex-direction: column; align-items: center; text-align: center;
}
.ff-mission-tag {
  font-size: 0.67rem; font-weight: 700; letter-spacing: 0.13em;
  color: #00d48e;
  background: rgba(0,212,142,0.1);
  border: 1px solid rgba(0,212,142,0.3);
  border-radius: 20px; padding: 4px 14px; margin-bottom: 20px;
}
.ff-title {
  font-size: 2.1rem; font-weight: 800; color: #fff;
  margin: 0 0 10px; letter-spacing: -0.02em;
}
.ff-subtitle {
  color: #8a929c; font-size: 0.93rem; line-height: 1.6;
  margin: 0 0 28px; max-width: 340px;
}
.ff-checklist {
  width: 100%; display: flex; flex-direction: column;
  gap: 10px; margin-bottom: 30px;
}
.ff-check-item {
  display: flex; align-items: center; gap: 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px; padding: 12px 16px;
  font-size: 0.9rem; color: #dde4ef; text-align: left;
}
.ff-check-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(0,212,142,0.12);
  border: 1px solid rgba(0,212,142,0.35);
  color: #00d48e; font-weight: 700; font-size: 0.8rem;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.ff-cta-btn {
  width: 100%; padding: 15px;
  font-size: 1rem; font-weight: 700;
  margin-bottom: 14px; border-radius: 12px;
}
.ff-skip-btn {
  background: none; border: none;
  color: #4a5058; font-size: 0.81rem; cursor: pointer; padding: 4px;
}
.ff-skip-btn:hover { color: #6e7a88; }

/* ── Guided ── */
.ff-card-guided { padding: 28px; }
.ff-guided-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 22px;
}
.ff-country-flag { font-size: 0.82rem; color: #6e7a88; }
.ff-sim-area { display: flex; flex-direction: column; gap: 14px; margin-bottom: 18px; }
.ff-play-area { text-align: center; }
.ff-play-btn {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 12px; color: #fff;
  padding: 13px 24px; font-size: 0.93rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.ff-play-btn:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.3); }
.ff-play-btn.ff-playing { color: #00d48e; border-color: rgba(0,212,142,0.5); background: rgba(0,212,142,0.07); }
.ff-play-icon {
  width: 0; height: 0; border-style: solid;
  border-width: 6px 0 6px 12px;
  border-color: transparent transparent transparent currentColor;
  display: inline-block;
}
.ff-play-status {
  margin: 8px 0 0; font-size: 0.79rem; color: #6e7a88;
  font-style: italic; min-height: 1.1em;
}
.ff-play-status.ff-play-status-visible {
  font-size: 0.88rem; color: #b0c4d8; font-style: normal;
  background: rgba(255,255,255,0.04); border-radius: 8px;
  padding: 8px 12px; margin-top: 10px; line-height: 1.5;
}
.ff-readback-area { display: flex; flex-direction: column; gap: 7px; }
.ff-readback-label {
  font-size: 0.76rem; font-weight: 600; color: #6e7a88;
  letter-spacing: 0.07em; text-transform: uppercase;
}
.ff-readback-input {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 10px; color: #fff;
  padding: 11px 13px; font-size: 0.91rem; resize: none;
  box-sizing: border-box; transition: border-color 0.2s;
  font-family: inherit;
}
.ff-readback-input:focus { outline: none; border-color: rgba(255,255,255,0.28); }
.ff-submit-btn { width: 100%; padding: 13px; font-size: 0.93rem; border-radius: 12px; }

.ff-spotlight {
  box-shadow: 0 0 0 3px rgba(0,212,142,0.55), 0 0 22px rgba(0,212,142,0.2) !important;
  border-color: rgba(0,212,142,0.75) !important;
  transition: box-shadow 0.3s, border-color 0.3s !important;
}

.ff-guide-bar {
  background: rgba(0,212,142,0.06);
  border: 1px solid rgba(0,212,142,0.18);
  border-radius: 10px; padding: 11px 16px;
  margin-bottom: 16px; position: relative;
}
.ff-guide-arrow-up {
  position: absolute; top: -7px; left: 50%; transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 7px solid transparent;
  border-right: 7px solid transparent;
  border-bottom: 7px solid rgba(0,212,142,0.25);
}
.ff-guide-text {
  margin: 0; font-size: 0.87rem; color: #9fe8ce;
  text-align: center; font-weight: 500;
}
.ff-step-dots { display: flex; justify-content: center; gap: 8px; }
.ff-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,0.14); transition: background 0.2s;
}
.ff-dot.ff-dot-active { background: #00d48e; }

/* ── Completion ── */
.ff-card-completion {
  padding: 36px 32px;
  display: flex; flex-direction: column; align-items: center; text-align: center;
}
.ff-complete-header { margin-bottom: 22px; }
.ff-complete-checkmark {
  width: 54px; height: 54px; border-radius: 50%;
  background: rgba(0,212,142,0.12);
  border: 2px solid rgba(0,212,142,0.4);
  color: #00d48e; font-size: 1.7rem;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 13px;
}
.ff-complete-title {
  font-size: 1.45rem; font-weight: 800; color: #fff; margin: 0;
}
.ff-score-area { margin-bottom: 20px; }
.ff-score-ring {
  width: 88px; height: 88px; border-radius: 50%;
  border: 4px solid rgba(255,255,255,0.1);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  margin: 0 auto 7px;
}
.ff-score-ring.ff-score-good { border-color: #00d48e; }
.ff-score-ring.ff-score-ok   { border-color: #f59e0b; }
.ff-score-ring.ff-score-low  { border-color: #ef4444; }
.ff-score-num  { font-size: 1.75rem; font-weight: 800; color: #fff; line-height: 1; }
.ff-score-pct  { font-size: 0.82rem; color: #6e7a88; line-height: 1; }
.ff-score-label {
  font-size: 0.75rem; color: #6e7a88;
  text-transform: uppercase; letter-spacing: 0.08em; margin: 0;
}
.ff-keyword-list {
  width: 100%; display: flex; flex-direction: column;
  gap: 7px; margin-bottom: 18px;
}
.ff-kw-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 13px; border-radius: 8px;
  font-size: 0.86rem; text-align: left;
}
.ff-kw-found {
  background: rgba(0,212,142,0.07);
  border: 1px solid rgba(0,212,142,0.18); color: #9fe8ce;
}
.ff-kw-miss {
  background: rgba(239,68,68,0.06);
  border: 1px solid rgba(239,68,68,0.18); color: #fca5a5;
}
.ff-kw-icon { font-weight: 700; flex-shrink: 0; }
.ff-complete-msg { color: #8a929c; font-size: 0.88rem; margin: 0 0 20px; }

/* ============================================================
 * EXAM CARDS (level grid)
 * ============================================================ */
.exam-card {
  border: 2px dashed rgba(255,180,0,0.35) !important;
  background: rgba(255,180,0,0.03) !important;
}
.exam-card.exam-card-passed {
  border-color: rgba(0,212,142,0.4) !important;
  background: rgba(0,212,142,0.03) !important;
}
.exam-card.exam-card-locked {
  border-color: rgba(255,255,255,0.08) !important;
  opacity: 0.7;
}
.exam-card.exam-card-replay_required {
  border-color: rgba(239,68,68,0.35) !important;
  background: rgba(239,68,68,0.03) !important;
}
.exam-status-badge { font-size: 0.6rem !important; font-weight: 800 !important; letter-spacing: 0.1em; }
.exam-badge-avail  { background: rgba(255,180,0,0.15) !important; color: #fbbf24 !important; border: 1px solid rgba(255,180,0,0.3) !important; }
.exam-badge-passed { background: rgba(0,212,142,0.15) !important; color: #00d48e !important; border: 1px solid rgba(0,212,142,0.3) !important; }
.exam-badge-warn   { background: rgba(251,146,60,0.15) !important; color: #fb923c !important; border: 1px solid rgba(251,146,60,0.3) !important; }
.exam-badge-replay { background: rgba(239,68,68,0.12) !important; color: #f87171 !important; border: 1px solid rgba(239,68,68,0.25) !important; }
.exam-badge-locked { background: rgba(255,255,255,0.05) !important; color: #555 !important; border: 1px solid rgba(255,255,255,0.06) !important; }
.exam-card-body { padding: 0 0 14px; }
