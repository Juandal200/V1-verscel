  background:
    radial-gradient(circle at top left, rgba(155, 155, 155, 0.06), transparent 34%),
    rgba(18, 18, 18, 0.86);
  border-radius: 24px;
  padding: 20px;
}

.analytics-kpi-card {
  display: grid;
  gap: 8px;
}

.analytics-kpi-card strong {
  color: #f4f4f4;
  font-size: 2rem;
  line-height: 1;
}

.analytics-kpi-card small,
.analytics-mini-card small,
.effectiveness-meter small {
  color: #8c8c8c;
  line-height: 1.35;
}

.analytics-panel {
  display: grid;
  gap: 18px;
}

.analytics-panel.compact {
  align-content: start;
}

.analytics-section-title {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: flex-start;
}

.analytics-section-title h3 {
  margin: 4px 0 0;
  color: #f4f4f4;
}

.analytics-section-title.mini {
  margin-top: 8px;
}

.analytics-badge {
  border: 1px solid rgba(155, 155, 155, 0.22);
  background: rgba(155, 155, 155, 0.1);
  color: #dedede;
  border-radius: 999px;
  padding: 7px 11px;
  font-size: 0.76rem;
  font-weight: 900;
}

.effectiveness-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(150px, 1fr));
  gap: 14px;
}

.effectiveness-meter {
  border-radius: 18px;
  background: rgba(12, 12, 12, 0.34);
  border: 1px solid rgba(148, 148, 148, 0.12);
  padding: 14px;
  display: grid;
  gap: 10px;
}

.effectiveness-meter-top {
  display: flex;
  justify-content: space-between;
  gap: 10px;
}

.effectiveness-meter-top span {
  color: #c2c2c2;
  font-weight: 800;
  font-size: 0.84rem;
}

.effectiveness-meter-top strong {
  color: #bebebe;
}

.analytics-bar-track {
  width: 100%;
  height: 9px;
  border-radius: 999px;
  background: rgba(65, 65, 65, 0.72);
  overflow: hidden;
}

.analytics-bar-fill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #969696, #22c55e);
}

.analytics-mini-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(160px, 1fr));
  gap: 14px;
}

.analytics-mini-card strong {
  color: #f4f4f4;
  font-size: 1.45rem;
}

.analytics-chart-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(260px, 1fr));
  gap: 18px;
}

/* ═══════════════════════════════════════════════════════════════
   PROGRESS TAB — Student view
═══════════════════════════════════════════════════════════════ */

.prog-shell {
  display: grid;
  gap: 20px;
  max-width: 1100px;
}

/* ── Progress sub-tabs ───────────────────────────────────────── */
.prog-subtabs {
  display: flex;
  gap: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  padding-bottom: 12px;
  margin-bottom: 4px;
}
.prog-subtab {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 600;
  padding: 7px 18px;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.prog-subtab:hover {
  background: rgba(255,255,255,0.05);
  color: var(--text);
}
.prog-subtab--active {
  background: rgba(59,130,246,0.12);
  border-color: rgba(59,130,246,0.4);
  color: #60a5fa;
}
.prog-psy-loading {
  padding: 40px 0;
  text-align: center;
}

/* ── Stats row ────────────────────────────────────────────────── */
.prog-stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}

.prog-stat-card {
  background: rgba(18,18,18,0.9);
  border: 1px solid rgba(184,184,184,0.10);
  border-radius: 18px;
  padding: 20px 22px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.prog-stat-label {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}

.prog-stat-value {
  font-size: 2rem;
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.02em;
}

.prog-stat-sub {
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 2px;
}

/* ── Section wrapper ─────────────────────────────────────────── */
.prog-section {
  background: rgba(18,18,18,0.9);
  border: 1px solid rgba(184,184,184,0.10);
  border-radius: 18px;
  padding: 22px 24px;
}

.prog-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.prog-section-header h3 {
  font-size: 0.95rem;
  font-weight: 700;
  color: #f4f4f4;
}

.prog-section-sub {
  font-size: 0.7rem;
  color: var(--muted);
  font-weight: 500;
  margin-left: 8px;
}

.prog-badge {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  background: rgba(155,155,155,0.10);
  border: 1px solid rgba(155,155,155,0.18);
  border-radius: 6px;
  padding: 3px 8px;
}

/* ── Level map ───────────────────────────────────────────────── */
.prog-tier-labels {
  display: grid;
  grid-template-columns: 3fr 3fr 3fr 1fr;
  margin-bottom: 10px;
  padding: 0 4px;
}

.prog-tier-labels span {
  font-size: 0.63rem;
  font-weight: 700;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  opacity: 0.85;
}

.prog-level-map {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 8px;
  position: relative;
}

.prog-level-map::before {
  content: '';
  position: absolute;
  top: 28px;
  left: 28px;
  right: 28px;
  height: 2px;
  background: rgba(155,155,155,0.12);
  z-index: 0;
}

.prog-lvl-node {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  position: relative;
  z-index: 1;
  cursor: default;
}

.prog-lvl-ring {
  width: 54px;
  height: 54px;
  border-radius: 50%;
  border: 2px solid var(--tier-color, rgba(155,155,155,0.3));
  display: flex;
  align-items: center;
  justify-content: center;
  transition: box-shadow 0.2s ease, background 0.2s ease;
}

.prog-lvl-num {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--tier-color, var(--muted));
}

.prog-lvl-score {
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--muted);
  text-align: center;
}

/* States */
.prog-lvl-skeleton .prog-lvl-ring {
  border-color: rgba(155,155,155,0.15);
  background: rgba(155,155,155,0.04);
}
.prog-lvl-skeleton .prog-lvl-num { color: rgba(155,155,155,0.25); }

.prog-lvl-locked .prog-lvl-ring {
  border-color: rgba(155,155,155,0.2);
  background: rgba(155,155,155,0.04);
}
.prog-lvl-locked .prog-lvl-num { color: rgba(155,155,155,0.3); }

.prog-lvl-inprogress .prog-lvl-ring {
  background: rgba(0,0,0,0.3);
  border-style: dashed;
}

.prog-lvl-done .prog-lvl-ring {
  background: color-mix(in srgb, var(--tier-color, #0E65F4) 15%, transparent);
  box-shadow: 0 0 18px var(--tier-glow, rgba(14,101,244,0.3));
  border-width: 2px;
}

/* ── Two-column layout ───────────────────────────────────────── */
.prog-two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  align-items: start;
}

/* ── Routes list ─────────────────────────────────────────────── */
.prog-routes-list {
  display: grid;
  gap: 14px;
}

.prog-route-card {
  border: 1px solid rgba(184,184,184,0.08);
  border-left: 3px solid var(--tier-color, rgba(155,155,155,0.3));
  border-radius: 14px;
  padding: 16px;
  background: rgba(255,255,255,0.02);
}

.prog-route-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.prog-route-lvl-badge {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border: 1px solid;
  border-radius: 6px;
  padding: 3px 9px;
}

.prog-route-tier-name {
  font-size: 0.75rem;
  color: var(--muted);
  font-weight: 600;
}

.prog-route-done-badge {
  margin-left: auto;
  font-size: 0.65rem;
  font-weight: 700;
  color: #22c55e;
  background: rgba(34,197,94,0.10);
  border: 1px solid rgba(34,197,94,0.25);
  border-radius: 6px;
  padding: 3px 8px;
}

.prog-route-entry {
  margin-bottom: 10px;
}

.prog-route-entry:last-child { margin-bottom: 0; }

.prog-route-entry-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 5px;
  font-size: 0.8rem;
  color: var(--text);
}

.prog-route-bar { height: 6px !important; }

/* ── In-progress level badge ─────────────────────────────── */
.prog-route-inprog-badge {
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--muted);
  background: rgba(155,155,155,0.08);
  border: 1px solid rgba(155,155,155,0.18);
  border-radius: 6px;
  padding: 3px 8px;
}

/* ── Rich performance entry ──────────────────────────────── */
.prog-perf-entry {
  padding: 12px 0;
  border-top: 1px solid rgba(184,184,184,0.07);
}
.prog-perf-entry:first-of-type { border-top: none; padding-top: 4px; }

.prog-perf-entry-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.prog-perf-entry-name {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
}

.prog-perf-entry-badges {
  display: flex;
  align-items: center;
  gap: 8px;
}

.prog-perf-score {
  font-size: 0.75rem;
  font-weight: 700;
}

/* ── Metric chips row ────────────────────────────────────── */
.prog-perf-metrics {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}

.prog-perf-chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(184,184,184,0.10);
  border-radius: 8px;
  padding: 5px 10px;
  min-width: 64px;
}

.prog-perf-chip-label {
  font-size: 0.58rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--muted);
}

.prog-perf-chip-value {
  font-size: 0.8rem;
  font-weight: 700;
}

/* ── Trend chips ─────────────────────────────────────────── */
.prog-perf-trend-col {
  display: flex;
  align-items: center;
  margin-left: 4px;
}

.prog-trend-chip {
  font-size: 0.68rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid;
  white-space: nowrap;
}

.prog-trend-up {
  color: #22c55e;
  background: rgba(34,197,94,0.10);
  border-color: rgba(34,197,94,0.30);
}

.prog-trend-down {
  color: #ef4444;
  background: rgba(239,68,68,0.10);
  border-color: rgba(239,68,68,0.30);
}

.prog-trend-stable {
  color: var(--muted);
  background: rgba(155,155,155,0.07);
  border-color: rgba(155,155,155,0.18);
}

.prog-entry-status {
  font-size: 0.68rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 5px;
}
.prog-entry-status.done    { color: #22c55e; background: rgba(34,197,94,0.10); }
.prog-entry-status.partial { color: var(--muted); background: rgba(155,155,155,0.08); }

/* ── Bar list (score by level) ───────────────────────────────── */
.prog-bar-list { display: grid; gap: 10px; }

.prog-bar-row {
  display: grid;
  grid-template-columns: 60px 1fr 40px;
  align-items: center;
  gap: 10px;
  font-size: 0.78rem;
  color: var(--text);
}

.prog-bar-row strong { text-align: right; font-size: 0.75rem; }

/* ── Keywords ────────────────────────────────────────────────── */
.prog-kw-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.prog-kw-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.22);
  color: #f87171;
  border-radius: 8px;
  padding: 5px 12px;
  font-size: 0.75rem;
  font-weight: 600;
}

.prog-kw-chip em {
  font-style: normal;
  background: rgba(239,68,68,0.15);
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 0.65rem;
  font-weight: 700;
  color: #fca5a5;
}

/* ── Phase difficulty summary banner ────────────────────────── */
.prog-phase-summary {
  display: flex;
  align-items: stretch;
  gap: 0;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 14px;
}
.prog-phase-summary-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 12px 16px;
}
.prog-phase-summary-label {
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
}
.prog-phase-summary-val {
  font-size: 0.92rem;
  font-weight: 700;
}
.prog-phase-summary-score {
  font-size: 0.75rem;
  font-weight: 600;
}
.prog-phase-summary-sep {
  width: 1px;
  background: rgba(255,255,255,0.08);
  flex-shrink: 0;
}
.prog-phase-count {
  font-size: 0.65rem;
  color: var(--muted);
  font-weight: 400;
}

/* ── Recent attempts ─────────────────────────────────────────── */
.prog-attempts-list { display: grid; gap: 6px; }

.prog-attempt-row {
  display: grid;
  grid-template-columns: 36px 28px 1fr 52px 80px;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(184,184,184,0.07);
  border-radius: 10px;
  font-size: 0.78rem;
  color: var(--text);
}

.prog-attempt-level {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--muted);
  text-align: center;
}

.prog-attempt-phase {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.prog-attempt-phase small {
  font-size: 0.65rem;
  color: var(--muted);
}

.prog-attempt-score {
  font-size: 1rem;
  font-weight: 700;
  text-align: right;
}

.prog-attempt-tag {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-align: center;
  padding: 3px 8px;
  border-radius: 6px;
}
.prog-attempt-tag.ok   { color: #22c55e; background: rgba(34,197,94,0.10);  border: 1px solid rgba(34,197,94,0.2);  }
.prog-attempt-tag.miss { color: #f87171; background: rgba(239,68,68,0.08);  border: 1px solid rgba(239,68,68,0.2);  }

/* ── Responsive ──────────────────────────────────────────────── */
@media (max-width: 900px) {
  .prog-stats-row       { grid-template-columns: repeat(2, 1fr); }
  .prog-two-col         { grid-template-columns: 1fr; }
  .prog-level-map       { grid-template-columns: repeat(5, 1fr); }
  .prog-tier-labels     { grid-template-columns: repeat(2, 1fr); }
  .prog-level-map::before { display: none; }
  .prog-attempt-row     { grid-template-columns: 32px 24px 1fr 44px 68px; gap: 6px; }
  .prog-perf-chip       { min-width: 54px; padding: 4px 8px; }
  .prog-perf-chip-value { font-size: 0.72rem; }
  .ov-summary-strip     { grid-template-columns: 1fr; }
  .aviation-health-grid { grid-template-columns: 1fr; }
  .psy-filter-bar       { gap: 8px; }
}

/* ── Admin student lookup section ───────────────────────────────── */
.admin-student-lookup-section { margin-bottom: 0; }

.admin-student-picker-row {
  display: flex;
  gap: 10px;
  align-items: center;
}

.admin-student-select {
  flex: 1;
  min-width: 0;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 0.85rem;
  cursor: pointer;
}

.admin-student-view-btn {
  flex-shrink: 0;
  white-space: nowrap;
}
.admin-student-view-btn:disabled { opacity: 0.45; cursor: not-allowed; }

/* ── Admin student view header ───────────────────────────────────── */
.admin-sv-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(184,184,184,0.10);
  border-radius: 14px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}

.admin-sv-back-btn {
  flex-shrink: 0;
  font-size: 0.78rem;
  padding: 7px 14px;
}

.admin-sv-identity {
  flex: 1;
  min-width: 120px;
}

.admin-sv-name {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
}

.admin-sv-email {
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 2px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.admin-sv-meta-chip {
  font-size: 0.65rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 5px;
  background: rgba(14,101,244,0.12);
  color: #4f9cf8;
  border: 1px solid rgba(14,101,244,0.20);
}

.admin-sv-send-btn {
  flex-shrink: 0;
  font-size: 0.78rem;
  padding: 8px 16px;
  background: rgba(34,197,94,0.10);
  color: #22c55e;
  border: 1px solid rgba(34,197,94,0.28);
}
.admin-sv-send-btn:hover {
  background: rgba(34,197,94,0.18);
}

/* ── Send report modal ───────────────────────────────────────────── */
.admin-report-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9000;
  backdrop-filter: blur(4px);
}

.admin-report-card {
  position: relative;
  background: var(--card, #1a1f27);
  border: 1px solid rgba(184,184,184,0.12);
  border-radius: 16px;
  padding: 28px 28px 24px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.45);
}

.admin-report-label {
  display: block;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 7px;
}

/* ── Admin / Instructor Progress extras ──────────────────────────── */
.prog-user-mix {
  display: grid;
  gap: 12px;
}

.prog-mix-bar {
  display: flex;
  height: 18px;
  border-radius: 9px;
  overflow: hidden;
  gap: 2px;
}

.prog-mix-bar span {
  height: 100%;
  transition: width 0.4s ease;
  border-radius: 0;
}

.prog-mix-bar span:first-child { border-radius: 9px 0 0 9px; }
.prog-mix-bar span:last-child  { border-radius: 0 9px 9px 0; }

.prog-mix-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 12px 20px;
  font-size: 0.78rem;
  color: var(--muted);
}

.prog-mix-legend span {
  display: flex;
  align-items: center;
  gap: 6px;
}

.prog-mix-legend span::before {
  content: '';
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--dot-color, #888);
}

/* Sets the dot color via a CSS var injected inline */
.prog-mix-legend .dot-students  { --dot-color: #0E65F4; }
.prog-mix-legend .dot-instructors { --dot-color: #DAA520; }
.prog-mix-legend .dot-admins    { --dot-color: #990011; }

.prog-alert-banner {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 18px;
  border-radius: 12px;
  background: rgba(239, 68, 68, 0.08);
  border: 1px solid rgba(239, 68, 68, 0.22);
  color: #fca5a5;
  font-size: 0.85rem;
  line-height: 1.5;
}

.prog-alert-banner strong {
  color: #f87171;
  display: block;
  margin-bottom: 2px;
  font-size: 0.9rem;
}

.prog-alert-icon {
  font-size: 1.25rem;
  flex-shrink: 0;
  margin-top: 1px;
}

.analytics-session-table { width: 100%; border-collapse: collapse; }
.analytics-session-row td { padding: 10px 14px; font-size: 0.82rem; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; }
.analytics-session-row:last-child td { border-bottom: none; }
.analytics-session-email { font-weight: 500; color: var(--text); }
.analytics-session-date  { font-size: 0.71rem; color: var(--muted); display: block; margin-top: 2px; }
.analytics-session-time  { color: var(--text); font-weight: 700; font-size: 0.95rem; text-align: center; white-space: nowrap; font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
.analytics-session-dur   { color: var(--cyan); font-weight: 700; text-align: right; white-space: nowrap; font-size: 0.88rem; }

.ov-summary-strip {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
.ov-summary-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
}
.ov-summary-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
.ov-summary-value { font-size: 1.6rem; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.ov-summary-desc  { font-size: 0.74rem; color: var(--muted); line-height: 1.4; }

.kpi-bench { font-size: 0.67rem; color: var(--muted); display: block; margin-top: 2px; }
.aviation-health-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.aviation-health-item { padding: 12px 14px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 8px; }
.aviation-health-item-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 4px; }
.aviation-health-item-value { font-size: 1.15rem; font-weight: 700; }
.aviation-health-item-sub { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

.analytics-insight-banner {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 10px;
  border-left: 3px solid transparent;
  margin-bottom: 14px;
  font-size: 0.84rem;
  line-height: 1.5;
}
.aib-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 2px; }
.aib-body { display: flex; flex-direction: column; gap: 2px; }
.aib-headline { font-size: 0.87rem; font-weight: 700; display: block; }
.aib-detail { font-size: 0.78rem; opacity: 0.82; display: block; }

.psy-attention-hero {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 16px 20px;
  border-radius: 12px;
  background: rgba(99,179,237,0.07);
  border: 1px solid rgba(99,179,237,0.2);
  margin-bottom: 18px;
}
.psy-attention-score {
  font-size: 2.4rem;
  font-weight: 800;
  line-height: 1;
  flex-shrink: 0;
}
.psy-attention-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 3px; }
.psy-attention-desc  { font-size: 0.82rem; color: var(--muted); line-height: 1.45; }
.psy-filter-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.psy-filter-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--muted);
}
.psy-filter-select {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 0.82rem;
  padding: 5px 10px;
  cursor: pointer;
  outline: none;
}
.psy-filter-select:focus { border-color: var(--cyan); }
.psy-filter-clear {
  margin-left: auto;
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-size: 0.76rem;
  padding: 4px 10px;
  cursor: pointer;
}
.psy-filter-clear:hover { color: var(--text); border-color: var(--text); }

.psy-needs-coaching  { margin-top: 20px; }
.psy-coaching-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: rgba(239,68,68,0.05);
  border: 1px solid rgba(239,68,68,0.15);
  border-radius: 8px;
  margin-bottom: 8px;
  gap: 12px;
  flex-wrap: wrap;
}
.psy-coaching-name { font-size: 0.84rem; font-weight: 700; color: var(--text); }
.psy-coaching-email { font-size: 0.73rem; color: var(--muted); }
.psy-coaching-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.psy-coaching-chip { font-size: 0.72rem; padding: 3px 8px; border-radius: 5px; font-weight: 600; background: rgba(255,255,255,0.06); color: var(--muted); }

.prog-empty-hint {
  color: var(--muted);
  font-size: 0.82rem;
  text-align: center;
  padding: 10px 0 4px;
  opacity: 0.7;
}

@media (max-width: 700px) {
  .prog-mix-bar { height: 14px; }
  .prog-mix-legend { gap: 8px 14px; font-size: 0.74rem; }
}

/* ─────────────────────────────────────────────────────────────────── */

.analytics-bar-list {
  display: grid;
  gap: 12px;
}

.analytics-bar-row {
  display: grid;
  grid-template-columns: minmax(90px, 160px) 1fr auto;
  gap: 12px;
  align-items: center;
}

.analytics-bar-row span {
  color: #c2c2c2;
  font-weight: 800;
  font-size: 0.82rem;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.analytics-bar-row strong {
  color: #f4f4f4;
  min-width: 34px;
  text-align: right;
}

.analytics-table-wrap {
  border-radius: 20px;
}

.analytics-subsection {
  display: grid;
  gap: 14px;
}

.dashboard-progress-panel {
  gap: 16px;
}

.dashboard-progress-summary {
  display: grid;
  grid-template-columns: repeat(2, minmax(240px, 1fr));
  gap: 12px;
}

.dashboard-progress-row {
  display: grid;
  grid-template-columns: minmax(120px, 1fr) minmax(120px, 1.2fr) auto;
  gap: 12px;
  align-items: center;
  border-radius: 16px;
  background: rgba(12, 12, 12, 0.34);
  border: 1px solid rgba(148, 148, 148, 0.12);
  padding: 12px;
}

.dashboard-progress-row strong,
.dashboard-progress-row span {
  display: block;
}

.dashboard-progress-row strong {
  color: #f4f4f4;
  font-size: 0.92rem;
}

.dashboard-progress-row span {
  color: #8c8c8c;
  font-size: 0.78rem;
  margin-top: 2px;
}

.dashboard-progress-row em {
  color: #bebebe;
  font-style: normal;
  font-weight: 900;
  min-width: 42px;
  text-align: right;
}

.skeleton {
  animation: analyticsPulse 1.2s ease-in-out infinite alternate;
}

@keyframes analyticsPulse {
  from {
    opacity: 0.65;
  }

  to {
    opacity: 1;
  }
}

@media (max-width: 1180px) {
  .analytics-kpi-grid,
  .effectiveness-grid,
  .analytics-mini-grid,
  .welcome-board-grid,
  .dashboard-progress-summary {
    grid-template-columns: repeat(2, minmax(160px, 1fr));
  }
}

@media (max-width: 760px) {
  .analytics-hero {
    flex-direction: column;
    align-items: flex-start;
  }

  .welcome-hero {
    min-height: auto;
  }

  .welcome-aviation-panel {
    width: 100%;
    min-width: 0;
    min-height: 220px;
  }

  .analytics-kpi-grid,
  .effectiveness-grid,
  .analytics-mini-grid,
  .analytics-chart-grid,
  .welcome-board-grid,
  .dashboard-progress-summary,
  .dashboard-progress-row {
    grid-template-columns: 1fr;
  }

  .analytics-bar-row {
    grid-template-columns: 1fr;
  }
}

/* ═══════════════════════════════════════════
   OPS BRIEFING — Simulator 3-step flow
   ═══════════════════════════════════════════ */

.ops-briefing-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(12, 12, 12, 0.72);
  border: 1px solid rgba(155, 155, 155, 0.28);
  border-radius: 12px;
  padding: 11px 18px;
  font-size: 0.76rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #bebebe;
  margin-bottom: 22px;
}

.ops-briefing-bar .ops-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #969696;
  box-shadow: 0 0 6px #969696;
  flex-shrink: 0;
  animation: opsDotPulse 1.8s ease-in-out infinite;
}

@keyframes opsDotPulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.35; }
}

.ops-briefing-header {
  margin-bottom: 28px;
}

.ops-briefing-header h2 {
  margin: 4px 0 10px;
}

.ops-copy {
  color: var(--muted, #8c8c8c);
  font-size: 0.92rem;
  max-width: 560px;
  line-height: 1.6;
  margin: 0;
}

/* Scenario selector grid */
.ops-scenario-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 18px;
  margin-top: 4px;
}

.ops-scenario-card {
  border: 1px solid rgba(148, 148, 148, 0.22);
  background:
    radial-gradient(circle at top right, rgba(140, 140, 140, 0.08), transparent 44%),
    linear-gradient(160deg, rgba(28, 28, 28, 0.98) 0%, rgba(14, 14, 14, 0.98) 100%);
  border-radius: 22px;
  padding: 22px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  cursor: pointer;
  transition: border-color 0.18s, box-shadow 0.18s, transform 0.14s;
}

.ops-scenario-card:hover {
  border-color: rgba(155, 155, 155, 0.55);
  box-shadow: 0 0 0 1px rgba(155, 155, 155, 0.18), 0 24px 56px rgba(0, 0, 0, 0.28);
  transform: translateY(-2px);
}

.ops-scenario-card-header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
}

.ops-airport-badge {
  flex-shrink: 0;
  width: 68px; height: 68px;
  border-radius: 18px;
  background: rgba(12, 12, 12, 0.8);
  border: 1px solid rgba(155, 155, 155, 0.22);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 6px;
}
.ops-badge-flag { line-height: 1; display: flex; align-items: center; justify-content: center; }
.ops-badge-flag .flag-sm { width: 28px; height: 20px; border-radius: 3px; object-fit: cover; display: block; }
.ops-badge-flag .flag-emoji { font-size: 1.3rem; }
.ops-badge-code {
  font-size: 0.66rem;
  font-weight: 900;
  letter-spacing: 0.08em;
  color: #787878;
  text-transform: uppercase;
}

.ops-scenario-name-block {
  flex: 1;
  min-width: 0;
}

.ops-scenario-name-block h3 {
  margin: 2px 0 6px;
  font-size: 1rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.ops-tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}

.ops-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 0.72rem;
  font-weight: 800;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.ops-tag.normal {
  background: rgba(34, 197, 94, 0.12);
  border: 1px solid rgba(34, 197, 94, 0.30);
  color: #86efac;
}

.ops-tag.emergency {
  background: rgba(239, 68, 68, 0.12);
  border: 1px solid rgba(239, 68, 68, 0.32);
  color: #fca5a5;
}

.ops-tag.phase-count {
  background: rgba(148, 148, 148, 0.10);
  border: 1px solid rgba(148, 148, 148, 0.22);
  color: #8c8c8c;
}

.ops-scenario-desc {
  font-size: 0.86rem;
  color: var(--muted, #8c8c8c);
  line-height: 1.55;
  border-top: 1px solid rgba(148, 148, 148, 0.12);
  padding-top: 12px;
  margin: 0;
}

.ops-scenario-footer {
  margin-top: auto;
  padding-top: 4px;
}

.ops-select-btn {
  font-size: 0.88rem;
  letter-spacing: 0.04em;
  border-radius: 12px;
  padding: 11px 18px;
}

/* ── Scenario selector hero header ─────────────────────── */
.ops-selector-header {
  position: relative;
  background: linear-gradient(160deg, rgba(22,22,22,0.97) 0%, rgba(10,10,10,0.99) 100%);
  border: 1px solid rgba(148,148,148,0.16);
  border-radius: 22px;
  padding: 28px 28px 22px;
  margin-bottom: 4px;
}
.ops-selector-hero {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 18px;
}
.ops-selector-flag-wrap {
  flex-shrink: 0;
  width: 72px; height: 52px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid rgba(148,148,148,0.2);
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.4);
}
.ops-selector-flag-wrap .flag-xl { width: 100%; height: 100%; object-fit: cover; display: block; }
.ops-selector-flag-wrap .flag-emoji { font-size: 2.4rem; line-height: 1; }
.ops-selector-hero-text h2 {
  margin: 2px 0 4px;
  font-size: 1.55rem;
  font-weight: 800;
  color: #e8e8e8;
}
.ops-selector-sub {
  margin: 0;
  font-size: 0.82rem;
  color: #666;
}

@media (max-width: 760px) {
  .ops-scenario-grid { grid-template-columns: 1fr; }
  .ops-selector-hero-text h2 { font-size: 1.2rem; }
}


/*******************************************************
 * FEEDBACK MODALS + ADMIN ANALYTICS DASHBOARD
 *******************************************************/

/* ── In-scenario difficulty card ────────────────────── */
.feedback-card {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 1200;
  background: #111111;
  border: 1px solid rgba(155, 155, 155, 0.32);
  border-radius: 16px;
  padding: 16px 20px 14px;
  min-width: 270px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  animation: feedbackSlideIn 0.25s ease;
}

@keyframes feedbackSlideIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.feedback-card-label {
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  color: #636363;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.feedback-card h4 {
  color: #f0f0f0;
  font-size: 0.9rem;
  margin: 0 0 12px;
  font-weight: 600;
}

.feedback-btn-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.feedback-btn {
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid rgba(148, 148, 148, 0.25);
  background: rgba(148, 148, 148, 0.08);
  color: #c2c2c2;
  font-size: 0.8rem;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  font-family: inherit;
}

.feedback-btn:hover         { border-color: rgba(142,150,158,0.5); background: rgba(142,150,158,0.15); }
.feedback-btn.easy          { border-color: rgba(34,197,94,0.35); color: #4ade80; }
.feedback-btn.easy:hover    { background: rgba(34,197,94,0.12); }
.feedback-btn.ok            { border-color: rgba(155, 155, 155,0.35); color: #969696; }
.feedback-btn.ok:hover      { background: rgba(155, 155, 155,0.12); }
.feedback-btn.hard          { border-color: rgba(251,146,60,0.35); color: #fb923c; }
.feedback-btn.hard:hover    { background: rgba(251,146,60,0.12); }
.feedback-btn.skip          { border-color: transparent; color: #4c4c4c; font-size: 0.75rem; padding: 4px 10px; }

/* ── Full-screen modal overlay ───────────────────────── */
.feedback-modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 1300;
  background: rgba(0, 0, 0, 0.72);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: feedbackFadeIn 0.2s ease;
}

@keyframes feedbackFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.feedback-modal {
  background: #111111;
  border: 1px solid rgba(155, 155, 155, 0.22);
  border-radius: 20px;
  padding: 32px;
  max-width: 420px;
  width: 90%;
  box-shadow: 0 16px 48px rgba(0,0,0,0.6);
}

.feedback-modal h3 {
  color: #f0f0f0;
  font-size: 1.1rem;
  margin: 0 0 6px;
}

.feedback-modal p {
  color: #8c8c8c;
  font-size: 0.85rem;
  margin: 0 0 18px;
}

.feedback-modal textarea {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(142,150,158,0.2);
  border-radius: 10px;
  color: #dedede;
  font-family: inherit;
  font-size: 0.85rem;
  padding: 10px 12px;
  resize: vertical;
  min-height: 70px;
  margin-bottom: 14px;
  box-sizing: border-box;
}

.feedback-modal textarea:focus {
  outline: none;
  border-color: rgba(155, 155, 155,0.4);
}

/* ── Admin analytics dashboard ───────────────────────── */
.admin-analytics-shell {
  display: grid;
  gap: 28px;
  padding-bottom: 40px;
}

.admin-analytics-hero {
  background: linear-gradient(135deg, rgba(155, 155, 155,0.08) 0%, transparent 60%);
  border: 1px solid rgba(155, 155, 155,0.15);
  border-radius: 20px;
  padding: 28px 32px;
}

.admin-analytics-hero h2 { margin: 4px 0 6px; color: #f0f0f0; }
.admin-analytics-hero p  { color: #8c8c8c; margin: 0; font-size: 0.9rem; }

.admin-stat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

.admin-stat-card {
  background: rgba(15,23,42,0.8);
  border: 1px solid rgba(142,150,158,0.12);
  border-radius: 16px;
  padding: 20px 22px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.admin-stat-card strong {
  font-size: 2rem;
  font-weight: 800;
  color: #969696;
  line-height: 1;
}

.admin-stat-card span {
  font-size: 0.78rem;
  color: #636363;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.admin-analytics-section {
  background: rgba(15,23,42,0.7);
  border: 1px solid rgba(142,150,158,0.1);
  border-radius: 16px;
  padding: 24px 26px;
}

.admin-analytics-section h3 {
  font-size: 0.95rem;
  color: #dedede;
  margin: 0 0 16px;
}

.admin-analytics-section table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.83rem;
}

.admin-analytics-section th {
  color: #636363;
  text-align: left;
  padding: 0 10px 8px 0;
  font-weight: 600;
  border-bottom: 1px solid rgba(142,150,158,0.1);
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.admin-analytics-section td {
  color: #c2c2c2;
  padding: 7px 10px 7px 0;
  border-bottom: 1px solid rgba(142,150,158,0.06);
}

.feedback-bar-wrap { display: flex; flex-direction: column; gap: 8px; }
.feedback-bar-row  { display: flex; align-items: center; gap: 10px; font-size: 0.82rem; color: #8c8c8c; }
.feedback-bar-track { flex: 1; height: 8px; background: rgba(142,150,158,0.1); border-radius: 4px; overflow: hidden; }
.feedback-bar-fill  { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
.feedback-bar-fill.easy { background: #4ade80; }
.feedback-bar-fill.ok   { background: #969696; }
.feedback-bar-fill.hard { background: #fb923c; }
.feedback-bar-count { width: 28px; text-align: right; color: #f0f0f0; font-weight: 600; }

.wua-grid { display: flex; gap: 12px; flex-wrap: wrap; }
.wua-chip { padding: 8px 20px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
.wua-chip.yes   { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
.wua-chip.maybe { background: rgba(155, 155, 155,0.12); color: #969696; border: 1px solid rgba(155, 155, 155,0.25); }
.wua-chip.no    { background: rgba(251,146,60,0.12); color: #fb923c; border: 1px solid rgba(251,146,60,0.25); }

.recent-text-list { display: flex; flex-direction: column; gap: 8px; }
.recent-text-item { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; color: #8c8c8c; font-style: italic; }

/* ── Scenario rating widget ────────────────────────────── */
.scenario-rating {
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid rgba(142,150,158,0.12);
}
.star-row { display: flex; gap: 4px; margin: 6px 0 12px; }
.star-btn {
  background: none;
  border: none;
  font-size: 1.6rem;
  color: rgba(142,150,158,0.25);

  color: #e8e8e8;

/* ═══════════════════════════════════════════════════════════════
   VIP RESPONSIVE SYSTEM — AEROCOMMS
   Breakpoints: 1100 · 900 · 768 · 600 · 480 · 360
   ═══════════════════════════════════════════════════════════════ */

/* ── Global: touch optimisation, scroll, anti-zoom ─────────── */
html {
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
  scroll-behavior: smooth;
}
body {
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior-y: none;
  overflow-x: clip;
}
button, .btn, .nav-item, input, textarea, select {
  touch-action: manipulation;
}

/* ── Scrollbar: refined across all views ─────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: rgba(155,155,155,0.20);
  border-radius: 999px;
}
::-webkit-scrollbar-thumb:hover { background: rgba(155,155,155,0.38); }

/* ── 1100px — large tablet landscape ────────────────────────── */
@media (max-width: 1100px) {
  .main { padding: 22px; }
  .sim-layout { grid-template-columns: 1fr; }
  .level-map-grid-pro { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
  .analytics-hero { padding: 22px; }
  .senior-certificate-card { padding: 32px; }
}

/* ── 900px — tablet portrait · sidebar → sticky top nav ─────── */
@media (max-width: 900px) {

  /* App shell: sidebar stacks above main */
  #appScreen.active { flex-direction: column !important; }

  /* ─ Sidebar → horizontal scrolling nav strip ─ */
  .sidebar {
    width: 100% !important;
    min-height: 56px !important;
    padding: 0 14px !important;
    flex-direction: row !important;
    align-items: center !important;
    gap: 6px !important;
    flex-wrap: nowrap !important;
    overflow-x: auto !important;
    overflow-y: hidden !important;
    -webkit-overflow-scrolling: touch !important;
    scrollbar-width: none !important;
    position: sticky !important;
    top: 0 !important;
    z-index: 200 !important;
    background: rgba(9, 9, 9, 0.97) !important;
    backdrop-filter: blur(18px) !important;
    -webkit-backdrop-filter: blur(18px) !important;
    border-right: none !important;
    border-bottom: 1px solid rgba(186,186,186,0.10) !important;
  }
  .sidebar::-webkit-scrollbar { display: none !important; }

  /* Brand: logo icon only */
  .brand { flex-shrink: 0 !important; gap: 8px !important; }
  .brand div { display: none !important; }
  .brand-logo-sidebar { width: 34px !important; height: 34px !important; border-radius: 9px !important; }

  /* Nav: horizontal scrollable pills */
  nav {
    display: flex !important;
    flex-direction: row !important;
    gap: 4px !important;
    flex: 1 !important;
    overflow-x: auto !important;
    overflow-y: hidden !important;
    scrollbar-width: none !important;
    padding: 9px 0 !important;
  }
  nav::-webkit-scrollbar { display: none !important; }

  .nav-item {
    white-space: nowrap !important;
    flex-shrink: 0 !important;
    width: auto !important;
    padding: 8px 14px !important;
    font-size: 0.83rem !important;
    min-height: 36px !important;
    border-radius: 10px !important;
    text-align: center !important;
  }

  /* Demo + Logout: compact inline */
  #demoReplayBtn,
  .sidebar > .btn.full {
    flex-shrink: 0 !important;
    width: auto !important;
    min-width: 0 !important;
    margin: 0 !important;
    padding: 7px 10px !important;
    font-size: 0.76rem !important;
    min-height: 36px !important;
    border-radius: 9px !important;
  }

  /* Hide topbar — user info surfaced in sidebar brand */
  .topbar { display: none !important; }

  /* Main: full width, reduced padding */
  .main { padding: 16px !important; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .analytics-hero { flex-wrap: wrap !important; }
  .welcome-aviation-panel { display: none !important; }
  .welcome-copy { max-width: 100% !important; }
}

/* ── 768px — iPad / tablet ───────────────────────────────────── */
@media (max-width: 768px) {

  /* Prevent iOS auto-zoom on focus (font-size must be ≥ 16px) */
  input, textarea, select, .input { font-size: 16px !important; }

  /* Touch targets: 44 × 44 px minimum */
  .btn, .nav-item { min-height: 44px !important; }

  h1 { font-size: clamp(1.8rem, 5vw, 2.4rem); }
  h2 { font-size: clamp(1.4rem, 4vw, 2rem); }

  /* Level & country grids */
  .level-map-grid-pro { grid-template-columns: 1fr !important; }
  .country-grid-pro   { grid-template-columns: 1fr !important; }

  /* Analytics cards: 2 cols */
  .analytics-cards-grid {
    grid-template-columns: repeat(2, 1fr) !important;
  }

  /* Welcome actions: stack full width */
  .welcome-actions {
    flex-direction: column !important;
    align-items: stretch !important;
  }
  .welcome-actions .btn { width: 100% !important; min-width: 0 !important; }

  /* Simulator visual */
  .sim-visual-host,
  .sim-video-frame,
  .sim-fallback-visual { min-height: 220px !important; }

  /* Senior completion */
  .senior-mission-grid { grid-template-columns: repeat(2, 1fr) !important; }
  .senior-cert-metrics  { grid-template-columns: repeat(2, 1fr) !important; }
  .certificate-home-grid { grid-template-columns: 1fr !important; }

  /* Table scroll fade cue */
  .table-wrap { position: relative; }
  .table-wrap::after {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 28px;
    background: linear-gradient(to right, transparent, rgba(0,0,0,0.55));
    pointer-events: none;
    border-radius: 0 8px 8px 0;
  }
}

/* ── 600px — large phone landscape ──────────────────────────── */
@media (max-width: 600px) {
  .main { padding: 12px !important; }

  .panel, .metric-card { padding: 16px !important; border-radius: 18px !important; }
  .level-card-pro { padding: 16px !important; border-radius: 18px !important; }
  .sim-hero-card, .sim-stage-card, .sim-atc-card,
  .sim-readback-card, .sim-side-card { padding: 14px !important; }

  .analytics-hero { padding: 18px !important; min-height: auto !important; }

  .metrics { grid-template-columns: repeat(2, 1fr) !important; }

  .country-card-pro { grid-template-columns: 1fr !important; }
  .country-card-flag { width: 60px !important; height: 60px !important; border-radius: 16px !important; }

  .sim-action-row { flex-direction: column !important; }
  .senior-actions { flex-direction: column !important; align-items: stretch !important; }
  .senior-actions .btn { width: 100% !important; }

  .senior-certificate-card { padding: 22px 16px !important; }
  .senior-cert-watermark { display: none !important; }
  .senior-mission-grid { grid-template-columns: 1fr !important; }
  .senior-cert-metrics  { grid-template-columns: 1fr !important; }

  .sub-modal-card { border-radius: 14px !important; padding: 26px 18px 18px !important; }
  .sub-price-amount { font-size: 1.6rem !important; }

  .login-card { padding: 24px 16px !important; border-radius: 20px !important; }

  .route-builder-four { grid-template-columns: repeat(2, 1fr) !important; }
  .route-builder-preview { grid-template-columns: repeat(2, 1fr) !important; }

  body.sim-focus-mode .main { padding: 10px 12px !important; }
}

/* ── 480px — phone portrait ──────────────────────────────────── */
@media (max-width: 480px) {
  .main { padding: 10px !important; }
  .analytics-dashboard-shell { gap: 12px !important; }

  h1 { font-size: 1.75rem !important; }

  .panel-close-btn { width: 40px !important; height: 40px !important; font-size: 1.3rem !important; }

  .feedback-card {
    left: 10px !important;
    right: 10px !important;
    min-width: 0 !important;
    border-radius: 18px !important;

  .senior-cert-header { flex-direction: column !important; gap: 12px !important; }
  .senior-cert-id     { text-align: left !important; }

  .login-card { padding: 20px 14px !important; }

  .nav-item { padding: 7px 10px !important; font-size: 0.78rem !important; }

  /* Remove purely decorative animated SVG elements */
  .welcome-plane, .welcome-route, .welcome-beacon,
  .welcome-skyline { display: none !important; }

  .route-builder-four { grid-template-columns: 1fr !important; }

/* ── 360px — small phone ─────────────────────────────────────── */
@media (max-width: 360px) {
  .main { padding: 8px !important; }
  .login-card { padding: 18px 12px !important; }
  h1 { font-size: 1.55rem !important; }
  h2 { font-size: 1.2rem !important; }
  .level-card-pro { padding: 13px !important; }
  .sim-hero-card  { padding: 12px !important; }
  .btn { padding: 10px 10px !important; font-size: 0.82rem !important; }
  .nav-item { padding: 6px 8px !important; font-size: 0.74rem !important; }
  .sub-modal-card { padding: 18px 12px 14px !important; }
  .panel, .metric-card { padding: 13px !important; }
}

/* ── Safe-area insets — iPhone Dynamic Island / notch ────────── */
@supports (padding: max(0px)) {
  @media (max-width: 900px) {
    .sidebar {
      padding-top:   max(8px, env(safe-area-inset-top))    !important;
      padding-left:  max(14px, env(safe-area-inset-left))  !important;
      padding-right: max(14px, env(safe-area-inset-right)) !important;
    }
  }
  .main {
    padding-bottom: max(14px, env(safe-area-inset-bottom));
  }
}

/* ── Reduced motion: honour system preference ────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* ═══════════════════════════════════════════════════════════
   MOBILE FOUNDATION — Cross-device optimisation layer
   These rules sit above everything else; they fix the root
   causes of mobile breakage (overflow, text sizing, images,
   scroll momentum, sticky positioning).
═══════════════════════════════════════════════════════════ */

/* ── 1–2. html/body overflow: clip avoids creating a scroll
          container, which would break position:sticky in iOS ─ */
html {
  overflow-x: clip;
}
/* body overflow-x:clip is set in the VIP block above */

/* ── 3. Images / media never overflow their parent ───────── */
img, video, canvas, svg, iframe {
  max-width: 100%;
  height: auto;
  display: block;
}
/* Inline images (flags, icons used with <img>) keep inline */
.flag-emoji img, nav img, .brand img { display: inline; }

/* ── 4. iOS momentum scrolling on all scroll containers ──── */
.table-wrap,
.sim-atc-console,
.route-builder-preview,
.custom-route-scenario-list,
.sim-tc-list,
[style*="overflow-y: auto"],
[style*="overflow: auto"] {
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-x: contain;
}

/* ── 5. Prevent text selection on interactive elements ───── */
button, .btn, .nav-item, label, .chip {
  -webkit-user-select: none;
  user-select: none;
}

/* ── 6. Long words / URLs break instead of overflowing ───── */
p, li, td, th, .sim-atc-text, .feedback-text,
.level-card-body, .panel, .metric-card {
  word-break: break-word;
  overflow-wrap: break-word;
}

/* ── 7. Dynamic viewport height — body fills visible area
        even when browser chrome shows / hides ────────────── */
@supports (min-height: 100dvh) {
  .screen { min-height: 100dvh; }
}

/* ── 8. Metrics grid: 2-col all the way to 360px ────────── */
@media (max-width: 900px) {
  .metrics {
    grid-template-columns: repeat(2, 1fr) !important;
  }
}
@media (max-width: 380px) {
  .metrics {
    grid-template-columns: 1fr !important;
  }
}

/* ── 9. Analytics cards: 1-col on narrow phones ─────────── */
@media (max-width: 480px) {
  .analytics-cards-grid {
    grid-template-columns: 1fr !important;
  }
}

/* ── 10. Simulator visual: progressive height reduction ──── */
@media (max-width: 600px) {
  .sim-visual-host,
  .sim-video-frame,
  .sim-fallback-visual {
    min-height: 180px !important;
    max-height: 40vh !important;
  }
}
@media (max-width: 480px) {
  .sim-visual-host,
  .sim-video-frame,
  .sim-fallback-visual {
    min-height: 140px !important;
    max-height: 30vh !important;
  }
}

/* ── 11. Sim cards: readable text on small screens ──────── */
@media (max-width: 600px) {
  .sim-atc-text { font-size: 1rem !important; line-height: 1.55 !important; }
  .sim-readback-input,
  .sim-readback-priority-input {
    font-size: 16px !important;   /* prevent iOS auto-zoom */
    min-height: 80px !important;
  }
}

/* ── 12. Sim focus mode: no nav → full width + safe padding */
@media (max-width: 900px) {
  body.sim-focus-mode .main {
    padding: 12px !important;
  }
}

/* ── 13. Level map: single column for very small screens ─── */
@media (max-width: 480px) {
  .level-map-grid,
  .level-map-grid-pro {
    grid-template-columns: 1fr !important;
  }
}

/* ── 14. Country / phase chip rows: wrap cleanly ─────────── */
@media (max-width: 600px) {
  .level-country-chip { flex-wrap: wrap !important; gap: 4px !important; }
  .sim-card-title-row { gap: 8px !important; }
}

/* ── 15. Route builder: 2-col on tablet, 1-col on phone ──── */
@media (max-width: 600px) {
  .route-builder-four,
  .route-builder-preview {
    grid-template-columns: 1fr !important;
  }
  .custom-route-phase-list { gap: 12px !important; }
}

/* ── 16. Tables: enable touch scroll and remove fixed min ── */
@media (max-width: 600px) {
  table { min-width: 500px !important; }  /* narrower than 800px default */
}
@media (max-width: 400px) {
  table { min-width: 340px !important; }
}

/* ── 17. Topbar: collapse on mobile (we hide it at ≤900px)
        but if visible (admin?), stack it properly ─────────── */
@media (max-width: 600px) {
  .topbar { flex-direction: column !important; align-items: flex-start !important; gap: 8px !important; }
  .user-chip { text-align: left !important; }
}

/* ── 18. Panel close buttons reachable with thumbs ──────── */
@media (max-width: 768px) {
  .panel-close-btn,
  [class*="close-btn"] {
    min-width: 44px !important;
    min-height: 44px !important;
  }
}

/* ── 19. Welcome hero: hide min-height constraint on phone ─ */
@media (max-width: 480px) {

.analytics-dashboard-shell > *,
.content-grid > * {

}

/* ── 22. Testimonials carousel: constrain track-wrap width ─ */

/* ── 25. Ops copy: remove max-width cap on narrow screens ── */

/* ── 26. Panel closeable: add padding-top so close btn

/* ── GAS skeleton loader ──────────────────────────────────────── */

  display: flex;

  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;

  align-items: center;
  gap: 8px;

  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(170,170,170,0.6);
  display: inline-block;
  animation: gas-blink 0.9s step-end infinite;
}
@keyframes gas-blink { 0%,100%{opacity:1} 50%{opacity:0} }
.gas-skeleton-sub {
  font-size: 12px;
  color: var(--muted);
  opacity: 0.45;
  margin: 0;
