<style>
  :root {
    --bg: #0d0d0d;
    --panel: rgba(18, 18, 18, 0.97);
    --panel-soft: rgba(26, 26, 26, 0.80);
    --line: rgba(186, 186, 186, 0.12);
    --text: #cacaca;
    --muted: #808080;
    --cyan: #aaaaaa;
    --silver: #bebebe;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --white: #ffffff;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 0%,   rgba(175, 175, 175, 0.07), transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(140, 140, 140, 0.05), transparent 45%),
      linear-gradient(180deg, #161616 0%, #0d0d0d 55%, #080808 100%);
    color: var(--text);
    font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
  }

  .app-shell {
    min-height: 100vh;
  }

  .screen {
    display: none;
    min-height: 100vh;
  }

  .screen.active {
    display: flex;
  }

  /* App screen stacks topnav above main content */
  #appScreen.active {
    flex-direction: column;
  }

  /* ── Login screen — animated aurora background ─────────────────── */
  #loginScreen {
    position: relative;
    background: #000;
    overflow: hidden;
  }

  #loginScreen::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 18% 80%, rgba(0,212,142,0.13) 0%, transparent 48%),
      radial-gradient(ellipse at 82% 18%, rgba(59,130,246,0.10) 0%, transparent 48%),
      radial-gradient(ellipse at 55% 55%, rgba(0,212,142,0.05) 0%, transparent 55%);
    animation: loginAurora 18s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  #loginScreen::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  #loginScreen > * { position: relative; z-index: 1; }

  @keyframes loginAurora {
    0%   { transform: scale(1)    rotate(0deg);   opacity: 1;   }
    40%  { transform: scale(1.08) rotate(4deg);   opacity: 0.8; }
    100% { transform: scale(0.96) rotate(-3deg);  opacity: 1;   }
  }

  /* Login card — green ambient glow */
  .login-card {
    box-shadow:
      0 24px 80px rgba(0,0,0,0.75),
      0 0 0 1px rgba(190,190,190,0.08),
      inset 0 1px 0 rgba(210,210,210,0.07),
      0 0 80px rgba(0,212,142,0.07);
    animation: cardPulse 6s ease-in-out infinite;
  }

  @keyframes cardPulse {
    0%, 100% { box-shadow: 0 24px 80px rgba(0,0,0,0.75), 0 0 0 1px rgba(190,190,190,0.08), inset 0 1px 0 rgba(210,210,210,0.07), 0 0 80px rgba(0,212,142,0.07); }
    50%       { box-shadow: 0 24px 80px rgba(0,0,0,0.75), 0 0 0 1px rgba(190,190,190,0.08), inset 0 1px 0 rgba(210,210,210,0.07), 0 0 120px rgba(0,212,142,0.13); }
  }

  /* ── Top navigation bar ───────────────────────────────────────── */
  .app-topnav {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 24px;
    background: rgba(8, 8, 8, 0.97);
    border-bottom: none;
    position: sticky;
    top: 0;
    z-index: 200;
    backdrop-filter: blur(14px);
    flex-shrink: 0;
  }

  .app-topnav::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(0,212,142,0.5) 30%,
      rgba(59,130,246,0.35) 65%,
      transparent 100%);
    pointer-events: none;
  }

  /* ── App screen — subtle dot-grid background ───────────────────── */
  #appScreen {
    background:
      radial-gradient(ellipse at 50% 0%, rgba(0,212,142,0.04) 0%, transparent 55%),
      #060809;
  }

  #appScreen::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.022) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  #appScreen > * { position: relative; z-index: 1; }

  /* Active nav — green indicator instead of gray */
  .topnav-nav .nav-item.active {
    background: rgba(0,212,142,0.10);
    border-color: rgba(0,212,142,0.30);
    color: #00d48e;
  }

  .topnav-nav .nav-item:hover {
    border-color: rgba(0,212,142,0.22);
    background: rgba(0,212,142,0.06);
    color: #e8f5f0;
  }

  .topnav-brand {
    display: flex;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
  }

  .brand-logo-topnav {
    width: auto;
    height: 46px;
    max-width: 160px;
    object-fit: contain;
    flex-shrink: 0;
  }

  /* Text block hidden — logo already carries the brand name */
  .topnav-brand > div {
    display: none;
  }

  .topnav-nav {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
    flex-wrap: wrap;
  }

  .topnav-nav .nav-item {
    padding: 7px 14px;
    border-radius: 10px;
    font-size: 0.78rem;
    font-weight: 650;
    text-align: center;
    border: 1px solid transparent;
    background: transparent;
  }

  .topnav-nav .nav-item:hover {
    border-color: rgba(175, 175, 175, 0.50);
    background: rgba(168, 168, 168, 0.10);
    transform: none;
  }

  .topnav-nav .nav-item.active {
    background: rgba(175, 175, 175, 0.14);
    border-color: rgba(175, 175, 175, 0.45);
    color: var(--silver);
  }

  .topnav-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .topnav-btn {
    padding: 7px 14px !important;
    font-size: 0.75rem !important;
    border-radius: 10px !important;
  }

  .login-card {
    width: min(520px, calc(100% - 32px));
    margin: auto;
    padding: 40px 36px 36px;
    border: 1px solid rgba(184, 184, 184, 0.15);
    border-radius: 28px;
    background: linear-gradient(145deg, rgba(19, 19, 19, 0.99), rgba(13, 13, 13, 0.97));
    box-shadow:
      0 24px 80px rgba(0, 0, 0, 0.65),
      0 0 0 1px rgba(190, 190, 190, 0.08),
      inset 0 1px 0 rgba(210, 210, 210, 0.07);
    text-align: center;
  }

  .eyebrow {
    margin: 0 0 8px;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-size: 0.72rem;
    font-weight: 700;
  }

  h1,
  h2,
  h3 {
    margin: 0;
  }

  h1 {
    font-size: 2.4rem;
    line-height: 1;
  }

  .subtitle {
    color: var(--muted);
    line-height: 1.6;
    margin: 18px 0 28px;
  }

  .message {
    margin-top: 18px;
    color: var(--yellow);
    font-size: 0.9rem;
    line-height: 1.45;
    word-break: break-word;
  }

  .login-footer {
    margin-top: 24px;
    color: var(--muted);
    font-size: 0.78rem;
  }

  .brand-logo-hero {
    width: 420px;
    max-width: 92%;
    height: auto;
    margin: 0 auto 22px;
    display: block;
    object-fit: contain;
    filter: drop-shadow(0 0 32px rgba(255,255,255,0.12));
  }

  .radar-orb {
    width: 112px;
    height: 112px;
    margin: 0 auto 24px;
    border: 1px solid rgba(155, 155, 155, 0.45);
    border-radius: 999px;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(circle, rgba(155, 155, 155, 0.20) 0 2px, transparent 3px),
      repeating-radial-gradient(circle, transparent 0 22px, rgba(155, 155, 155, 0.18) 23px 24px);
  }

  .radar-line {
    position: absolute;
    width: 50%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan));
    top: 50%;
    left: 50%;
    transform-origin: left center;
    animation: sweep 2.2s linear infinite;
  }

  @keyframes sweep {
    from {
      transform: rotate(0deg);
    }

    to {
      transform: rotate(360deg);
    }
  }

  .login-form {
    display: grid;
    gap: 12px;
    margin-top: 22px;
  }

  .auth-mode-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 22px;
  }

  .auth-mode-tabs + .login-form {
    margin-top: 12px;
  }

  .input {
    width: 100%;
    border: 1px solid var(--line);
    background: rgba(232, 232, 232, 0.96);
    color: #080808;
    border-radius: 14px;
    padding: 13px 14px;
    outline: none;
    font-size: 0.95rem;
  }

  .input::placeholder {
    color: rgba(18, 18, 18, 0.55);
  }

  .input:focus {
    border-color: rgba(155, 155, 155, 0.72);
    box-shadow: 0 0 0 3px rgba(155, 155, 155, 0.12);
  }

  .otp-box {
    display: grid;
    gap: 12px;
  }

  .code-input {
    text-align: center;
    letter-spacing: 0.25em;
    font-size: 1.2rem;
    font-weight: 800;
  }

  .sidebar {
    width: 280px;
    padding: 24px;
    border-right: 1px solid rgba(184, 184, 184, 0.10);
    background: rgba(14, 14, 14, 0.88);
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-logo-sidebar {
    width: 64px;
    height: 64px;
    border-radius: 14px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .sim-header-brand {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .sim-header-logo {
    width: auto;
    height: 44px;
    max-width: 120px;
    object-fit: contain;
    flex-shrink: 0;
  }

  .brand-icon {
    width: 42px;
    height: 42px;
    border-radius: 14px;
    background: rgba(155, 155, 155, 0.14);
    display: grid;
    place-items: center;
    color: var(--cyan);
  }

  .brand span {
    display: block;
    color: var(--muted);
    font-size: 0.78rem;
    margin-top: 4px;
  }

  nav {
    display: grid;
    gap: 10px;
  }

  .nav-item,
  .btn {
    border: 1px solid var(--line);
    color: var(--text);
    background: rgba(18, 18, 18, 0.7);
    border-radius: 14px;
    padding: 12px 14px;
    cursor: pointer;
    transition: 0.2s ease;
    text-align: left;
    font-weight: 650;
  }

  .nav-item:hover,
  .btn:hover {
    border-color: rgba(175, 175, 175, 0.80);
    background: rgba(168, 168, 168, 0.12);
    transform: translateY(-1px);
  }

  .nav-item.active {
    background: linear-gradient(135deg, rgba(175, 175, 175, 0.20), rgba(148, 148, 148, 0.10));
    border-color: rgba(175, 175, 175, 0.65);
    color: var(--silver);
  }

  .gam-nav-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 17px;
    height: 17px;
    border-radius: 9px;
    background: #ef4444;
    color: #fff;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 0 4px;
    margin-left: 6px;
    vertical-align: middle;
    box-shadow: 0 0 7px rgba(239,68,68,0.65);
    animation: navBadgePulse 2s ease-in-out infinite;
  }

  @keyframes navBadgePulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.2); }
  }

  /* ── Tour banner ──────────────────────────────────────────────── */
  .gam-tour-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 26px;
    background: rgba(218,165,32,0.06);
    border-bottom: 1px solid rgba(218,165,32,0.16);
    font-size: 0.72rem;
    font-weight: 600;
  }

  .gam-tour-banner--urgent {
    background: rgba(239,68,68,0.06);
    border-bottom-color: rgba(239,68,68,0.2);
  }

  .gam-tour-label {
    color: #DAA520;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.65rem;
    font-weight: 800;
  }

  .gam-tour-countdown { color: #8fa3bb; }
  .gam-tour-countdown--urgent { color: #f87171; }

  .gam-dxp-badge {
    background: linear-gradient(135deg, #DAA520, #b8860b);
    color: #07101e;
    font-size: 0.58rem;
    font-weight: 800;
    letter-spacing: 0.07em;
    padding: 2px 7px;
    border-radius: 4px;
  }

  /* ── Leaderboard sub-tabs ─────────────────────────────────────── */
  .gam-lb-tabs {
    display: flex;
    gap: 0;
    padding: 0 26px;
    background: rgba(7,16,30,0.5);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .gam-lb-tab {
    padding: 10px 18px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: #4a6280;
    font-size: 0.76rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.03em;
    transition: color 0.2s, border-color 0.2s;
    margin-bottom: -1px;
    white-space: nowrap;
  }

  .gam-lb-tab.active {
    color: #dde6f0;
    border-bottom-color: #DAA520;
  }

  .gam-lb-tab:hover:not(.active) { color: #8fa3bb; }

  /* ── Streak chip ─────────────────────────────────────────────── */
  .gam-streak-chip {
    display: inline-flex;
    align-items: center;
    margin-top: 5px;
    padding: 3px 9px;
    background: rgba(245,158,11,0.09);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 6px;
    color: #fbbf24;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  /* Career board streak chip (inline in row) */
  .gam-lb-row .gam-streak-chip {
    margin-top: 0;
    margin-left: 6px;
    padding: 1px 5px;
    font-size: 0.58rem;
  }

  /* ── Critical Scenario flash ─────────────────────────────────── */
  @keyframes gam-critical-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(218,165,32,0.5); }
    60%  { box-shadow: 0 0 0 8px rgba(218,165,32,0); }
    100% { box-shadow: 0 0 0 0 rgba(218,165,32,0); }
  }

  .gam-critical-flash {
    background: rgba(218,165,32,0.08) !important;
    border: 1px solid rgba(218,165,32,0.3) !important;
    border-radius: 10px;
    animation: gam-critical-pulse 1s ease-out 2;
    transition: background 0.3s, border 0.3s;
  }

  /* ── Leaderboard / squadron loading & empty states ──────────── */
  .gam-lb-loading,
  .gam-empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 48px 24px;
    color: #8fa3bb;
    font-size: 0.88rem;
    text-align: center;
  }
  .gam-lb-loading::before {
    content: '';
    width: 32px; height: 32px;
    border: 3px solid rgba(255,255,255,0.08);
    border-top-color: #00d48e;
    border-radius: 50%;
    animation: appSpin 0.75s linear infinite;
    flex-shrink: 0;
  }

  .gam-critical-badge {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg,#DAA520,#b8860b);
    color: #0d1526;
    font-size: 0.6rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 10;
    top: -10px;
  }

  .btn {
    text-align: center;
  }

  .btn:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    transform: none;
  }

  .btn.primary {
    background: linear-gradient(160deg, rgba(175, 175, 175, 0.22), rgba(148, 148, 148, 0.14));
    border-color: rgba(175, 175, 175, 0.70);
    color: var(--silver);
  }

  .btn.secondary {
    background: rgba(18, 18, 18, 0.78);
  }

  .btn.danger {
    background: rgba(239, 68, 68, 0.16);
    border-color: rgba(239, 68, 68, 0.5);
  }

.btn.full {
  width: 100%;
  margin-top: auto;
}

.global-smart-back {
  justify-self: start;
  width: auto;
  min-width: 140px;
  padding: 9px 14px;
  border-radius: 14px;
}

  .main {
    flex: 1;
    min-width: 0;
    padding: 28px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: center;
    margin-bottom: 24px;
  }

  /* ── Topbar rank display ──────────────────────────────────────── */
  .topbar-name-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .topbar-rank-pill {
    display: inline-flex;
    align-items: center;
    padding: 3px 9px;
    border-radius: 6px;
    font-size: 0.63rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid;
    line-height: 1;
    white-space: nowrap;
    margin-bottom: 2px;
  }

  .topbar-rank-stripes {
    display: flex;
    align-items: center;
    gap: 3px;
    margin-top: 5px;
  }

  .topbar-rank-progress {
    margin-top: 7px;
    min-width: 160px;
    max-width: 220px;
  }

  .topbar-rank-progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .topbar-rank-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s ease;
  }

  .topbar-rank-progress-label {
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    opacity: 0.85;
  }

  /* ── User chip ────────────────────────────────────────────────── */
  .user-chip {
    border: 1px solid var(--line);
    background: rgba(18, 18, 18, 0.7);
    border-radius: 18px;
    padding: 12px 16px;
    text-align: right;
  }

  .user-chip span {
    display: block;
    color: var(--silver);
    font-weight: 800;
  }

  .user-chip small {
    color: var(--muted);
  }

  .content-grid {
    display: grid;
    gap: 18px;
  }

  .panel,
  .metric-card {
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.18);
  }

  .center-panel {
    width: min(520px, calc(100% - 32px));
    margin: auto;
    text-align: center;
  }

  .metrics {
    display: grid;
    grid-template-columns: repeat(4, minmax(160px, 1fr));
    gap: 16px;
  }

  .metric-card strong {
    display: block;
    font-size: 2rem;
    margin-top: 8px;
  }

  .metric-card span {
    color: var(--muted);
    font-size: 0.86rem;
  }

  .table-wrap {
    overflow: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 800px;
  }

  th,
  td {
    padding: 12px;
    border-bottom: 1px solid var(--line);
    text-align: left;
    font-size: 0.9rem;
    vertical-align: top;
  }

  th {
    color: var(--silver);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .status {
    display: inline-flex;
    padding: 4px 9px;
    border-radius: 999px;
    font-size: 0.74rem;
    font-weight: 800;
  }

  .status.ACTIVE {
    color: var(--green);
    background: rgba(34, 197, 94, 0.14);
  }

  .status.PENDING {
    color: var(--yellow);
    background: rgba(234, 179, 8, 0.14);
  }

  .status.BLOCKED {
    color: var(--red);
    background: rgba(239, 68, 68, 0.14);
  }

  .scenario-card {
    border-left: 4px solid var(--cyan);
  }

  .scenario-grid {
    display: grid;
    gap: 18px;
  }

  .scenario-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin: 14px 0;
  }

  .pill {
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 10px;
    color: var(--muted);
    background: rgba(18, 18, 18, 0.66);
    font-size: 0.78rem;
    font-weight: 700;
  }

  .training-panel {
    display: grid;
    gap: 18px;
  }

  .transmission-box {
    border: 1px solid rgba(155, 155, 155, 0.38);
    background:
      linear-gradient(135deg, rgba(155, 155, 155, 0.10), rgba(18, 18, 18, 0.7));
    border-radius: 20px;
    padding: 22px;
    font-size: 1.2rem;
    line-height: 1.55;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .field-label {
    color: var(--silver);
    font-weight: 800;
    text-transform: uppercase;
    font-size: 0.76rem;
    letter-spacing: 0.14em;
  }

  .textarea {
    width: 100%;
    resize: vertical;
    min-height: 120px;
    border: 1px solid var(--line);

/* ── Variable Ratio Priority Clearance system ─────────────────────────────── */
.level-card-pro.vr-event {
  position: relative;
  overflow: hidden;
}
.level-card-pro.vr-priority {
  border-color: rgba(245,158,11,0.55);
  box-shadow: 0 22px 60px rgba(0,0,0,0.22), 0 0 32px rgba(245,158,11,0.10);
  animation: vrCardAmbientPriority 3.2s ease-in-out infinite;
}
.level-card-pro.vr-critical {
  border-color: rgba(239,68,68,0.55);
  box-shadow: 0 22px 60px rgba(0,0,0,0.22), 0 0 32px rgba(239,68,68,0.12);
  animation: vrCardAmbientCritical 2.4s ease-in-out infinite;
}
.level-card-pro.vr-double {
  border-color: rgba(218,165,32,0.60);
  box-shadow: 0 22px 60px rgba(0,0,0,0.22), 0 0 44px rgba(218,165,32,0.16);
  animation: vrCardAmbientDouble 3.8s ease-in-out infinite;
}
.level-card-pro.vr-hot {
  border-color: rgba(0,212,142,0.42);
  box-shadow: 0 22px 60px rgba(0,0,0,0.20), 0 0 24px rgba(0,212,142,0.08);
}

/* Radar sweep scanline */
.level-card-pro.vr-event::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.025) 50%, transparent 100%);
  animation: vrRadarSweep 4.5s linear infinite;
  pointer-events: none;
}

@keyframes vrRadarSweep {
  0%   { left: -60%; }
  100% { left: 140%; }
}
@keyframes vrCardAmbientPriority {
  0%, 100% { box-shadow: 0 22px 60px rgba(0,0,0,0.22), 0 0 32px rgba(245,158,11,0.10); }
  50%       { box-shadow: 0 22px 60px rgba(0,0,0,0.26), 0 0 48px rgba(245,158,11,0.22); }
}
@keyframes vrCardAmbientCritical {
  0%, 100% { box-shadow: 0 22px 60px rgba(0,0,0,0.22), 0 0 32px rgba(239,68,68,0.12); }
  50%       { box-shadow: 0 22px 60px rgba(0,0,0,0.28), 0 0 52px rgba(239,68,68,0.26); }
}
@keyframes vrCardAmbientDouble {
  0%, 100% { box-shadow: 0 22px 60px rgba(0,0,0,0.22), 0 0 44px rgba(218,165,32,0.16); }
  50%       { box-shadow: 0 22px 60px rgba(0,0,0,0.28), 0 0 64px rgba(218,165,32,0.30); }
}

/* ── Level card — full-bleed image layout ─────────────────────────────────── */

.level-card-pro {
  position: relative;
  overflow: hidden;
  min-height: 260px;
  padding: 0;
  border-radius: 22px;
  display: flex;
  flex-direction: column;
}

/* Remove heavy opacity on locked */
.level-card-pro.is-locked { opacity: 1; }

/* Background image layer */
.lc-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  transition: transform 0.5s ease;
}
.level-card-pro:hover .lc-bg { transform: scale(1.04); }

/* Dark gradient overlay — stronger at bottom for text legibility */
.lc-overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg,
      rgba(0,0,0,0.25) 0%,
      rgba(0,0,0,0.45) 40%,
      rgba(0,0,0,0.82) 75%,
      rgba(0,0,0,0.94) 100%);
  pointer-events: none;
}

/* Locked overlay — additional blur+darken */
.lc-overlay--locked {
  background:
    linear-gradient(180deg,
      rgba(0,0,0,0.55) 0%,
      rgba(0,0,0,0.72) 100%);
  backdrop-filter: blur(3px);
}

/* All card content sits above the image */
.lc-content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  height: 100%;
  padding: 18px 20px 18px;
  gap: 0;
  flex: 1;
}

  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 12px;

  align-items: center;

  border-radius: 999px;
  font-size: 0.6rem;
  font-weight: 800;

  backdrop-filter: blur(6px);
  flex-shrink: 0;

  font-weight: 900;
  letter-spacing: 0.05em;

.sim-hero-card,
.sim-stage-card,

}

}

.sim-chip-stack {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.sim-chip {
  padding: 8px 12px;

  border: 1px solid rgba(155, 155, 155, 0.24);

}

.sim-main-column,
.sim-side-column {
  display: grid;
  gap: 18px;
}

.sim-stage-card,
.sim-atc-card,

}

.sim-live-dot::before {
  content: '';

  height: 9px;
  border-radius: 999px;

}

.sim-visual-host {

  min-height: 460px;
  background: #080808;
  border: 1px solid rgba(155, 155, 155, 0.18);
}

.sim-video-frame {
  position: relative;
  width: 100%;
  min-height: 460px;
  aspect-ratio: 16 / 9;
  background: #000;
}

.sim-video-iframe,
.sim-video-native {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
  object-fit: cover;
  background: #000;
}

.sim-fallback-visual {
  position: relative;
  min-height: 460px;
  background:

    linear-gradient(180deg, #0a0b0d 0%, #07080a 100%);
  overflow: hidden;
}

.sim-fallback-overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(rgba(155, 155, 155, 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(155, 155, 155, 0.06) 1px, transparent 1px);

}

  display: flex;
  justify-content: space-between;
  padding: 16px 20px;
  color: #bebebe;
  font-weight: 800;
  letter-spacing: 0.08em;
  font-size: 0.78rem;
}

.sim-fallback-center {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
}

.sim-radar-ring {
  position: absolute;
  border: 1px solid rgba(155, 155, 155, 0.22);
  border-radius: 999px;
}

.sim-radar-ring.ring-1 { width: 120px; height: 120px; }
.sim-radar-ring.ring-2 { width: 220px; height: 220px; }
.sim-radar-ring.ring-3 { width: 320px; height: 320px; }

.sim-radar-sweep {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 160px;
  height: 2px;
  background: linear-gradient(90deg, rgba(155, 155, 155, 0.85), rgba(155, 155, 155, 0.28), transparent);
  transform-origin: 0 50%;
  animation: simSweep 4s linear infinite;
  box-shadow: 0 0 14px rgba(155, 155, 155, 0.36);
  pointer-events: none;
}

  position: relative;
  z-index: 2;

  place-items: center;

  height: 42px;

  line-height: 1;
  overflow: visible;
  filter: drop-shadow(0 0 14px rgba(155, 155, 155, 0.55));
}

  from { transform: translateY(-50%) rotate(0deg); }
  to   { transform: translateY(-50%) rotate(360deg); }
}

}

.sim-side-grid {

}

.sim-side-item {

  color: #f4f4f4;
  font-size: 0.96rem;

}

.sim-briefing-box {
  padding: 14px;
  border-radius: 16px;
  background: rgba(12, 12, 12, 0.42);

  min-height: 130px;
}

.sim-readback-input {

.sim-action-row {
  display: flex;
  justify-content: space-between;

  flex-wrap: wrap;
}

.legacy-bridge-field {
  display: none !important;
}

@media (max-width: 1180px) {

.cabina-player-status {
  font-size: 0.72rem;
  color: #4c4c4c;
  font-family: 'Courier New', Courier, monospace;
  letter-spacing: 0.04em;
}

.cabina-player-status.ok { color: #22c55e; }
.cabina-player-status.warn { color: #fbbf24; }

/* Phase selector (right column) */
.cabina-readbacks {
  overflow-y: auto;
  max-height: calc(100vh - 120px);
}

.cabina-phase-item {
  border-bottom: 1px solid rgba(155, 155, 155, 0.07);
  padding: 11px 14px;
  cursor: pointer;
  transition: background 0.18s;
}

.cabina-phase-item:hover {
  background: rgba(155, 155, 155, 0.04);
}

.cabina-phase-item.active {
  background: rgba(155, 155, 155, 0.07);
  border-left: 2px solid #969696;
}

.cabina-phase-item:last-child {
  border-bottom: none;
}

.cabina-phase-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 8px;
}

.cabina-phase-name {
  font-size: 0.68rem;
  font-weight: 900;
  letter-spacing: 0.1em;
  color: #969696;
  text-transform: uppercase;
}

.cabina-phase-badge {
  font-size: 0.58rem;
  font-weight: 900;
  padding: 2px 7px;
  border-radius: 999px;
  background: rgba(155, 155, 155, 0.1);
  border: 1px solid rgba(155, 155, 155, 0.18);
  color: #bebebe;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  flex-shrink: 0;
}

.cabina-atc-block {
  background: rgba(0, 20, 8, 0.6);
  border: 1px solid rgba(155, 155, 155, 0.1);
  border-radius: 6px;
  padding: 7px 10px;
  margin-bottom: 5px;
}

.cabina-atc-text {
  font-size: 0.76rem;
  color: #4ade80;
  font-family: 'Courier New', Courier, monospace;
  line-height: 1.55;
  text-shadow: 0 0 4px rgba(74, 222, 128, 0.3);
  word-break: break-word;
}

.cabina-readback-block {
  background: rgba(40, 25, 0, 0.5);
  border: 1px solid rgba(251, 191, 36, 0.14);
  border-radius: 6px;
  padding: 7px 10px;
}

.cabina-readback-text {
  font-size: 0.76rem;
  color: #fbbf24;
  font-family: 'Courier New', Courier, monospace;
  line-height: 1.55;
  text-shadow: 0 0 4px rgba(251, 191, 36, 0.3);
  word-break: break-word;
}

/* Cabina admin tabs row inside header */
.cabina-tabs-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.cabina-tabs-row .btn {
  padding: 5px 12px;
  font-size: 0.72rem;
}

.sim-cockpit {
  display: grid;
  grid-template-columns: minmax(0, 1.75fr) minmax(360px, 0.85fr);
  column-gap: 14px;
  align-items: start;
  padding-bottom: 0;
}

.sim-left-col {
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 0;
}

.sim-cockpit-header {
  border: 1px solid rgba(148, 148, 148, 0.18);
  background:
    radial-gradient(circle at top left, rgba(155, 155, 155, 0.1), transparent 32%),
    linear-gradient(160deg, rgba(26, 26, 26, 0.99) 0%, rgba(16, 16, 16, 0.99) 50%, rgba(9, 9, 9, 0.99) 100%);
  border-radius: 20px;
  padding: 9px 12px;
  display: flex;
  justify-content: space-between;
  gap: 14px;
  align-items: center;
  flex-wrap: wrap;
}

.sim-cockpit-header h2 {
  margin: 0 0 3px;
  font-size: clamp(1.05rem, 1.35vw, 1.38rem);
}

.sim-cockpit-header .eyebrow {
  margin-bottom: 4px;
}

.sim-cockpit-header .subtitle {
  margin: 0;
  line-height: 1.35;
}

.sim-cockpit-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.sim-cockpit-actions .btn,
.sim-cockpit-actions .sim-chip {
  padding: 7px 10px;
}

/* Pause button — estado activo (reproduciendo) */
#simMediaPauseBtn {
  transition: background 0.2s, color 0.2s, border-color 0.2s;
}

/* Indicador visual de PAUSA ACTIVA en el header del cockpit */
.sim-paused-banner {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 9999;
  background: rgba(234, 179, 8, 0.9);
  color: #111111;
  font-size: 0.78rem;
  font-weight: 900;
  letter-spacing: 0.15em;
  text-align: center;
  padding: 4px 0;
  text-transform: uppercase;
}

body.sim-paused .sim-paused-banner {
  display: block;
}

body.sim-paused #simMediaPauseBtn {
  background: var(--yellow);
  border-color: var(--yellow);
  color: #111111;
  font-weight: 900;
}

.flight-progress-canvas.pro {
  width: 100%;
  height: 42px;
  display: block;
  box-sizing: border-box;
  border: 1px solid rgba(148, 148, 148, 0.16);
  border-radius: 15px;
  background: rgba(18, 18, 18, 0.96);
  padding: 0;
}

.sim-priority-main {
  display: grid;
  gap: 8px;
  min-width: 0;
  overflow: hidden;
}

.sim-priority-side {
  display: grid;
  gap: 10px;
  min-width: 0;
}

.sim-video-priority-card,
.sim-radio-card,
.sim-readback-priority-card,
.sim-side-card.compact {
  border: 1px solid rgba(148, 148, 148, 0.18);
  background:
    radial-gradient(circle at top left, rgba(155, 155, 155, 0.08), transparent 32%),
    linear-gradient(160deg, rgba(26, 26, 26, 0.99) 0%, rgba(16, 16, 16, 0.99) 50%, rgba(9, 9, 9, 0.99) 100%);
  border-radius: 20px;
  padding: 12px;
  box-shadow: 0 24px 70px rgba(0, 0, 0, 0.22);
}

.sim-section-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 9px;
  color: #969696;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 900;
  flex-wrap: wrap;
}

.sim-helper-text {
  color: #8c8c8c;
  font-size: 0.74rem;
  text-transform: none;
  letter-spacing: 0;
}

.sim-live-dot {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: #bebebe;
  font-size: 0.72rem;
  font-weight: 900;
}

.sim-live-dot::before {
  content: '';
  width: 9px;
  height: 9px;
  border-radius: 999px;
  background: #10b981;
  box-shadow: 0 0 0 6px rgba(16, 185, 129, 0.16);
}

.sim-visual-priority-host {
  border-radius: 18px;
  overflow: hidden;
  min-height: clamp(360px, calc(100vh - 226px), 560px);
  background: #080808;
  border: 1px solid rgba(155, 155, 155, 0.18);
}

.sim-video-frame {
  position: relative;
  width: 100%;
  max-width: 100%;
  min-height: clamp(360px, calc(100vh - 226px), 560px);
  aspect-ratio: 16 / 9;
  background: #000;
  overflow: hidden;
}

/* Transparent overlay — blocks all mouse interaction with the video */
.sim-video-frame::after {
  content: '';
  position: absolute;
  inset: 0;
  z-index: 10;
  cursor: default;
}

.sim-video-iframe,
.sim-video-native {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
  object-fit: cover;
  background: #000;
  pointer-events: none;
}

/* Push Google Drive controls bar below the clip boundary */
.sim-video-frame--drive {
  overflow: hidden;
}
.sim-video-frame--drive .sim-video-iframe {
  height: calc(100% + 96px);
  image-rendering: high-quality;
  -webkit-font-smoothing: antialiased;
  transform: translateZ(0); /* force GPU compositing layer */
}

.sim-fallback-visual.pro {
  position: relative;
  min-height: clamp(360px, calc(100vh - 226px), 560px);
  background:
    radial-gradient(circle at center, rgba(155, 155, 155, 0.1), transparent 35%),
    linear-gradient(180deg, #0a0b0d 0%, #07080a 100%);
  overflow: hidden;
}

.sim-fallback-visual.pro::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(rgba(155, 155, 155, 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(155, 155, 155, 0.06) 1px, transparent 1px);
  background-size: 46px 46px;
}

.sim-fallback-hud {
  position: relative;
  z-index: 2;
  display: flex;
  justify-content: space-between;
  padding: 18px 20px;
  color: #bebebe;
  font-weight: 900;
  letter-spacing: 0.08em;
  font-size: 0.76rem;
}

.sim-fallback-center {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
}

.sim-radar-ring {
  position: absolute;
  border: 1px solid rgba(155, 155, 155, 0.24);
  border-radius: 999px;
}

.sim-radar-ring.ring-1 { width: 130px; height: 130px; }
.sim-radar-ring.ring-2 { width: 240px; height: 240px; }
.sim-radar-ring.ring-3 { width: 360px; height: 360px; }

.sim-radar-sweep {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 180px;
  height: 2px;
  background: linear-gradient(90deg, rgba(155, 155, 155, 0.9), rgba(155, 155, 155, 0.32), transparent);
  transform-origin: 0 50%;
  animation: simSweep 4s linear infinite;
  box-shadow: 0 0 16px rgba(155, 155, 155, 0.42);
  pointer-events: none;
}

.sim-plane-icon {
  position: relative;
  z-index: 3;
  display: grid;
  place-items: center;
  width: 52px;
  height: 52px;
  color: #bebebe;
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 2.05rem;
  line-height: 1;
  overflow: visible;
  filter: drop-shadow(0 0 18px rgba(155, 155, 155, 0.62));
}

@keyframes simSweep {
  from { transform: translateY(-50%) rotate(0deg); }
  to { transform: translateY(-50%) rotate(360deg); }
}

.sim-radio-console {
  border-radius: 16px;
  padding: 12px;
  background:
    linear-gradient(180deg, rgba(16, 16, 16, 0.9), rgba(16, 16, 16, 0.75));
  border: 1px solid rgba(155, 155, 155, 0.24);
}

.sim-radio-text {
  color: #f4f4f4;
  font-size: clamp(0.9rem, 1vw, 1.05rem);
  line-height: 1.45;
  white-space: pre-wrap;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.sim-data-warning {
  margin-bottom: 12px;
  padding: 12px 14px;
  border-radius: 16px;
  background: rgba(245, 158, 11, 0.12);
  border: 1px solid rgba(245, 158, 11, 0.28);
  color: #fde68a;
  font-size: 0.86rem;
  line-height: 1.5;
}

.sim-readback-priority-input {
  width: 100%;
  min-height: 82px;
  border-radius: 14px;
  padding: 12px;
  border: 1px solid rgba(155, 155, 155, 0.28);
  background: linear-gradient(180deg, rgba(14, 14, 14, 0.94), rgba(10, 10, 10, 0.94));
  color: #f4f4f4;
  resize: vertical;
  font-size: 0.95rem;
  line-height: 1.45;
  outline: none;
  margin-bottom: 10px;
  box-shadow: inset 0 0 0 1px rgba(148, 148, 148, 0.05);
}

.sim-readback-priority-input::placeholder {
  color: rgba(212, 212, 212, 0.68);
}

.sim-readback-priority-input:focus {
  border-color: rgba(155, 155, 155, 0.7);
  box-shadow: 0 0 0 4px rgba(155, 155, 155, 0.14);
}

.sim-action-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.big-action {
  min-width: 180px;
  font-size: 0.95rem;
  padding: 13px 18px;
}

.sim-side-card.compact {
  padding: 10px;
}

.sim-side-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}

.sim-side-item {
  border-radius: 12px;
  padding: 8px 10px;
  background: rgba(12, 12, 12, 0.42);
  border: 1px solid rgba(148, 148, 148, 0.12);
}

.sim-side-item span {
  display: block;
  color: #8c8c8c;
  font-size: 0.64rem;
  margin-bottom: 3px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.sim-side-item strong {
  color: #f4f4f4;
  font-size: 0.84rem;
  line-height: 1.25;
}

.sim-side-item--live {
  border-color: rgba(59, 130, 246, 0.25);
  background: rgba(59, 130, 246, 0.06);
  transition: border-color 0.3s, background 0.3s;
}
.sim-side-item--live span {
  color: #60a5fa;
  letter-spacing: 0.08em;
}
.sim-side-item--live strong {
  font-size: 1.05rem;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.03em;
  color: #e2e8f0;
}
.sim-side-item--live small {
  font-size: 0.62rem;
  color: #8c8c8c;
  font-weight: 400;
}
.sim-side-item--warn {
  border-color: rgba(245, 158, 11, 0.5) !important;
  background: rgba(245, 158, 11, 0.08) !important;
  animation: flightWarnPulse 1.2s ease-in-out infinite;
}
.sim-side-item--warn span {
  color: #fbbf24 !important;
}
@keyframes flightWarnPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(245,158,11,0); }
  50%       { box-shadow: 0 0 8px 2px rgba(245,158,11,0.25); }
}
.flight-target-sub {
  display: block;
  font-size: 0.63rem;
  color: #6ee7b7;
  margin-top: 3px;
  letter-spacing: 0.04em;
  font-variant-numeric: tabular-nums;
}
.flight-target-sub:empty { display: none; }

.back-confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  animation: ffFadeIn 0.15s ease;
}
.back-confirm-card {
  position: relative;
  background: #1a1a2e;
  border: 1px solid rgba(148,148,148,0.18);
  border-radius: 16px;
  padding: 28px 28px 22px;
  width: 300px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.back-confirm-x {
  position: absolute;
  top: 12px;
  right: 14px;
  background: none;
  border: none;
  color: #8c8c8c;
  font-size: 1.3rem;
  line-height: 1;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 6px;
  transition: color 0.15s, background 0.15s;
}
.back-confirm-x:hover { color: #f4f4f4; background: rgba(255,255,255,0.08); }
.back-confirm-title {
  font-size: 1rem;
  font-weight: 600;
  color: #f4f4f4;
  margin: 0 0 6px;
}
.back-confirm-sub {
  font-size: 0.78rem;
  color: #8c8c8c;
  margin: 0 0 20px;
  line-height: 1.45;
}
.back-confirm-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.sim-briefing-box.compact {
  padding: 12px;
  border-radius: 14px;
  background: rgba(12, 12, 12, 0.42);
  border: 1px solid rgba(148, 148, 148, 0.12);
  color: #dedede;
  line-height: 1.4;
  min-height: 72px;
  font-size: 0.92rem;
}

.sim-feedback-box {
  min-height: 50px;
  border-radius: 16px;
  padding: 14px;
  background: rgba(18, 18, 18, 0.42);
  border: 1px solid rgba(148, 148, 148, 0.16);
  color: #c2c2c2;
  margin-bottom: 14px;
}

.sim-feedback-box.warning {
  background: rgba(245, 158, 11, 0.1);
  border-color: rgba(245, 158, 11, 0.24);
  color: #fde68a;
}

.sim-feedback-box.danger {
  background: rgba(127, 29, 29, 0.22);
  border-color: rgba(239, 68, 68, 0.24);
  color: #fecaca;
}

.sim-feedback-box.success {
  background: rgba(6, 78, 59, 0.26);
  border-color: rgba(16, 185, 129, 0.24);
  color: #bbf7d0;
}

.legacy-bridge-field {
  display: none !important;
}

/* ─────────────────────────────────────────────────────────────────────────────
   SIMULATOR VISUAL ENHANCEMENT LAYER
   Brand green (#00d48e) applied purposefully — radar, accents, live states.
───────────────────────────────────────────────────────────────────────────── */

/* ── Radar fallback — green instead of flat gray ── */
.sim-fallback-visual.pro {
  background:
    radial-gradient(ellipse at 50% 60%, rgba(0,212,142,0.09), transparent 52%),
    radial-gradient(circle at 50% 50%, rgba(0,212,142,0.04), transparent 72%),
    linear-gradient(180deg, #060a08 0%, #050808 100%);
}
.sim-fallback-visual.pro::before {
  background:
    linear-gradient(rgba(0,212,142,0.055) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,142,0.055) 1px, transparent 1px);
  background-size: 46px 46px;
}
.sim-radar-ring { border: 1px solid rgba(0,212,142,0.17); }
.sim-radar-ring.ring-1 { box-shadow: 0 0 18px rgba(0,212,142,0.08) inset; }
.sim-radar-ring.ring-3 { box-shadow: 0 0 8px  rgba(0,212,142,0.04) inset; }
.sim-radar-sweep {
  background: linear-gradient(90deg, rgba(0,212,142,0.92), rgba(0,212,142,0.26), transparent);
  box-shadow: 0 0 20px rgba(0,212,142,0.5);
}
.sim-plane-icon {
  color: #00d48e;
  filter: drop-shadow(0 0 22px rgba(0,212,142,0.8));
}

/* ── Section titles — brand green ── */
.sim-section-title { color: #00d48e; letter-spacing: 0.11em; }
.sim-section-title .sim-helper-text { color: #4a6a5e; }

/* ── Live dot — animated green pulse ── */
.sim-live-dot { color: #00d48e; font-weight: 900; }
.sim-live-dot::before {
  background: #00d48e;
  box-shadow: 0 0 0 5px rgba(0,212,142,0.16), 0 0 10px rgba(0,212,142,0.45);
  animation: simLivePulse 2.2s ease-in-out infinite;
}
@keyframes simLivePulse {
  0%, 100% { box-shadow: 0 0 0 5px rgba(0,212,142,0.16), 0 0 10px rgba(0,212,142,0.45); }
  50%       { box-shadow: 0 0 0 9px rgba(0,212,142,0.06), 0 0 22px rgba(0,212,142,0.6);  }
}

/* ── Card accent — thin green shimmer on top edge ── */
.sim-video-priority-card,
.sim-radio-card,
.sim-readback-priority-card {
  position: relative;
  border-color: rgba(0,212,142,0.14);
}
.sim-video-priority-card::before,
.sim-radio-card::before,
.sim-readback-priority-card::before {
  content: '';
  position: absolute;
  top: 0; left: 18px; right: 18px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,212,142,0.38), transparent);
  border-radius: 999px;
  pointer-events: none;
  z-index: 1;
}

/* ── ATC Radio console ── */
.sim-radio-console {
  border-color: rgba(0,212,142,0.18);
  background: linear-gradient(180deg, rgba(6,18,14,0.95), rgba(4,12,9,0.9));
}
.sim-radio-text {
  color: #d4f0e8;
  text-shadow: 0 0 16px rgba(0,212,142,0.15);
}

/* ── Read-back input — green focus ring ── */
.sim-readback-priority-input { border-color: rgba(0,212,142,0.2); }
.sim-readback-priority-input:focus {
  border-color: rgba(0,212,142,0.55);
  box-shadow: 0 0 0 4px rgba(0,212,142,0.1), inset 0 0 10px rgba(0,212,142,0.04);
}

/* ── Flight profile live items — green brand ── */
.sim-side-item--live {
  border-color: rgba(0,212,142,0.22) !important;
  background: rgba(0,212,142,0.06) !important;
}
.sim-side-item--live span { color: #00d48e !important; }
.sim-side-item--live strong { color: #e8f5f0; }

/* ── Side card (Flight Profile) — subtle green border ── */
.sim-side-card.compact { border-color: rgba(0,212,142,0.12); }

/* ── Briefing box — green left accent ── */
.sim-briefing-box.compact {
  border-left: 2px solid rgba(0,212,142,0.32);
  background: rgba(0,212,142,0.03);
}

/* ── Feedback success — more vivid green ── */
.sim-feedback-box.success {
  background: rgba(0,212,142,0.08);
  border-color: rgba(0,212,142,0.32);
  color: #6ee7b7;
  box-shadow: 0 0 14px rgba(0,212,142,0.07);
}

/* ── prog-psy-loading — dynamic ring spinner ── */
.prog-psy-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 48px 24px;
  text-align: center;
}
.prog-psy-loading::before {
  content: '';
  width: 36px; height: 36px;
  border: 3px solid rgba(255,255,255,0.08);
  border-top-color: #00d48e;
  border-radius: 50%;
  animation: appSpin 0.75s linear infinite;
  flex-shrink: 0;
}
.prog-psy-loading p,
.prog-psy-loading .subtitle {
  color: #8fa3bb;
  font-size: 0.88rem;
  margin: 0;
}

@media (max-width: 1180px) {
  .sim-cockpit {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 760px) {
  .sim-cockpit-header,
  .sim-section-title,
  .sim-action-row {
    flex-direction: column;
    align-items: stretch;
  }

  .sim-visual-priority-host,
  .sim-video-frame,
  .sim-fallback-visual.pro {
    min-height: 280px;
  }
}

/*******************************************************
 * ADMIN SCENARIO GENERATOR PRO
 *******************************************************/

.admin-generator-panel {
  max-width: 1280px;
  margin: 0 auto;
}

.admin-generator-header {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  align-items: flex-start;
  margin-bottom: 22px;
  flex-wrap: wrap;
}

.admin-generator-actions,
.admin-generator-bottom-actions,
.admin-quick-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.admin-generator-bottom-actions {
  justify-content: flex-end;
  margin-top: 18px;
}

.admin-form-section {
  border: 1px solid rgba(148, 148, 148, 0.18);
  background:
    radial-gradient(circle at top left, rgba(155, 155, 155, 0.06), transparent 32%),
    rgba(18, 18, 18, 0.74);
  border-radius: 22px;
  padding: 18px;
  margin-bottom: 16px;
}

.admin-section-title {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  margin-bottom: 16px;
}

.admin-section-title > span {
  width: 34px;
  height: 34px;
  border-radius: 12px;
  display: grid;
  place-items: center;
  background: rgba(155, 155, 155, 0.13);
  color: #bebebe;
  font-weight: 900;
  border: 1px solid rgba(155, 155, 155, 0.26);
}

.admin-section-title h4 {
  margin: 0 0 4px;
  color: #f4f4f4;
  font-size: 1.04rem;
}

.admin-section-title p {
  margin: 0;
  color: var(--muted);
  font-size: 0.86rem;
}

.admin-form-grid {
  display: grid;
  gap: 12px;
  margin-bottom: 12px;
}

.admin-form-grid.two {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.admin-form-grid.three {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.admin-field {
  display: grid;
  gap: 7px;
}

.admin-field.full {
  margin-bottom: 12px;
}

.admin-field span {
  color: #c2c2c2;
  font-size: 0.78rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.045em;
}

.admin-field .input,
.admin-field .textarea,
.admin-form-section .input,
.admin-form-section .textarea {
  width: 100%;
}

.admin-big-text {
  min-height: 110px;
}

.mono {
  font-family: Consolas, Monaco, monospace;
}

.checkbox-field {
  align-content: end;
}

.admin-checkbox-line {
  min-height: 44px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: #c2c2c2;
  border: 1px solid rgba(148, 148, 148, 0.18);
  border-radius: 14px;
  padding: 10px 12px;
  background: rgba(12, 12, 12, 0.34);
}

.admin-form-message {
  border-radius: 14px;
  padding: 12px 14px;
  margin-top: 12px;
  background: rgba(12, 12, 12, 0.36);
  border: 1px solid rgba(148, 148, 148, 0.16);
  color: #c2c2c2;
}

.admin-form-message.is-ok {
  background: rgba(6, 78, 59, 0.24);
  border-color: rgba(16, 185, 129, 0.28);
  color: #bbf7d0;
}

.admin-form-message.is-warning {
  background: rgba(245, 158, 11, 0.12);
  border-color: rgba(245, 158, 11, 0.28);
  color: #fde68a;
}

.admin-form-message.is-error {
  background: rgba(127, 29, 29, 0.24);
  border-color: rgba(239, 68, 68, 0.28);
  color: #fecaca;
}

@media (max-width: 980px) {
  .admin-form-grid.two,
  .admin-form-grid.three {
    grid-template-columns: 1fr;
  }

  .admin-generator-header {
    flex-direction: column;
  }

  .admin-generator-actions,
  .admin-generator-bottom-actions {
    width: 100%;
  }
}

/*******************************************************
 * SENIOR PILOT COMPLETION + CERTIFICATE EXPERIENCE
 *******************************************************/

.senior-completion-shell,
.senior-certificate-shell {
  max-width: 1280px;
  margin: 0 auto;
  display: grid;
  gap: 22px;
}

.senior-debrief-hero {
  min-height: 360px;
  border-radius: 34px;
  padding: 36px;
  border: 1px solid rgba(155, 155, 155, 0.22);
  background:
    radial-gradient(circle at 18% 25%, rgba(155, 155, 155, 0.18), transparent 34%),
    radial-gradient(circle at 85% 15%, rgba(16, 185, 129, 0.12), transparent 28%),
    linear-gradient(135deg, rgba(18, 18, 18, 0.98), rgba(3, 7, 18, 0.98));
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 38px;
  align-items: center;
  box-shadow: 0 34px 100px rgba(0, 0, 0, 0.34);
  overflow: hidden;
  position: relative;
}

.senior-debrief-hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(rgba(155, 155, 155, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(155, 155, 155, 0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

.senior-radar-mark {
  width: 260px;
  height: 260px;
  border-radius: 999px;
  position: relative;
  display: grid;
  place-items: center;
  margin: 0 auto;
  background:
    radial-gradient(circle, rgba(155, 155, 155, 0.16), transparent 58%),
    rgba(12, 12, 12, 0.18);
}

.senior-radar-ring {
  position: absolute;
  border-radius: 999px;
  border: 1px solid rgba(155, 155, 155, 0.28);
}

.senior-radar-ring.r1 {
  width: 90px;
  height: 90px;
}

.senior-radar-ring.r2 {
  width: 170px;
  height: 170px;
}

.senior-radar-ring.r3 {
  width: 250px;
  height: 250px;
}

.senior-radar-sweep {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 130px;
  height: 2px;
  background: linear-gradient(90deg, rgba(155, 155, 155, 0.92), rgba(155, 155, 155, 0.32), transparent);
  transform-origin: 0 50%;
  animation: seniorSweep 4.2s linear infinite;
  box-shadow: 0 0 16px rgba(155, 155, 155, 0.42);
  pointer-events: none;
}

.senior-plane {
  position: relative;
  z-index: 3;
  display: grid;
  place-items: center;
  width: 52px;
  height: 52px;
  color: #bebebe;
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 2.1rem;
  line-height: 1;
  filter: drop-shadow(0 0 18px rgba(155, 155, 155, 0.62));
}

@keyframes seniorSweep {
  from {
    transform: translateY(-50%) rotate(0deg);
  }

  to {
    transform: translateY(-50%) rotate(360deg);
  }
}

.certificate-home-shell {
  display: grid;
  gap: 18px;
}

.certificate-home-hero {
  min-height: 340px;
  border-radius: 28px;
  padding: 24px;
  border: 1px solid rgba(148, 148, 148, 0.18);
  background:
    radial-gradient(circle at 18% 20%, rgba(155, 155, 155, 0.12), transparent 34%),
    linear-gradient(135deg, rgba(18, 18, 18, 0.94), rgba(12, 12, 12, 0.96));
  display: grid;
  grid-template-columns: minmax(280px, 0.86fr) minmax(360px, 1.14fr);
  gap: 24px;
  align-items: stretch;
}

.certificate-home-copy {
  align-self: center;
  max-width: 620px;
}

.certificate-home-copy h2 {
  color: #f4f4f4;
  font-size: clamp(2rem, 4vw, 4rem);
  line-height: 0.95;
  margin: 0;
}

.certificate-home-pilot {
  display: inline-grid;
  gap: 5px;
  border-radius: 18px;
  padding: 13px 16px;
  border: 1px solid rgba(155, 155, 155, 0.18);
  background: rgba(12, 12, 12, 0.4);
}

.certificate-home-pilot span,
.certificate-home-card span {
  color: #8c8c8c;
  font-size: 0.72rem;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.certificate-home-pilot strong,
.certificate-home-card strong {
  color: #f4f4f4;
}

.certificate-radar-preview {
  min-height: 292px;
  border-radius: 24px;
  border: 1px solid rgba(155, 155, 155, 0.18);
  background: rgba(12, 12, 12, 0.36);
  position: relative;
  overflow: hidden;
  display: grid;
  place-items: center;
}

.certificate-radar-grid {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(rgba(155, 155, 155, 0.055) 1px, transparent 1px),
    linear-gradient(90deg, rgba(155, 155, 155, 0.055) 1px, transparent 1px);
  background-size: 52px 52px;
  opacity: 0.9;
}

.certificate-radar-preview .senior-radar-mark {
  z-index: 1;
}

.certificate-radar-hud {
  position: absolute;
  left: 16px;
  right: 16px;
  bottom: 14px;
  display: flex;
  justify-content: space-between;
  gap: 14px;
  color: #bebebe;
  font-weight: 900;
  letter-spacing: 0.06em;
  font-size: 0.78rem;
}

.certificate-home-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(180px, 1fr));
  gap: 16px;
}

.certificate-home-card {
  border-radius: 22px;
  padding: 18px;
  border: 1px solid rgba(148, 148, 148, 0.16);
  background:
    radial-gradient(circle at top left, rgba(155, 155, 155, 0.07), transparent 34%),
    rgba(18, 18, 18, 0.88);
  display: grid;
  gap: 8px;
}

.certificate-home-card small {
  color: #8c8c8c;
  line-height: 1.45;
}

.certificates-earned-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
  padding: 16px 0;
}
.certificate-earned-card {
  border-radius: 18px;
  padding: 16px 18px;
  border: 1px solid rgba(148,148,148,0.18);
  background: linear-gradient(160deg, rgba(26,26,26,0.99) 0%, rgba(14,14,14,0.99) 100%);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.cert-card-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.cert-card-level {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: .08em;
  color: #d4d4d4;
  text-transform: uppercase;
}
.cert-card-id {
  font-size: 0.6rem;
  color: #5a5a5a;
  font-family: monospace;
}
.cert-card-body strong {
  display: block;
  font-size: 0.95rem;
  color: #e8e8e8;
}
.cert-card-body small {
  font-size: 0.72rem;
  color: #8c8c8c;
}
.cert-card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  font-size: 0.72rem;
  color: #8c8c8c;
}

.senior-debrief-copy {
  position: relative;
  z-index: 2;
}

.senior-debrief-copy h1 {
  margin: 8px 0 14px;
  font-size: clamp(2.4rem, 5vw, 5.2rem);
  letter-spacing: -0.055em;
  line-height: 0.95;
}

.senior-lead {
  color: #c2c2c2;
  font-size: clamp(1rem, 1.5vw, 1.25rem);
  line-height: 1.65;
  max-width: 820px;
}

.senior-verdict {
  margin-top: 24px;
  display: inline-grid;
  gap: 5px;
  border-radius: 18px;
  padding: 14px 18px;
  border: 1px solid rgba(16, 185, 129, 0.28);
  background: rgba(6, 78, 59, 0.28);
}

.senior-verdict span {
  color: #6ee7b7;
  font-size: 0.72rem;
  letter-spacing: 0.11em;
  font-weight: 900;
}

.senior-verdict strong {
  color: #ecfdf5;
  font-size: 1.05rem;
}

.senior-mission-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(160px, 1fr));
  gap: 16px;
}

.senior-mission-card {
  border-radius: 24px;
  padding: 20px;
  border: 1px solid rgba(148, 148, 148, 0.18);
  background:
    radial-gradient(circle at top left, rgba(155, 155, 155, 0.08), transparent 32%),
    rgba(18, 18, 18, 0.9);
}

.senior-mission-card span {
  display: block;
  color: #8c8c8c;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 9px;
  font-weight: 800;
}

.senior-mission-card strong {
  display: block;
  color: #f4f4f4;
  font-size: 1.4rem;
  line-height: 1.2;
}

.senior-mission-card small {
  display: block;
  margin-top: 8px;
  color: #636363;
  line-height: 1.4;
}

.senior-debrief-panel {
  border-radius: 28px;
  padding: 24px;
  border: 1px solid rgba(148, 148, 148, 0.18);
  background: rgba(18, 18, 18, 0.88);
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 24px;
  align-items: start;
}

.senior-debrief-panel h3 {
  margin: 4px 0 10px;
  color: #f4f4f4;
  font-size: 1.5rem;
}

.senior-debrief-panel p {
  color: #c2c2c2;
  line-height: 1.65;
  margin: 0;
}

.senior-checklist {
  display: grid;
  gap: 10px;
}

.senior-checklist span {
  border-radius: 16px;
  padding: 12px 14px;
  background: rgba(12, 12, 12, 0.42);
  border: 1px solid rgba(155, 155, 155, 0.14);
  color: #cacaca;
  font-weight: 700;
}

.senior-actions {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

.senior-actions.compact {
  justify-content: flex-end;
}

.senior-action {
  min-width: 240px;
}

/* Certificate */

.senior-certificate-toolbar {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  align-items: flex-start;
  flex-wrap: wrap;
  border-radius: 26px;
  padding: 22px;
  border: 1px solid rgba(148, 148, 148, 0.18);
  background: rgba(18, 18, 18, 0.88);
}

.senior-certificate-card {
  position: relative;
  overflow: hidden;
  min-height: 720px;
  color: #111111;
  border-radius: 32px;
  padding: 54px;
  background:
    radial-gradient(circle at top left, rgba(155, 155, 155, 0.12), transparent 30%),
    linear-gradient(135deg, #ffffff, #f4f4f4);
  box-shadow: 0 34px 110px rgba(0, 0, 0, 0.35);
  border: 1px solid #dedede;
}

.senior-certificate-card::before {
  content: '';
  position: absolute;
  inset: 22px;
  border: 2px solid #111111;
  border-radius: 24px;
  opacity: 0.9;
}

.senior-certificate-card::after {
  content: '';
  position: absolute;
  inset: 34px;
  border: 1px solid #8c8c8c;
  border-radius: 18px;
  opacity: 0.75;
}

.senior-cert-watermark {
  position: absolute;
  right: 48px;
  bottom: 26px;
  font-size: clamp(5rem, 16vw, 13rem);
  font-weight: 900;
  color: rgba(18, 18, 18, 0.045);
  letter-spacing: -0.08em;
  pointer-events: none;
}

.senior-cert-header,
.senior-cert-body,
.senior-cert-metrics,
.senior-cert-footer {
  position: relative;
  z-index: 2;
}

.senior-cert-header {
  display: flex;
  justify-content: space-between;
  gap: 24px;
  align-items: flex-start;
}

.senior-cert-kicker {
  color: #686868;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  margin: 0 0 12px;
}

.senior-cert-header h1 {
  color: #111111;
  margin: 0;
  max-width: 760px;
  font-size: clamp(2.1rem, 5vw, 4.4rem);
  line-height: 0.98;
  letter-spacing: -0.055em;
}

.senior-cert-id {
  min-width: 210px;
  border-radius: 18px;
  padding: 14px;
  background: #111111;
  color: white;
  text-align: right;
}

.senior-cert-id span {
  display: block;
  color: #bebebe;
  font-size: 0.68rem;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.senior-cert-id strong {
  font-family: Consolas, Monaco, monospace;
  font-size: 0.9rem;
}

.senior-cert-body {
  text-align: center;
  padding: 70px 20px 46px;
}

.senior-cert-body p {
  color: #4c4c4c;
  font-size: 1.1rem;
  margin: 8px 0;
}

.senior-cert-body h2 {
  color: #111111;
  font-size: clamp(2.2rem, 5vw, 4.7rem);
  margin: 10px 0 18px;
  letter-spacing: -0.045em;
}

.senior-cert-body h3 {
  color: #686868;
  font-size: clamp(1.2rem, 2.5vw, 2.3rem);
  margin: 12px 0;
}

.senior-cert-route {
  margin: 34px auto 0;
  max-width: 820px;
  border-radius: 20px;
  padding: 18px;
  border: 1px solid #c2c2c2;
  background: #f4f4f4;
}

.senior-cert-route span {
  display: block;
  color: #636363;
  font-size: 0.74rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}

.senior-cert-route strong {
  color: #111111;
  line-height: 1.6;
}

.senior-cert-metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

.senior-cert-metrics div {
  border-radius: 18px;
  padding: 16px;
  border: 1px solid #c2c2c2;
  background: #ffffff;
}

.senior-cert-metrics span {
  display: block;
  color: #636363;
  font-size: 0.74rem;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  margin-bottom: 8px;
}

.senior-cert-metrics strong {
  color: #111111;
  font-size: 1.35rem;
}

.senior-cert-footer {
  margin-top: 58px;
  display: flex;
  justify-content: space-between;
  gap: 26px;
  align-items: end;
}

.senior-signature {
  display: grid;
  gap: 8px;
}

.senior-signature span {
  width: 320px;
  border-top: 2px solid #111111;
}

.senior-signature strong {
  color: #111111;
}

.senior-signature small {
  color: #636363;
}

.senior-seal {
  width: 126px;
  height: 126px;
  border-radius: 999px;
  border: 2px solid #686868;
  display: grid;
  place-items: center;
  align-content: center;
  background: radial-gradient(circle, rgba(155, 155, 155, 0.18), transparent 65%);
}

.senior-seal span {
  color: #686868;
  font-size: 2rem;
  font-weight: 900;
  line-height: 1;
}

.senior-seal small {
  color: #4c4c4c;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-size: 0.65rem;
}

@media print {
  body * {
    visibility: hidden !important;
  }

  .senior-certificate-card,
  .senior-certificate-card * {
    visibility: visible !important;
  }

  .senior-certificate-card {
    position: fixed;
    inset: 0;
    width: 100%;
    min-height: 100vh;
    box-shadow: none;
    border-radius: 0;
    padding: 48px;
  }

  .senior-certificate-toolbar {
    display: none !important;
  }
}

@media (max-width: 980px) {
  .senior-debrief-hero,
  .senior-debrief-panel,
  .certificate-home-hero {
    grid-template-columns: 1fr;
  }

  .senior-mission-grid,
  .senior-cert-metrics,
  .certificate-home-grid {
    grid-template-columns: 1fr;
  }

  .senior-cert-header,
  .senior-cert-footer {
    flex-direction: column;
    align-items: stretch;
  }

  .senior-cert-id {
    text-align: left;
  }

  .senior-certificate-card {
    padding: 32px;
  }
}

/*******************************************************
 * ROUTE BUILDER
 *******************************************************/

.route-builder-four {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}

.route-builder-preview {
  display: grid;
  grid-template-columns: repeat(4, minmax(160px, 1fr));
  gap: 12px;
}

.route-phase-chip {
  border: 1px solid rgba(155, 155, 155, 0.18);
  background: rgba(12, 12, 12, 0.42);
  border-radius: 18px;
  padding: 14px;
  display: grid;
  gap: 6px;
}

.route-phase-chip strong {
  width: 34px;
  height: 34px;
  border-radius: 12px;
  display: grid;
  place-items: center;
  background: rgba(155, 155, 155, 0.14);
  color: #bebebe;
  border: 1px solid rgba(155, 155, 155, 0.24);
}

.route-phase-chip span {
  color: #f4f4f4;
  font-weight: 900;
  font-size: 0.9rem;
}

.route-phase-chip small {
  color: #8c8c8c;
  line-height: 1.35;
}

@media (max-width: 980px) {
  .route-builder-four,
  .route-builder-preview {
    grid-template-columns: 1fr;
  }
}


/*******************************************************
 * CUSTOM FULL ROUTE BUILDER
 *******************************************************/

.custom-route-builder {
  max-width: 1400px;
}

.custom-route-phase-list {
  display: grid;
  gap: 18px;
}

.custom-phase-card {
  border: 1px solid rgba(148, 148, 148, 0.18);
  background:
    radial-gradient(circle at top left, rgba(155, 155, 155, 0.06), transparent 30%),
    rgba(12, 12, 12, 0.34);
  border-radius: 22px;
  padding: 18px;
  display: grid;
  gap: 12px;
}

.custom-phase-header {
  display: flex;
  gap: 14px;
  align-items: center;
}

.route-phase-number {
  width: 42px;
  height: 42px;

.hero-btn-ghost {

  color: var(--silver) !important;
}
.hero-btn-ghost:hover {
  background: rgba(175, 175, 175, 0.09) !important;
  border-color: rgba(175, 175, 175, 0.65) !important;
  transform: translateY(-1px);
}

.welcome-aviation-panel {
  position: relative;
  width: min(380px, 34vw);
  min-width: 280px;
  border: 1px solid rgba(155, 155, 155, 0.2);
  border-radius: 22px;
  background:
    linear-gradient(rgba(155, 155, 155, 0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(155, 155, 155, 0.07) 1px, transparent 1px),
    radial-gradient(circle at 50% 42%, rgba(155, 155, 155, 0.16), transparent 38%),
    rgba(12, 12, 12, 0.42);
  background-size: 38px 38px, 38px 38px, auto, auto;
  overflow: hidden;
}

.welcome-skyline {
  position: relative;
  height: 178px;
}

.welcome-plane {
  position: absolute;
  left: -18%;
  top: 67%;
  transform: translate(-50%, -50%) rotate(-14deg);
  color: #bebebe;
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 3.6rem;
  line-height: 1;
  filter: drop-shadow(0 0 18px rgba(155, 155, 155, 0.68));
  animation: welcomePlaneVector 6.4s linear infinite;
}

.welcome-route {
  position: absolute;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(155, 155, 155, 0.85), transparent);
  transform-origin: center;
  overflow: hidden;
}

.welcome-route::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, #bebebe, transparent);
  transform: translateX(-100%);
  animation: welcomeRouteSweep 3.8s linear infinite;
}

.welcome-route.r1 {
  left: 13%;
  top: 60%;
  width: 72%;
  transform: rotate(-14deg);
}

.welcome-route.r2 {
  left: 19%;
  top: 39%;
  width: 58%;
  transform: rotate(22deg);
  opacity: 0.5;
}

.welcome-route.r2::after {
  animation-delay: 1.4s;
}

.welcome-beacon {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: #969696;
  box-shadow: 0 0 0 6px rgba(155, 155, 155, 0.12), 0 0 18px rgba(155, 155, 155, 0.8);
  animation: welcomeBeaconPulse 1.9s ease-in-out infinite;
}

.welcome-beacon.b1 { left: 18%; top: 66%; }
.welcome-beacon.b2 { right: 20%; top: 29%; animation-delay: 0.55s; }
.welcome-beacon.b3 { right: 15%; bottom: 22%; animation-delay: 1.05s; }

.welcome-runway {
  position: absolute;
  left: 50%;
  bottom: -34px;
  width: 96px;
  height: 132px;
  transform: translateX(-50%) perspective(120px) rotateX(56deg);
  border: 1px solid rgba(148, 148, 148, 0.18);
  background: linear-gradient(180deg, rgba(18, 18, 18, 0.2), rgba(155, 155, 155, 0.1));
}

.welcome-runway span {
  position: absolute;
  left: 50%;
  width: 4px;
  height: 16px;
  border-radius: 999px;
  background: rgba(232, 232, 232, 0.58);
  transform: translateX(-50%);
  animation: welcomeRunwayLights 1.8s linear infinite;
}

.welcome-runway span:nth-child(1) { top: 16px; }
.welcome-runway span:nth-child(2) { top: 42px; animation-delay: 0.2s; }
.welcome-runway span:nth-child(3) { top: 70px; animation-delay: 0.4s; }
.welcome-runway span:nth-child(4) { top: 100px; animation-delay: 0.6s; }

.welcome-panel-footer {
  position: absolute;
  left: 14px;
  right: 14px;
  bottom: 12px;
  display: flex;
  justify-content: space-between;
  gap: 12px;
  color: #8c8c8c;
  font-size: 0.72rem;
  font-weight: 900;
  letter-spacing: 0.06em;
}

.welcome-panel-footer strong {
  color: #cacaca;
  font-size: 0.72rem;
}

@keyframes welcomePlaneVector {
  0% {
    left: -18%;
    top: 68%;
    opacity: 0;
    transform: translate(-50%, -50%) rotate(-14deg) scale(0.96);
  }

  12% {
    opacity: 1;
  }

  82% {
    opacity: 1;
  }

  100% {
    left: 118%;
    top: 31%;
    opacity: 0;
    transform: translate(-50%, -50%) rotate(-14deg) scale(1.04);
  }
}

@keyframes welcomeRouteSweep {
  to {
    transform: translateX(100%);
  }
}

@keyframes welcomeBeaconPulse {
  0%, 100% {
    opacity: 0.72;
    transform: scale(0.92);
    box-shadow: 0 0 0 4px rgba(155, 155, 155, 0.1), 0 0 14px rgba(155, 155, 155, 0.6);
  }

  50% {
    opacity: 1;
    transform: scale(1.08);
    box-shadow: 0 0 0 8px rgba(155, 155, 155, 0.16), 0 0 24px rgba(155, 155, 155, 0.9);
  }
}

@keyframes welcomeRunwayLights {
  0%, 100% {
    opacity: 0.35;
  }

  45% {
    opacity: 1;
  }
}

@media (prefers-reduced-motion: reduce) {
  .welcome-plane,
  .welcome-route::after,
  .welcome-beacon,
  .welcome-runway span {
    animation: none;
  }
}
