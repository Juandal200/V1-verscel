<script>
  console.log('[ICAO] Scripts.html loaded');

  var AppState = {
    sessionToken: sessionStorage.getItem('icao_session_token') || '',
    user: null,
    home: null,
    admin: {
      scenarios: []
    },
    training: {
      route: null,
      scenarios: [],
      currentIndex: 0,
      scenarioStartMs: null
    }
  };

  window.addEventListener('load', function() {
    bindLoginEnterKeys();

    if (AppState.sessionToken) {
      setLoginMessage('Restoring session...');

      google.script.run
        .withSuccessHandler(handleGetMeResponse)
        .withFailureHandler(handleServerError)
        .apiGetMe(AppState.sessionToken);
    }
  });

  function bindLoginEnterKeys() {
    var emailInput = document.getElementById('loginEmail');
    var nameInput = document.getElementById('loginName');
    var codeInput = document.getElementById('loginCode');

    if (nameInput) {
      nameInput.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') requestLoginCode();
      });
    }

    if (emailInput) {
      emailInput.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') requestLoginCode();
      });
    }

    if (codeInput) {
      codeInput.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') verifyLoginCode();
      });
    }
  }

  function requestLoginCode() {
    var name = document.getElementById('loginName').value.trim();
    var email = document.getElementById('loginEmail').value.trim().toLowerCase();

    if (!email) {
      setLoginMessage('Enter your email.');
      return;
    }

    if (!isValidEmail(email)) {
      setLoginMessage('Enter a valid email address.');
      return;
    }

    setLoginMessage('Sending verification code...');
    setLoginButtonsDisabled(true);

    google.script.run
      .withSuccessHandler(function(res) {
        setLoginButtonsDisabled(false);

        if (!res || !res.ok) {
          setLoginMessage(res && res.message ? res.message : 'Could not send code.');
          return;
        }

        document.getElementById('otpBox').classList.remove('hidden');
        document.getElementById('loginCode').focus();
        setLoginMessage(res.message || 'Verification code sent.');
      })
      .withFailureHandler(function(err) {
        setLoginButtonsDisabled(false);
        handleServerError(err);
      })
      .apiRequestLoginCode({
        name: name,
        email: email
      });
  }

  function verifyLoginCode() {
    var name = document.getElementById('loginName').value.trim();
    var email = document.getElementById('loginEmail').value.trim().toLowerCase();
    var code = document.getElementById('loginCode').value.trim();

    if (!email || !code) {
      setLoginMessage('Enter email and verification code.');
      return;
    }

    if (!isValidEmail(email)) {
      setLoginMessage('Enter a valid email address.');
      return;
    }

    if (!/^\d{6}$/.test(code)) {
      setLoginMessage('Enter the 6-digit verification code.');
      return;
    }

    setLoginMessage('Verifying code...');
    setLoginButtonsDisabled(true);

    google.script.run
      .withSuccessHandler(function(res) {
        setLoginButtonsDisabled(false);
        handleLoginResponse(res);
      })
      .withFailureHandler(function(err) {
        setLoginButtonsDisabled(false);
        handleServerError(err);
      })
      .apiVerifyLoginCode({
        name: name,
        email: email,
        code: code
      });
  }

  function handleLoginResponse(res) {
    if (!res || !res.ok) {
      if (res && res.code === 'USER_NOT_ACTIVE') {
        AppState.user = res.user || null;
        showScreen('pendingScreen');
        return;
      }

      setLoginMessage(res && res.message ? res.message : 'Login failed.');
      return;
    }

    AppState.sessionToken = res.sessionToken;
    AppState.user = res.user;
    AppState.home = res.home;

    sessionStorage.setItem('icao_session_token', AppState.sessionToken);

    enterApplication();
  }

  function handleGetMeResponse(res) {
    if (!res || !res.ok) {
      sessionStorage.removeItem('icao_session_token');
      AppState.sessionToken = '';
      AppState.user = null;
      AppState.home = null;
      showScreen('loginScreen');
      setLoginMessage('');
      return;
    }

    AppState.user = res.user;
    AppState.home = res.home;

    enterApplication();
  }

  function enterApplication() {
    showScreen('appScreen');

    document.getElementById('userName').textContent = AppState.user.name || 'User';
    document.getElementById('userRole').textContent = AppState.user.role || '';
    document.getElementById('userEmail').textContent = AppState.user.email || '';

    if (AppState.user.role === 'ADMIN') {
      document.getElementById('adminNavButton').classList.remove('hidden');
    } else {
      document.getElementById('adminNavButton').classList.add('hidden');
    }

    renderHome();
  }

  function refreshMeAndHome(callback) {
    if (!AppState.sessionToken) {
      showScreen('loginScreen');
      return;
    }

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok) {
          sessionStorage.removeItem('icao_session_token');
          AppState.sessionToken = '';
          showScreen('loginScreen');
          return;
        }

        AppState.user = res.user;
        AppState.home = res.home;

        if (typeof callback === 'function') callback();
      })
      .withFailureHandler(handleServerError)
      .apiGetMe(AppState.sessionToken);
  }

  function renderHome() {
    setActiveNav('Dashboard');

    refreshMeAndHome(function() {
      var home = AppState.home || {};
      var metrics = home.metrics || {};
      var view = home.view || 'STUDENT';
      var cards = '';

      if (view === 'ADMIN') {
        cards += metricCard('Total users', metrics.totalUsers || 0);
        cards += metricCard('Active users', metrics.activeUsers || 0);
        cards += metricCard('Pending users', metrics.pendingUsers || 0);
        cards += metricCard('Total attempts', metrics.totalAttempts || 0);
      }

      if (view === 'INSTRUCTOR') {
        cards += metricCard('Assigned students', metrics.assignedStudents || 0);
        cards += metricCard('Active groups', metrics.activeGroups || 0);
        cards += metricCard('Total attempts', metrics.totalAttempts || 0);
        cards += metricCard('Average score', String(metrics.averageScore || 0) + '%');
      }

      if (view === 'STUDENT') {
        cards += metricCard('Current level', metrics.currentLevel || 1);
        cards += metricCard('Current country', metrics.currentCountry || 'USA');
        cards += metricCard('Total attempts', metrics.totalAttempts || 0);
        cards += metricCard('Success rate', String(metrics.successRate || 0) + '%');
      }

      document.getElementById('contentArea').innerHTML =
        '<div class="metrics">' + cards + '</div>' +
        '<div class="panel">' +
          '<p class="eyebrow">Phase 2 foundation</p>' +
          '<h3>Secure base ready</h3>' +
          '<p class="subtitle">' +
            'The platform now supports login, roles, scenarios, read-back validation, progress tracking, video and ATC audio.' +
          '</p>' +
        '</div>';
    });
  }

function renderSimulatorPlaceholder() {
  setActiveNav('Simulator');

  var requestFinished = false;

  document.getElementById('contentArea').innerHTML =
    '<div class="panel">' +
      '<p class="eyebrow">Simulator</p>' +
      '<h3>LEVEL MAP V5 HARD ACTIVE</h3>' +
      '<p class="subtitle">Loading level map, countries and training routes...</p>' +
    '</div>';

  var watchdog = setTimeout(function() {
    if (!requestFinished) {
      showContentError(
        'Training catalog request did not return after 20 seconds.\n\n' +
        'Possible cause: backend timeout, duplicated function, or Apps Script not deployed.\n\n' +
        'Endpoint: apiGetTrainingCatalogV5_HARD'
      );
    }
  }, 20000);

  google.script.run
    .withSuccessHandler(function(res) {
      requestFinished = true;
      clearTimeout(watchdog);

      try {
        console.log('apiGetTrainingCatalogV5_HARD response:', res);

        if (!res || !res.ok) {
          showContentError(
            'Could not load training catalog.\n\n' +
            'SOURCE:\n' +
            (res && res.source ? res.source : 'No source returned.') +
            '\n\nMESSAGE:\n' +
            (res && res.message ? res.message : 'No server message returned.') +
            '\n\nSTACK:\n' +
            (res && res.stack ? res.stack : 'No stack returned.')
          );
          return;
        }

        if (typeof renderLevelMap !== 'function') {
          showContentError('Frontend error: renderLevelMap is not defined in Scripts.html.');
          return;
        }

        AppState.training.catalog = res.catalog || null;
        renderLevelMap(res.catalog);

      } catch (clientErr) {
        showContentError(
          'Frontend error while rendering catalog.\n\n' +
          (clientErr && clientErr.message ? clientErr.message : String(clientErr)) +
          '\n\n' +
          (clientErr && clientErr.stack ? clientErr.stack : '')
        );
      }
    })
    .withFailureHandler(function(err) {
      requestFinished = true;
      clearTimeout(watchdog);

      showContentError(
        'Could not load training catalog.\n\n' +
        'CLIENT/SERVER FAILURE:\n' +
        (err && err.message ? err.message : JSON.stringify(err))
      );
    })
    .apiGetTrainingCatalogV5_HARD(AppState.sessionToken);
}

  function renderScenarioRoute(data) {
    var scenarios = data.scenarios || [];

    AppState.training.route = data;
    AppState.training.scenarios = scenarios;
    AppState.training.currentIndex = 0;

    var rows = '';

    scenarios.forEach(function(s) {
      rows +=
        '<div class="panel scenario-card">' +
          '<p class="eyebrow">Scenario ' + escapeHtml(s.scenarioOrder) + ' · Level ' + escapeHtml(s.level) + ' · ' + escapeHtml(s.country) + '</p>' +
          '<h3>' + escapeHtml(s.context) + '</h3>' +
          '<div class="scenario-meta">' +
            '<span class="pill">Order ' + escapeHtml(s.scenarioOrder) + '</span>' +
            '<span class="pill">Level ' + escapeHtml(s.level) + '</span>' +
            '<span class="pill">' + escapeHtml(s.country) + '</span>' +
            '<span class="pill">Version ' + escapeHtml(s.version || 1) + '</span>' +
          '</div>' +
          '<p class="subtitle"><strong>ATC:</strong> ' + escapeHtml(s.atcText) + '</p>' +
          '<p class="subtitle"><strong>Expected:</strong> ' + escapeHtml(s.expectedReadback) + '</p>' +
          '<p class="subtitle"><strong>Keywords:</strong> ' + escapeHtml((s.keywords || []).join(', ')) + '</p>' +
          '<p class="subtitle"><strong>Media:</strong> ' + ((s.videoUrl || s.imageFileId || s.audioUrl) ? 'Available' : 'Not assigned') + '</p>' +
        '</div>';
    });

    if (!rows) {
      rows =
        '<div class="panel">' +
          '<h3>No scenarios available</h3>' +
          '<p class="subtitle">There are no active scenarios for your current level and country.</p>' +
        '</div>';
    }

    document.getElementById('contentArea').innerHTML =
      '<div class="panel">' +
        '<p class="eyebrow">Training Route</p>' +
        '<h3>Level ' + escapeHtml(data.currentLevel) + ' · ' + escapeHtml(data.currentCountry) + '</h3>' +
        '<p class="subtitle">Total assigned scenarios: ' + escapeHtml(data.totalScenarios) + '</p>' +
        '<button class="btn primary" onclick="startTraining()" ' + (scenarios.length ? '' : 'disabled') + '>Start training</button>' +
      '</div>' +
      '<div class="scenario-grid">' + rows + '</div>';
  }

  function startTraining() {
    if (!AppState.training.scenarios.length) {
      showContentError('No scenarios available for this route.');
      return;
    }

    AppState.training.currentIndex = 0;
    renderTrainingScenario();
  }

  function renderTrainingScenario() {
    var index = AppState.training.currentIndex;
    var scenarios = AppState.training.scenarios;
    var scenario = scenarios[index];

    if (!scenario) {
      showContentError('Scenario not found.');
      return;
    }

    AppState.training.scenarioStartMs = Date.now();

    var progressPct = Math.round(((index + 1) / scenarios.length) * 100);
    var ambientHtml = '';

    if (scenario.audioUrl) {
      ambientHtml = '<audio class="ambient-audio" controls src="' + escapeHtml(scenario.audioUrl) + '"></audio>';
    }

    document.getElementById('contentArea').innerHTML =
      '<div class="panel">' +
        '<p class="eyebrow">Live Training</p>' +
        '<h3>Scenario ' + escapeHtml(index + 1) + ' of ' + escapeHtml(scenarios.length) + '</h3>' +
        '<div class="progress-track"><div class="progress-bar" style="width:' + escapeHtml(progressPct) + '%;"></div></div>' +
        '<p class="subtitle">Level ' + escapeHtml(scenario.level) + ' · ' + escapeHtml(scenario.country) + ' · ' + escapeHtml(scenario.context) + '</p>' +
      '</div>' +
      '<div class="panel training-panel">' +
        renderScenarioMedia(scenario) +
        '<p class="eyebrow">ATC Transmission</p>' +
        '<div class="transmission-box">' + escapeHtml(scenario.atcText) + '</div>' +
        '<div class="action-row">' +
          '<button id="playVoiceBtn" class="btn primary" onclick="playScenarioVoice()">▶ Play ATC audio</button>' +
          ambientHtml +
        '</div>' +
        '<label class="field-label" for="studentAnswer">Pilot read-back</label>' +
        '<textarea id="studentAnswer" class="textarea" rows="4" placeholder="Type your read-back here..."></textarea>' +
        '<div id="attemptFeedback" class="feedback-card hidden"></div>' +
        '<div class="action-row">' +
          '<button class="btn secondary" onclick="renderScenarioRoute(AppState.training.route)">Back to route</button>' +
          '<button id="submitAttemptBtn" class="btn primary" onclick="submitScenarioAnswer()">Send read-back</button>' +
        '</div>' +
      '</div>';

    document.getElementById('studentAnswer').focus();
  }

  function renderScenarioMedia(scenario) {
    if (scenario.videoUrl) {
      var normalized = normalizeVideoUrl(scenario.videoUrl);

      if (normalized.type === 'youtube' || normalized.type === 'drive-preview') {
        return (
          '<div class="sim-media-shell">' +
            '<div class="sim-media-stage ' + (normalized.type === 'youtube' ? 'youtube-stage' : 'drive-stage') + '">' +
              '<div class="sim-media-overlay"><span class="sim-badge">SIM VISUAL</span></div>' +
              '<iframe class="sim-video-iframe" src="' + escapeHtml(normalized.url) + '" title="Scenario video" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>' +
            '</div>' +
          '</div>'
        );
      }

      return (
        '<div class="sim-media-shell">' +
          '<div class="sim-media-stage native-stage">' +
            '<div class="sim-media-overlay"><span class="sim-badge">SIM VISUAL</span></div>' +
            '<video class="sim-video-native" controls playsinline preload="metadata">' +
              '<source src="' + escapeHtml(normalized.url) + '" type="video/mp4">' +
              'Your browser does not support video playback.' +
            '</video>' +
          '</div>' +
        '</div>'
      );
    }

    if (scenario.imageFileId) {
      var imageUrl = 'https://drive.google.com/thumbnail?id=' + encodeURIComponent(scenario.imageFileId) + '&sz=w1600';

      return (
        '<div class="sim-media-shell">' +
          '<div class="sim-media-stage image-stage">' +
            '<div class="sim-media-overlay"><span class="sim-badge">SIM VISUAL</span></div>' +
            '<img class="sim-image" src="' + escapeHtml(imageUrl) + '" alt="Scenario image">' +
          '</div>' +
        '</div>'
      );
    }

    return (
      '<div class="sim-media-shell">' +
        '<div class="sim-media-stage media-placeholder-stage">' +
          '<div class="media-placeholder-inner">' +
            '<div class="radar-mini"><div class="radar-mini-line"></div></div>' +
            '<p>No media file assigned to this scenario.</p>' +
          '</div>' +
        '</div>' +
      '</div>'
    );
  }

  function normalizeVideoUrl(url) {
    url = String(url || '').trim();

    if (!url) return { type: '', url: '' };

    var youtubeId = extractYouTubeId(url);

    if (youtubeId) {
      return {
        type: 'youtube',
        url: 'https://www.youtube-nocookie.com/embed/' + youtubeId + '?rel=0&playsinline=1&modestbranding=1'
      };
    }

    var driveId = extractDriveFileId(url);

    if (driveId) {
      return {
        type: 'drive-preview',
        url: 'https://drive.google.com/file/d/' + driveId + '/preview'
      };
    }

    return {
      type: 'mp4',
      url: url
    };
  }

  function extractYouTubeId(url) {
    var patterns = [
      /youtube\.com\/watch\?v=([^&]+)/,
      /youtube\.com\/embed\/([^?&]+)/,
      /youtu\.be\/([^?&]+)/,
      /youtube\.com\/shorts\/([^?&]+)/
    ];

    for (var i = 0; i < patterns.length; i++) {
      var match = String(url).match(patterns[i]);
      if (match && match[1]) return match[1];
    }

    return '';
  }

  function extractDriveFileId(url) {
    var patterns = [
      /drive\.google\.com\/file\/d\/([^/]+)/,
      /drive\.google\.com\/open\?id=([^&]+)/,
      /drive\.google\.com\/uc\?id=([^&]+)/
    ];

    for (var i = 0; i < patterns.length; i++) {
      var match = String(url).match(patterns[i]);
      if (match && match[1]) return match[1];
    }

    return '';
  }

  function playScenarioVoice() {
    var index = AppState.training.currentIndex;
    var scenario = AppState.training.scenarios[index];
    var playBtn = document.getElementById('playVoiceBtn');

    if (!scenario) {
      renderLocalFeedback('Scenario is not available.', false);
      return;
    }

    if (playBtn) {
      playBtn.disabled = true;
      playBtn.textContent = 'Generating ATC audio...';
    }

    google.script.run
      .withSuccessHandler(function(res) {
        if (playBtn) {
          playBtn.disabled = false;
          playBtn.textContent = '▶ Play ATC audio';
        }

        if (!res || !res.ok) {
          renderLocalFeedback(res && res.message ? res.message : 'Could not generate audio.', false);
          return;
        }

        playBase64Audio(res.audioBase64);
      })
      .withFailureHandler(function(err) {
        if (playBtn) {
          playBtn.disabled = false;
          playBtn.textContent = '▶ Play ATC audio';
        }

        handleServerError(err);
      })
      .apiGenerateScenarioVoice(AppState.sessionToken, {
        scenarioId: scenario.scenarioId
      });
  }

  function playBase64Audio(audioBase64) {
    if (!audioBase64) {
      renderLocalFeedback('Audio content is empty.', false);
      return;
    }

    try {
      var audio = new Audio('data:audio/mp3;base64,' + audioBase64);
      audio.volume = 1;
      audio.play();
    } catch (err) {
      renderLocalFeedback('Could not play audio: ' + err.message, false);
    }
  }

  function submitScenarioAnswer() {
    var index = AppState.training.currentIndex;
    var scenario = AppState.training.scenarios[index];
    var answerEl = document.getElementById('studentAnswer');
    var submitBtn = document.getElementById('submitAttemptBtn');

    if (!scenario || !answerEl) {
      showContentError('Training scenario is not available.');
      return;
    }

    var answer = answerEl.value.trim();

    if (!answer) {
      renderLocalFeedback('Please type your read-back before submitting.', false);
      return;
    }

    var responseTimeSec = AppState.training.scenarioStartMs
      ? Math.round((Date.now() - AppState.training.scenarioStartMs) / 1000)
      : 0;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Evaluating...';

    google.script.run
      .withSuccessHandler(function(res) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send read-back';

        if (!res || !res.ok) {
          renderLocalFeedback(res && res.message ? res.message : 'Could not save attempt.', false);
          return;
        }

        renderAttemptFeedback(res);
      })
      .withFailureHandler(function(err) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send read-back';
        handleServerError(err);
      })
      .apiSubmitAttempt(AppState.sessionToken, {
        scenarioId: scenario.scenarioId,
        studentAnswer: answer,
        responseTimeSec: responseTimeSec
      });
  }

  function renderAttemptFeedback(res) {
    var feedback = document.getElementById('attemptFeedback');
    var answerEl = document.getElementById('studentAnswer');
    var submitBtn = document.getElementById('submitAttemptBtn');

    var evaluation = res.evaluation || {};
    var missing = evaluation.keywordsMissing || [];
    var ok = !!evaluation.correct;

    if (answerEl) answerEl.disabled = true;
    if (submitBtn) submitBtn.classList.add('hidden');
    if (!feedback) return;

    feedback.classList.remove('hidden');
    feedback.classList.toggle('ok', ok);
    feedback.classList.toggle('bad', !ok);

    feedback.innerHTML =
      '<h3>' + (ok ? '✓ Read-back accepted' : '✗ Non-standard read-back') + '</h3>' +
      '<p><strong>Score:</strong> ' + escapeHtml(evaluation.score || 0) + '/100</p>' +
      '<p><strong>Expected:</strong> ' + escapeHtml(res.expectedAnswer || '') + '</p>' +
      (missing.length ? '<p><strong>Missing keywords:</strong> ' + escapeHtml(missing.join(', ')) + '</p>' : '<p><strong>All required keywords were included.</strong></p>') +
      (res.progress ? '<p><strong>Route progress:</strong> ' + escapeHtml(res.progress.progressPct || 0) + '%</p>' : '') +
      '<div class="action-row">' +
        '<button class="btn secondary" onclick="retryCurrentScenario()">Retry</button>' +
        '<button class="btn primary" onclick="goToNextScenario()">' + (AppState.training.currentIndex + 1 >= AppState.training.scenarios.length ? 'Finish route' : 'Next scenario') + '</button>' +
      '</div>';
  }

  function renderLocalFeedback(message, ok) {
    var feedback = document.getElementById('attemptFeedback');

    if (!feedback) return;

    feedback.classList.remove('hidden');
    feedback.classList.toggle('ok', !!ok);
    feedback.classList.toggle('bad', !ok);

    feedback.innerHTML =
      '<h3>' + (ok ? 'Message' : 'Check your input') + '</h3>' +
      '<p>' + escapeHtml(message) + '</p>';
  }

  function retryCurrentScenario() {
    renderTrainingScenario();
  }

  function goToNextScenario() {
    var nextIndex = AppState.training.currentIndex + 1;

    if (nextIndex >= AppState.training.scenarios.length) {
      renderTrainingFinished();
      return;
    }

    AppState.training.currentIndex = nextIndex;
    renderTrainingScenario();
  }

  function renderTrainingFinished() {
    document.getElementById('contentArea').innerHTML =
      '<div class="panel">' +
        '<p class="eyebrow">Route completed</p>' +
        '<h3>Training session finished</h3>' +
        '<p class="subtitle">Your attempts were saved successfully. You can review your progress or repeat the route.</p>' +
        '<div class="action-row">' +
          '<button class="btn secondary" onclick="renderScenarioRoute(AppState.training.route)">Back to route</button>' +
          '<button class="btn primary" onclick="renderProgressPlaceholder()">View progress</button>' +
        '</div>' +
      '</div>';
  }

  function renderProgressPlaceholder() {
    setActiveNav('Progress');

    document.getElementById('contentArea').innerHTML =
      '<div class="panel">' +
        '<p class="eyebrow">Progress</p>' +
        '<h3>Loading progress...</h3>' +
        '<p class="subtitle">Please wait while your progress is loaded.</p>' +
      '</div>';

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok) {
          showContentError(res && res.message ? res.message : 'Could not load progress.');
          return;
        }

        renderProgressTable(res.progress || []);
      })
      .withFailureHandler(handleServerError)
      .apiGetMyProgress(AppState.sessionToken);
  }

  function renderProgressTable(progressRows) {
    var rows = '';

    progressRows.forEach(function(row) {
      var completed = String(row.completed).toUpperCase() === 'TRUE' || row.completed === true;

      rows +=
        '<tr>' +
          '<td>' + escapeHtml(row.level) + '</td>' +
          '<td>' + escapeHtml(row.country) + '</td>' +
          '<td>' + escapeHtml(row.completedScenarios) + ' / ' + escapeHtml(row.totalScenarios) + '</td>' +
          '<td>' + escapeHtml(row.progressPct) + '%</td>' +
          '<td>' + escapeHtml(row.scoreAvg) + '%</td>' +
          '<td>' + (completed ? 'Completed' : 'In progress') + '</td>' +
          '<td>' + escapeHtml(row.updatedAt || '') + '</td>' +
        '</tr>';
    });

    if (!rows) {
      rows = '<tr><td colspan="7">No progress recorded yet.</td></tr>';
    }

    document.getElementById('contentArea').innerHTML =
      '<div class="panel">' +
        '<p class="eyebrow">My Progress</p>' +
        '<h3>Training progress</h3>' +
        '<p class="subtitle">Review your progress by level and country.</p>' +
        '<div class="table-wrap">' +

  function adminSaveScenario() {
    var btn = document.getElementById('saveScenarioBtn');
    var msg = document.getElementById('scenarioFormMessage');

    var payload = {
      scenarioId: document.getElementById('scenarioId').value.trim(),
      scenarioOrder: Number(document.getElementById('scenarioOrder').value || 0),
      level: Number(document.getElementById('scenarioLevel').value || 1),
      country: document.getElementById('scenarioCountry').value,
      context: document.getElementById('scenarioContext').value.trim(),
      atcText: document.getElementById('scenarioAtcText').value.trim(),
      expectedReadback: document.getElementById('scenarioExpected').value.trim(),
      keywordsText: document.getElementById('scenarioKeywords').value.trim(),
      videoUrl: document.getElementById('scenarioVideoUrl').value.trim(),
      imageFileId: document.getElementById('scenarioImageFileId').value.trim(),
      audioUrl: document.getElementById('scenarioAudioUrl').value.trim(),
      isActive: document.getElementById('scenarioIsActive').checked
    };

    if (msg) msg.textContent = 'Saving scenario...';
    if (btn) {
      btn.disabled = true;
      btn.textContent = 'Saving...';
    }

    google.script.run
      .withSuccessHandler(function(res) {
        if (btn) {
          btn.disabled = false;
          btn.textContent = 'Save scenario';
        }

        if (!res || !res.ok) {
          if (msg) msg.textContent = res && res.message ? res.message : 'Could not save scenario.';
          return;
        }

        alert(res.message || 'Scenario saved.');
        renderAdminScenarios();
      })
      .withFailureHandler(function(err) {
        if (btn) {
          btn.disabled = false;
          btn.textContent = 'Save scenario';
        }

        if (msg) msg.textContent = err && err.message ? err.message : 'Server error.';
      })
      .apiAdminSaveScenario(AppState.sessionToken, payload);
  }

      .replace(/"/g, '&quot;')

function renderLevelMap(data) {
  var levels = data && data.levels ? data.levels : [];
  var html = '';

  levels.forEach(function(levelItem) {
    var locked = levelItem.locked === true || levelItem.unlocked === false;

    var levelStatus = levelItem.completed
      ? 'Completed'
      : (locked ? 'Locked' : 'Unlocked');

    var badgeClass = levelItem.completed
      ? 'ACTIVE'
      : (locked ? 'BLOCKED' : 'PENDING');

    var progressPct = levelItem.totalCountries
      ? Math.round((Number(levelItem.completedCountries || 0) / Number(levelItem.totalCountries || 1)) * 100)
      : 0;

    html +=
      '<div class="level-map-card ' + (locked ? 'locked-card' : '') + '">' +
        '<div class="level-map-left">' +
          '<div class="level-orb">' + (locked ? '🔒' : (levelItem.completed ? '✅' : '✈')) + '</div>' +

          '<div class="level-map-body">' +
            '<p class="eyebrow">Training Level</p>' +
            '<h3>Level ' + escapeHtml(levelItem.level) + '</h3>' +
            '<p class="subtitle">Countries completed: ' +
              escapeHtml(levelItem.completedCountries || 0) +
              ' / ' +
              escapeHtml(levelItem.totalCountries || 0) +
            '</p>' +

            '<div class="progress-track compact">' +
              '<div class="progress-bar" style="width:' + escapeHtml(progressPct) + '%;"></div>' +
            '</div>' +

            '<div class="level-country-preview">' +
              renderCountryPreviewFlags(levelItem.countries || []) +
            '</div>' +
          '</div>' +
        '</div>' +

        '<div class="level-map-actions">' +
          '<span class="status ' + badgeClass + '">' + escapeHtml(levelStatus) + '</span>' +
          '<button class="btn ' + (locked ? 'secondary' : 'primary') + '" ' +
            (locked ? 'disabled' : 'onclick="openLevelCountries(' + Number(levelItem.level) + ')"') +
          '>' +
            (locked ? 'Locked' : 'Open countries') +
          '</button>' +
        '</div>' +
      '</div>';
  });

  if (!html) {
    html =
      '<div class="panel">' +
        '<h3>No training levels available</h3>' +
        '<p class="subtitle">Ask the admin to configure active scenarios.</p>' +
      '</div>';
  }

  document.getElementById('contentArea').innerHTML =
    '<div class="panel">' +
      '<p class="eyebrow">Level Map</p>' +
      '<h3>Choose your training level</h3>' +
      '<p class="subtitle">Admins and instructors can open all levels. Students only access unlocked levels.</p>' +
    '</div>' +
    '<div class="level-map-grid">' + html + '</div>';
}


function renderCountryPreviewFlags(countries) {
  var html = '';

  countries.slice(0, 10).forEach(function(item) {
    html +=
      '<span class="preview-flag">' +
        getFlagHtml(item.country, 'flag-preview') +
      '</span>';
  });

  if (countries.length > 10) {
    html += '<span class="preview-more">+' + escapeHtml(countries.length - 10) + '</span>';
  }

  return html || '<span class="subtitle">No countries configured</span>';
}


function openLevelCountries(level) {
  var catalog = AppState.training.catalog || {};
  var levels = catalog.levels || [];
  var selected = null;

  for (var i = 0; i < levels.length; i++) {
    if (Number(levels[i].level) === Number(level)) {
      selected = levels[i];
      break;
    }
  }

  if (!selected) {
    showContentError('Level not found.');
    return;
  }

  if (selected.locked || selected.unlocked === false) {
    showContentError('This level is locked.');
    return;
  }

  AppState.training.selectedLevel = selected.level;
  AppState.training.selectedLevelData = selected;
  AppState.training.countries = selected.countries || [];

  renderCountryTrainingHub(selected);
}


function renderCountryTrainingHub(levelItem) {
  var countries = levelItem.countries || [];
  var cards = '';

  countries.forEach(function(countryItem) {
    var meta = getCountryUi(countryItem.country);

    var completed =
      countryItem.completed === true ||
      String(countryItem.completed).toUpperCase() === 'TRUE';

    cards +=
      '<div class="country-card">' +
        '<div class="country-flag">' +
          getFlagHtml(countryItem.country, 'flag-lg') +
        '</div>' +

        '<div class="country-body">' +
          '<p class="eyebrow">' + escapeHtml(meta.accent) + '</p>' +
          '<h3>' + escapeHtml(meta.label) + '</h3>' +

          '<p class="subtitle">' +
            'Scenarios: ' + escapeHtml(countryItem.totalScenarios || 0) +
            ' · Completed: ' + escapeHtml(countryItem.completedScenarios || 0) +
            ' · Avg score: ' + escapeHtml(countryItem.scoreAvg || 0) + '%' +
          '</p>' +

          '<div class="progress-track compact">' +
            '<div class="progress-bar" style="width:' + escapeHtml(countryItem.progressPct || 0) + '%;"></div>' +
          '</div>' +

          '<div class="country-footer">' +
            '<span class="status ' + (completed ? 'ACTIVE' : 'PENDING') + '">' +
              (completed ? 'Completed' : 'In progress') +
            '</span>' +

            '<button class="btn primary" onclick="startCountryTraining(\'' + escapeJs(countryItem.country) + '\', ' + Number(levelItem.level) + ')">' +
              (completed ? 'Review' : 'Train') +
            '</button>' +
          '</div>' +
        '</div>' +
      '</div>';
  });

  if (!cards) {
    cards =
      '<div class="panel">' +
        '<h3>No countries configured</h3>' +
        '<p class="subtitle">This level exists, but it does not have active countries yet.</p>' +
      '</div>';
  }

  document.getElementById('contentArea').innerHTML =
    '<div class="panel">' +
      '<p class="eyebrow">Country Training Hub</p>' +
      '<h3>Level ' + escapeHtml(levelItem.level) + ' · Choose your ATC country</h3>' +
      '<p class="subtitle">Each country represents an ATC accent and training route.</p>' +

      '<div class="action-row">' +
        '<button class="btn secondary" onclick="renderLevelMap(AppState.training.catalog)">Back to levels</button>' +
      '</div>' +
    '</div>' +
    '<div class="country-grid">' + cards + '</div>';
}

function openLevelCountries(level) {
  var catalog = AppState && AppState.training ? AppState.training.catalog : null;
  var levels = catalog && catalog.levels ? catalog.levels : [];
  var selected = null;

  for (var i = 0; i < levels.length; i++) {
    if (Number(levels[i].level) === Number(level)) {
      selected = levels[i];
      break;
    }
  }

  if (!selected) {
    showContentError('Level not found.');
    return;
  }

  if (selected.locked || selected.unlocked === false) {
    showContentError('This level is locked.');
    return;
  }

  AppState.training.selectedLevel = selected.level;
  AppState.training.selectedLevelData = selected;
  AppState.training.countries = selected.countries || [];

  renderCountryTrainingHub(selected);
}

        showContentError(
          'Could not load scenarios.\n\n' +
          'SOURCE: ' + (res && res.source ? res.source : 'No source returned.') + '\n\n' +
          'MESSAGE: ' + (res && res.message ? res.message : 'No server message returned.')
        );
        return;

      renderScenarioRoute(res.data);
    })
    .withFailureHandler(function(err) {
      showContentError(
        'Could not load scenarios.\n\n' +
        (err && err.message ? err.message : JSON.stringify(err))
      );

      level: AppState.training.selectedLevel,

  { code: 'STARTUP', label: 'Startup' },

function normalizePhaseCodeSim(code) {
  return String(code || '')
    .trim()
    .toUpperCase()
    .replace(/\s+/g, '_')
    .replace(/-/g, '_');
}

function getPhaseIndexForScenarioSim(scenario) {
  var code = normalizePhaseCodeSim(
    scenario && (scenario.phaseCode || scenario.phaseLabel || scenario.phaseName)
  );

  for (var i = 0; i < SIM_PHASE_MAP.length; i++) {
    if (SIM_PHASE_MAP[i].code === code) return i;
  }

  return 0;
}

function getCurrentScenarioSim() {
  var route = AppState.training && AppState.training.route ? AppState.training.route : null;
  var idx = Number(AppState.training && AppState.training.currentIndex || 0);

  if (!route || !route.scenarios || !route.scenarios.length) return null;
  if (idx < 0) idx = 0;
  if (idx >= route.scenarios.length) idx = route.scenarios.length - 1;

  AppState.training.currentIndex = idx;
  return route.scenarios[idx];
}

function renderScenarioRoute(data) {
  AppState.training = AppState.training || {};
  AppState.training.route = data || {};
  AppState.training.currentIndex = 0;
  AppState.training.lastImmersiveFeedback = '';

  renderScenarioStageImmersive();
}

          'allowfullscreen>' +

    );

    '<div class="sim-video-frame">' +
      '<video class="sim-video-native" controls playsinline preload="metadata">' +
        '<source src="' + escapeHtml(url) + '">' +
      '</video>' +

function normalizeScenarioVideoUrl(url) {
  var clean = String(url || '').trim();

  var ytMatch = clean.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?/]+)/i);
  if (ytMatch && ytMatch[1]) {
    return {
      type: 'youtube',
      url: 'https://www.youtube-nocookie.com/embed/' + ytMatch[1] + '?rel=0&modestbranding=1&playsinline=1'
    };
  }

  if (/youtube\.com\/embed\//i.test(clean)) {
    return { type: 'youtube', url: clean };
  }

  return { type: 'native', url: clean };
}

function drawImmersiveFlightProgressCanvas(scenario) {
  var canvas = document.getElementById('flight-progress-canvas');
  if (!canvas) return;

  canvas.width = canvas.offsetWidth || 900;
  canvas.height = 70;

  var ctx = canvas.getContext('2d');
  var W = canvas.width;
  var H = canvas.height;
  var active = getPhaseIndexForScenarioSim(scenario);
  var phases = SIM_PHASE_MAP.length;
  var padX = 52;
  var lineY = H / 2 + 8;
  var step = (W - padX * 2) / (phases - 1);

  ctx.clearRect(0, 0, W, H);

  ctx.beginPath();
  ctx.moveTo(padX, lineY);
  ctx.lineTo(W - padX, lineY);
  ctx.strokeStyle = '#23324f';
  ctx.lineWidth = 4;
  ctx.stroke();

  if (active > 0) {
    ctx.beginPath();
    ctx.moveTo(padX, lineY);
    ctx.lineTo(padX + active * step, lineY);
    ctx.strokeStyle = '#22d3ee';
    ctx.lineWidth = 4;
    ctx.stroke();
  }

  SIM_PHASE_MAP.forEach(function(phase, i) {
    var x = padX + i * step;
    var isDone = i < active;
    var isNow = i === active;

    ctx.font = '600 10px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = isNow ? '#22d3ee' : isDone ? '#cbd5e1' : '#64748b';
    ctx.fillText(phase.label, x, lineY - 20);

    ctx.beginPath();
    ctx.arc(x, lineY, isNow ? 7 : 5, 0, Math.PI * 2);
    ctx.fillStyle = isNow ? '#22d3ee' : isDone ? '#3b82f6' : '#122033';
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = isNow ? '#67e8f9' : '#334155';
    ctx.stroke();
  });

  var planeX = padX + active * step;
  ctx.font = '24px Arial';
  ctx.fillStyle = '#22d3ee';
  ctx.fillText('✈', planeX, lineY + 26);
}

function immersivePlayAtcAudio() {
  var scenario = null;

  if (typeof getCurrentScenarioSim === 'function') {
    scenario = getCurrentScenarioSim();
  } else {
    var route = AppState.training && AppState.training.route ? AppState.training.route : null;
    var index = Number(AppState.training && AppState.training.currentIndex || 0);
    scenario = route && route.scenarios ? route.scenarios[index] : null;
  }

  if (!scenario) {
    setImmersiveFeedback('Scenario is not available.', 'danger');
    return;
  }

  var atcText = String(scenario.atcText || '').trim();
  var country = String(scenario.country || '').trim();

  if (!atcText || atcText.toUpperCase() === country.toUpperCase()) {
    setImmersiveFeedback(
      'Este escenario no tiene una transmisión ATC válida. Corrige el campo atcText en Admin → Scenarios.',
      'danger'
    );
    return;
  }

  var playButton = event && event.target ? event.target : null;

  if (playButton) {
    playButton.disabled = true;
    playButton.textContent = 'Generating ATC voice...';
  }

  if (scenario.audioUrl) {
    try {
      var audio = new Audio(scenario.audioUrl);

      audio.onended = function() {
        if (playButton) {
          playButton.disabled = false;
          playButton.textContent = '▶ Play transmission';
        }
      };

      audio.onerror = function() {
        if (playButton) {
          playButton.disabled = false;
          playButton.textContent = '▶ Play transmission';
        }

        setImmersiveFeedback('No pude reproducir el audioUrl guardado. Intentando generar voz con Google TTS...', 'warning');
        generateScenarioVoiceFromServer_(scenario, playButton);
      };

      audio.play();

      setImmersiveFeedback('Playing pre-generated professional ATC audio.', 'success');
      return;

    } catch (err) {
      setImmersiveFeedback('AudioUrl failed. Generating voice with Google TTS...', 'warning');
    }
  }

  generateScenarioVoiceFromServer_(scenario, playButton);
}


function generateScenarioVoiceFromServer_(scenario, playButton) {
  google.script.run
    .withSuccessHandler(function(res) {
      if (playButton) {
        playButton.disabled = false;
        playButton.textContent = '▶ Play transmission';
      }

      if (!res || !res.ok) {
        setImmersiveFeedback(
          res && res.message
            ? res.message
            : 'No pude generar la voz ATC. Revisa GOOGLE_TTS_API_KEY y TTSService.gs.',
          'danger'
        );
        return;
      }

      if (!res.audioBase64) {
        setImmersiveFeedback('Google TTS respondió, pero no devolvió audioBase64.', 'danger');
        return;
      }

      playBase64AudioSafe_(res.audioBase64);

      setImmersiveFeedback(
        'ATC voice generated: ' +
          (res.voiceProfile || '') +
          ' · ' +
          (res.voiceName || '') +
          ' · ' +
          (res.languageCode || ''),
        'success'
      );
    })
    .withFailureHandler(function(err) {
      if (playButton) {
        playButton.disabled = false;
        playButton.textContent = '▶ Play transmission';
      }

      setImmersiveFeedback(
        err && err.message
          ? err.message
          : 'Server error generating ATC voice.',
        'danger'
      );
    })
    .apiGenerateScenarioVoice(AppState.sessionToken, {
      scenarioId: scenario.scenarioId
    });
}


function playBase64AudioSafe_(audioBase64) {
  try {
    var audio = new Audio('data:audio/mp3;base64,' + audioBase64);
    audio.volume = 1;
    audio.play();
  } catch (err) {
    setImmersiveFeedback('Could not play generated audio: ' + err.message, 'danger');
  }
}

function browserSpeakAtcFallback(text, country) {
  if (!window.speechSynthesis) {
    setImmersiveFeedback('Browser speech synthesis is not available.', 'danger');
    return;
  }

  window.speechSynthesis.cancel();

  var utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = getBrowserVoiceLangForCountry(country);
  utterance.rate = 0.86;
  utterance.pitch = 0.92;
  utterance.volume = 1;

  var voices = window.speechSynthesis.getVoices();
  var preferred = pickBrowserVoiceForCountry(voices, country);

  if (preferred) {
    utterance.voice = preferred;
  }

  window.speechSynthesis.speak(utterance);
}

function getBrowserVoiceLangForCountry(country) {
  var key = String(country || '').trim().toUpperCase();

  if (key === 'UK' || key === 'GB') return 'en-GB';
  if (key === 'AUSTRALIA') return 'en-AU';
  if (key === 'INDIA' || key === 'IN') return 'en-IN';
  if (key === 'CANADA') return 'en-CA';

  return 'en-US';
}

function pickBrowserVoiceForCountry(voices, country) {
  var lang = getBrowserVoiceLangForCountry(country);

  for (var i = 0; i < voices.length; i++) {
    if (String(voices[i].lang || '').toLowerCase() === lang.toLowerCase()) {
      return voices[i];
    }
  }

  for (var j = 0; j < voices.length; j++) {
    if (String(voices[j].lang || '').toLowerCase().indexOf('en') === 0) {
      return voices[j];
    }
  }

  return null;
}

function adminHtml(value) {
  if (typeof escapeHtml === 'function') {
    return escapeHtml(value);
  }

  return String(value === undefined || value === null ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function adminJs(value) {
  return String(value || '')
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'");
}

function adminNormalizeCountry(country) {
  var raw = String(country || '').trim();

  if (!raw) return 'USA';

  var upper = raw.toUpperCase();

  if (upper === 'US') return 'USA';
  if (upper === 'GB') return 'UK';
  if (upper === 'IN') return 'India';
  if (upper === 'CO') return 'Colombia';

  return raw;
}

function adminGetCountriesForLevel(level, selectedCountry) {
  level = Number(level || 1);

  var list = ADMIN_LEVEL_COUNTRY_RULES[level] || ADMIN_COUNTRIES_MASTER.slice();
  var normalizedSelected = adminNormalizeCountry(selectedCountry || '');

  if (normalizedSelected && list.map(function(c) {
    return String(c).toUpperCase();
  }).indexOf(String(normalizedSelected).toUpperCase()) < 0) {
    list = [normalizedSelected].concat(list);
  }

  return list;
}

function adminOptionHtml(value, selectedValue, label) {
  var selected =
    String(value || '').toUpperCase() === String(selectedValue || '').toUpperCase()
      ? ' selected'
      : '';

  return '<option value="' + adminHtml(value) + '"' + selected + '>' + adminHtml(label || value) + '</option>';
}

function adminLevelOptionsHtml(selectedLevel) {
  var html = '';
  selectedLevel = Number(selectedLevel || 1);

  for (var i = 1; i <= 50; i++) {
    html += adminOptionHtml(i, selectedLevel, 'Level ' + i);
  }

  return html;
}

function adminCountryOptionsHtml(level, selectedCountry) {
  var countries = adminGetCountriesForLevel(level, selectedCountry);
  var html = '';

  countries.forEach(function(country) {
    html += adminOptionHtml(country, selectedCountry || 'USA', country);
  });

  return html;
}

function adminPhaseOptionsHtml(selectedCode) {

  selectedCode = String(selectedCode || 'STARTUP').toUpperCase();

function adminEmergencyTypeOptionsHtml(selectedType) {
  var html = '';

    html += adminOptionHtml(type, selectedType, label);

function adminGetPhaseByCode(code) {
  code = String(code || 'STARTUP').toUpperCase();

  for (var i = 0; i < ADMIN_FLIGHT_PHASES.length; i++) {
    if (ADMIN_FLIGHT_PHASES[i].code === code) {
      return ADMIN_FLIGHT_PHASES[i];
    }
  }

  return ADMIN_FLIGHT_PHASES[0];
}

function adminBuildFlightId(level, country, scenarioType) {
  var cleanCountry = String(country || 'USA')
    .trim()
    .toUpperCase()
    .replace(/\s+/g, '_');

  var cleanType = String(scenarioType || 'NORMAL')
    .trim()
    .toUpperCase();

  return 'FLT-L' + Number(level || 1) + '-' + cleanCountry + '-' + cleanType;
}

function adminBuildFlightName(level, country, scenarioType) {
  var typeLabel = String(scenarioType || 'NORMAL').toUpperCase() === 'EMERGENCY'
    ? 'Emergency Flight'
    : 'Normal Flight';

  return String(country || 'USA') + ' Level ' + Number(level || 1) + ' ' + typeLabel;
}

function adminOnLevelChanged() {
  var levelEl = document.getElementById('scenarioLevel');
  var countryEl = document.getElementById('scenarioCountry');

  if (!levelEl || !countryEl) return;

  var currentCountry = countryEl.value || 'USA';
  countryEl.innerHTML = adminCountryOptionsHtml(Number(levelEl.value || 1), currentCountry);

  adminAutoFillScenarioMeta();
}

function adminOnPhaseChanged() {
  var phaseCodeEl = document.getElementById('scenarioPhaseCode');
  var phaseNameEl = document.getElementById('scenarioPhaseName');
  var phaseOrderEl = document.getElementById('scenarioPhaseOrder');

  if (!phaseCodeEl || !phaseNameEl || !phaseOrderEl) return;

  var phase = adminGetPhaseByCode(phaseCodeEl.value);

  phaseNameEl.value = phase.name;
  phaseOrderEl.value = phase.order;
}

function adminAutoFillScenarioMeta() {
  var levelEl = document.getElementById('scenarioLevel');
  var countryEl = document.getElementById('scenarioCountry');
  var typeEl = document.getElementById('scenarioType');
  var flightIdEl = document.getElementById('flightScenarioId');
  var flightNameEl = document.getElementById('flightScenarioName');
  var emergencyEl = document.getElementById('emergencyType');

  if (!levelEl || !countryEl || !typeEl || !flightIdEl || !flightNameEl) return;

  var level = Number(levelEl.value || 1);
  var country = countryEl.value || 'USA';
  var scenarioType = String(typeEl.value || 'NORMAL').toUpperCase();

  var defaultId = adminBuildFlightId(level, country, scenarioType);
  var defaultName = adminBuildFlightName(level, country, scenarioType);

  if (adminIsAutoFlightId(flightIdEl.value)) {
    flightIdEl.value = defaultId;
  }

  if (!flightNameEl.value || /Level\s+\d+/i.test(flightNameEl.value)) {
    flightNameEl.value = defaultName;
  }

  if (emergencyEl) {
    if (scenarioType === 'NORMAL') {
      emergencyEl.value = '';
      emergencyEl.disabled = true;
    } else {
      emergencyEl.disabled = false;
    }
  }
}

function adminValidateScenarioForm(showMessage) {
  var payload = adminCollectScenarioPayload();
  var errors = [];

  if (!payload.level || payload.level < 1) {
    errors.push('Level is required.');
  }

  if (!payload.country) {
    errors.push('Country is required.');
  }

  if (!payload.flightScenarioId) {
    errors.push('Flight Scenario ID is required.');
  }

  if (!payload.flightScenarioName) {
    errors.push('Flight Scenario Name is required.');
  }

  if (!payload.phaseCode) {
    errors.push('Flight phase is required.');
  }

  if (!payload.context) {
    errors.push('Context / briefing is required.');
  }

  if (!payload.atcText) {
    errors.push('ATC text is required.');
  }

  if (
    payload.atcText &&
    payload.atcText.toUpperCase() === String(payload.country || '').toUpperCase()
  ) {
    errors.push('ATC text cannot be only the country name.');
  }

  if (!payload.expectedReadback) {
    errors.push('Expected read-back is required.');
  }

  if (!payload.keywordsText) {
    errors.push('Keywords are required.');
  }

  if (payload.scenarioType === 'EMERGENCY' && !payload.emergencyType) {
    errors.push('Emergency Type is required for emergency scenarios.');
  }

  if (errors.length) {
    if (showMessage) {
      adminSetScenarioFormMessage(errors.join(' | '), 'error');
    }

    return {
      ok: false,
      errors: errors,
      payload: payload
    };
  }

  if (showMessage) {
    adminSetScenarioFormMessage('Scenario looks good.', 'ok');
  }

  return {
    ok: true,
    errors: [],
    payload: payload
  };
}

function adminSetScenarioFormMessage(message, type) {
  var msg = document.getElementById('scenarioFormMessage');

  if (!msg) return;

  msg.textContent = message || '';
  msg.className = 'message admin-form-message';

  if (type) {
    msg.classList.add('is-' + type);
  }
}

function adminSaveScenario() {
  var validation = adminValidateScenarioForm(false);
  var btn = document.getElementById('saveScenarioBtn');

  if (!validation.ok) {
    adminSetScenarioFormMessage(validation.errors.join(' | '), 'error');
    return;
  }

  if (btn) {
    btn.disabled = true;
    btn.textContent = 'Saving...';
  }

  adminSetScenarioFormMessage('Saving scenario...', 'warning');

  google.script.run
    .withSuccessHandler(function(res) {
      if (btn) {
        btn.disabled = false;
        btn.textContent = 'Save scenario';
      }

      if (!res || !res.ok) {
        adminSetScenarioFormMessage(
          res && res.message ? res.message : 'Could not save scenario.',
          'error'
        );
        return;
      }

      alert(res.message || 'Scenario saved.');
      renderAdminScenarios();
    })
    .withFailureHandler(function(err) {
      if (btn) {
        btn.disabled = false;
        btn.textContent = 'Save scenario';
      }

      adminSetScenarioFormMessage(
        err && err.message ? err.message : 'Server error saving scenario.',
        'error'
      );
    })
    .apiAdminSaveScenario(AppState.sessionToken, validation.payload);
}

function normalizeRouteScenariosFix(data) {

  var scenarios = [];

  if (Array.isArray(data.scenarios)) {
    scenarios = data.scenarios;
  } else if (data.data && Array.isArray(data.data.scenarios)) {
    scenarios = data.data.scenarios;
    data = data.data;
  }

  scenarios = scenarios
    .filter(function(s) {
      return s && s.scenarioId;
    })
    .sort(function(a, b) {
      var phaseA = Number(a.phaseOrder || 0);
      var phaseB = Number(b.phaseOrder || 0);

      if (phaseA !== phaseB) {
        return phaseA - phaseB;
      }

      return Number(a.scenarioOrder || 0) - Number(b.scenarioOrder || 0);
    });

  data.scenarios = scenarios;
  data.totalScenarios = scenarios.length;

  return data;
}

function getCurrentScenarioSim() {
  AppState.training = AppState.training || {};

  var scenarios = [];

  if (Array.isArray(AppState.training.scenarios) && AppState.training.scenarios.length) {
    scenarios = AppState.training.scenarios;
  } else if (
    AppState.training.route &&
    Array.isArray(AppState.training.route.scenarios)
  ) {
    scenarios = AppState.training.route.scenarios;
    AppState.training.scenarios = scenarios;
  }

  var idx = Number(AppState.training.currentIndex || 0);

  if (!scenarios.length) {
    return null;
  }

  if (idx < 0) {
    idx = 0;
  }

  if (idx >= scenarios.length) {
    idx = scenarios.length - 1;
  }

  AppState.training.currentIndex = idx;

  return scenarios[idx];
}

  var txt = document.getElementById('pilotReadback');
  var value = txt ? txt.value.trim() : '';

  if (!value) {
    setImmersiveFeedback('Write your read-back before sending it.', 'warning');
    return;
  }

  syncImmersiveLegacyFields();

  if (typeof submitScenarioAnswer === 'function') {
    submitScenarioAnswer();
    return;
  }

  setImmersiveFeedback('Evaluation handler not found. Check submitScenarioAnswer().', 'danger');

function submitScenarioAnswer() {
  AppState.training = AppState.training || {};

  var scenarios = AppState.training.scenarios || [];

  if (!scenarios.length && AppState.training.route && AppState.training.route.scenarios) {
    scenarios = AppState.training.route.scenarios;
    AppState.training.scenarios = scenarios;
  }

  var index = Number(AppState.training.currentIndex || 0);
  var scenario = scenarios[index];

  var answerEl =
    document.getElementById('studentAnswer') ||
    document.getElementById('pilotReadback') ||
    document.getElementById('studentReadback') ||
    document.getElementById('readbackInput');

  if (!scenario) {
    showContentError(
      'Training scenario is not available.\n\n' +
      'Index: ' + index + '\n' +
      'Loaded scenarios: ' + scenarios.length
    );
    return;
  }

  if (!answerEl) {
    showContentError('Read-back input is not available.');
    return;
  }

  var answer = answerEl.value.trim();

  if (!answer) {
    setImmersiveFeedback('Please type your read-back before submitting.', 'warning');
    return;
  }

  var responseTimeSec = AppState.training.scenarioStartMs
    ? Math.round((Date.now() - AppState.training.scenarioStartMs) / 1000)
    : 0;

  setImmersiveFeedback('Evaluating read-back...', 'warning');

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.ok) {
        setImmersiveFeedback(
          res && res.message ? res.message : 'Could not save attempt.',
          'danger'
        );
        return;
      }

      renderAttemptFeedback(res);
    })
    .withFailureHandler(function(err) {
      setImmersiveFeedback(
        err && err.message ? err.message : 'Server error while evaluating read-back.',
        'danger'
      );
    })
    .apiSubmitAttempt(AppState.sessionToken, {
      scenarioId: scenario.scenarioId,
      studentAnswer: answer,
      responseTimeSec: responseTimeSec
    });
}

    .replace(/</g, '&lt;')

function calculateLevelAverageScore_(levelInfo) {
  if (!levelInfo || !levelInfo.countries || !levelInfo.countries.length) {
    return 0;
  }

  var sum = 0;
  var count = 0;

  levelInfo.countries.forEach(function(country) {
    var score = Number(country.scoreAvg || 0);

    if (score > 0) {
      sum += score;
      count++;
    }
  });

  if (!count) return 0;

  return Math.round(sum / count);
}

function markCurrentRouteCompletedOnClient_() {

  var country = String(route.currentCountry || AppState.training.selectedCountry || 'USA');

  };

function mergeCurrentRouteCompletionIntoCatalog_(catalog) {
  catalog = catalog || AppState.training.catalog || { levels: [] };
  catalog.levels = catalog.levels || [];

  var completedRoute = AppState.training.lastCompletedRoute || {};
  var level = Number(completedRoute.level || AppState.training.selectedLevel || 1);
  var country = String(completedRoute.country || AppState.training.selectedCountry || 'USA');

  var levelInfo = completionFindLevel_(catalog, level);

  if (!levelInfo) {
    levelInfo = {
      level: level,
      totalCountries: 1,
      completedCountries: 0,
      completed: false,
      unlocked: true,
      locked: false,
      countries: []
    };

    catalog.levels.push(levelInfo);
  }

  levelInfo.countries = levelInfo.countries || [];

  var countryInfo = completionFindCountry_(levelInfo, country);

  if (!countryInfo) {
    countryInfo = {
      country: country,
      level: level,
      totalScenarios: completedRoute.totalScenarios || 0,
      completedScenarios: 0,
      progressPct: 0,
      scoreAvg: 0,
      completed: false
    };

    levelInfo.countries.push(countryInfo);
  }

  var totalScenarios = Number(countryInfo.totalScenarios || completedRoute.totalScenarios || 0);

  countryInfo.totalScenarios = totalScenarios;
  countryInfo.completedScenarios = totalScenarios;
  countryInfo.progressPct = 100;
  countryInfo.completed = true;

  var completedCountries = 0;

  levelInfo.countries.forEach(function(c) {
    if (completionIsCountryCompleted_(c)) {
      completedCountries++;
    }
  });

  levelInfo.totalCountries = levelInfo.countries.length;
  levelInfo.completedCountries = completedCountries;
  levelInfo.completed = levelInfo.totalCountries > 0 && completedCountries >= levelInfo.totalCountries;

  return catalog;
}


function completionNormalizeCountryKey_(country) {
  var key = String(country || '').trim().toUpperCase();

  if (key === 'US') return 'USA';
  if (key === 'IN') return 'INDIA';
  if (key === 'CO') return 'COLOMBIA';
  if (key === 'GB') return 'UK';

  return key;
}


function completionFindLevel_(catalog, level) {
  catalog = catalog || {};
  var levels = catalog.levels || [];

  for (var i = 0; i < levels.length; i++) {
    if (Number(levels[i].level) === Number(level)) {
      return levels[i];
    }
  }

  return null;
}


function completionFindCountry_(levelInfo, country) {
  levelInfo = levelInfo || {};
  var countries = levelInfo.countries || [];
  var target = completionNormalizeCountryKey_(country);

  for (var i = 0; i < countries.length; i++) {
    if (completionNormalizeCountryKey_(countries[i].country) === target) {
      return countries[i];
    }
  }

  return null;
}


function completionIsCountryCompleted_(countryInfo) {
  if (!countryInfo) return false;

  if (countryInfo.completed === true) return true;

  var completed = Number(countryInfo.completedScenarios || 0);
  var total = Number(countryInfo.totalScenarios || 0);

  return total > 0 && completed >= total;
}


function completionIsLevelCompleted_(levelInfo) {
  if (!levelInfo) return false;

  if (levelInfo.completed === true) return true;

  var totalCountries = Number(levelInfo.totalCountries || 0);
  var completedCountries = Number(levelInfo.completedCountries || 0);

  return totalCountries > 0 && completedCountries >= totalCountries;
}



/*******************************************************
 * COMPLETION PROCESSING HARD FIX
 *******************************************************/

function renderTrainingFinished() {
  if (typeof disableSimulatorFocusMode === 'function') {
    disableSimulatorFocusMode();
  }

  markCurrentRouteCompletedOnClientHard_();

  document.getElementById('contentArea').innerHTML =
    '<div class="panel">' +
      '<p class="eyebrow">Operational Debrief</p>' +
      '<h3>Processing route completion...</h3>' +
      '<p class="subtitle">Verifying country and level progress.</p>' +
    '</div>';

  var finished = false;

  var fallbackTimer = setTimeout(function() {
    if (finished) return;

    finished = true;

    var localCatalog = buildCompletionCatalogHard_(AppState.training.catalog);
    AppState.training.catalog = localCatalog;

    renderCompletionExperienceHard_(localCatalog);
  }, 1800);

  google.script.run
    .withSuccessHandler(function(res) {
      if (finished) return;

      finished = true;
      clearTimeout(fallbackTimer);

      var catalog = res && res.ok && res.catalog
        ? res.catalog
        : AppState.training.catalog;

      catalog = buildCompletionCatalogHard_(catalog);
      AppState.training.catalog = catalog;

      renderCompletionExperienceHard_(catalog);
    })
    .withFailureHandler(function(err) {
      if (finished) return;

      finished = true;
      clearTimeout(fallbackTimer);

      var catalog = buildCompletionCatalogHard_(AppState.training.catalog);
      AppState.training.catalog = catalog;

      renderCompletionExperienceHard_(catalog);
    })
    .apiGetTrainingCatalogV5_HARD(AppState.sessionToken);
}


function markCurrentRouteCompletedOnClientHard_() {
  AppState.training = AppState.training || {};

  var route = AppState.training.route || {};
  var scenarios = AppState.training.scenarios || route.scenarios || [];

  var level = Number(
    route.currentLevel ||
    AppState.training.selectedLevel ||
    1
  );

  var country = String(
    route.currentCountry ||
    AppState.training.selectedCountry ||
    'USA'
  );

  AppState.training.lastCompletedRoute = {
    level: level,
    country: country,
    totalScenarios: scenarios.length,
    completedScenarios: scenarios.length
  };
}


function buildCompletionCatalogHard_(catalog) {
  catalog = catalog || AppState.training.catalog || {};
  catalog.levels = catalog.levels || [];

  var route = AppState.training.lastCompletedRoute || {};
  var levelNumber = Number(route.level || AppState.training.selectedLevel || 1);
  var countryName = String(route.country || AppState.training.selectedCountry || 'USA');

  var levelInfo = findOrCreateCompletionLevelHard_(catalog, levelNumber);
  var countryInfo = findOrCreateCompletionCountryHard_(levelInfo, countryName);

  var total = Number(
    countryInfo.totalScenarios ||
    route.totalScenarios ||
    AppState.training.scenarios.length ||
    0
  );

  countryInfo.totalScenarios = total;
  countryInfo.completedScenarios = total;
  countryInfo.progressPct = 100;
  countryInfo.completed = true;

  var completedCountries = 0;

  levelInfo.countries.forEach(function(c) {
    if (isCompletionCountryDoneHard_(c)) {
      completedCountries++;
    }
  });

  levelInfo.totalCountries = levelInfo.countries.length;
  levelInfo.completedCountries = completedCountries;
  levelInfo.completed = levelInfo.totalCountries > 0 && completedCountries >= levelInfo.totalCountries;
  levelInfo.unlocked = true;
  levelInfo.locked = false;

  AppState.training.selectedLevelData = levelInfo;
  AppState.training.lastCompletedLevelInfo = levelInfo;
  AppState.training.lastCompletedCountryInfo = countryInfo;
  AppState.training.lastLevelCompleted = levelInfo.completed;

  return catalog;
}


function findOrCreateCompletionLevelHard_(catalog, levelNumber) {
  var levels = catalog.levels || [];

  for (var i = 0; i < levels.length; i++) {
    if (Number(levels[i].level) === Number(levelNumber)) {
      levels[i].countries = levels[i].countries || [];
      return levels[i];
    }
  }

  var newLevel = {
    level: Number(levelNumber),
    totalCountries: 0,
    completedCountries: 0,
    completed: false,
    unlocked: true,
    locked: false,
    countries: []
  };

  levels.push(newLevel);
  catalog.levels = levels;

  return newLevel;
}


function findOrCreateCompletionCountryHard_(levelInfo, countryName) {
  levelInfo.countries = levelInfo.countries || [];

  var target = normalizeCompletionCountryHard_(countryName);

  for (var i = 0; i < levelInfo.countries.length; i++) {
    if (normalizeCompletionCountryHard_(levelInfo.countries[i].country) === target) {
      return levelInfo.countries[i];
    }
  }

  var newCountry = {
    country: countryName,
    level: levelInfo.level,
    totalScenarios: AppState.training.scenarios ? AppState.training.scenarios.length : 0,
    completedScenarios: 0,
    progressPct: 0,
    scoreAvg: 0,
    completed: false
  };

  levelInfo.countries.push(newCountry);

  return newCountry;
}


function normalizeCompletionCountryHard_(country) {
  var key = String(country || '').trim().toUpperCase();

  if (key === 'US') return 'USA';
  if (key === 'IN') return 'INDIA';
  if (key === 'CO') return 'COLOMBIA';
  if (key === 'GB') return 'UK';

  return key;
}


function isCompletionCountryDoneHard_(countryInfo) {
  if (!countryInfo) return false;
  if (countryInfo.completed === true) return true;

  var completed = Number(countryInfo.completedScenarios || 0);
  var total = Number(countryInfo.totalScenarios || 0);

  return total > 0 && completed >= total;
}


function renderCompletionExperienceHard_(catalog) {
  var route = AppState.training.lastCompletedRoute || {};
  var levelNumber = Number(route.level || AppState.training.selectedLevel || 1);
  var countryName = String(route.country || AppState.training.selectedCountry || 'USA');

  var levelInfo = findOrCreateCompletionLevelHard_(catalog, levelNumber);
  var countryInfo = findOrCreateCompletionCountryHard_(levelInfo, countryName);

  var levelCompleted =
    levelInfo.completed === true ||
    (
      Number(levelInfo.totalCountries || 0) > 0 &&
      Number(levelInfo.completedCountries || 0) >= Number(levelInfo.totalCountries || 0)
    );

  AppState.training.lastCompletedLevelInfo = levelInfo;
  AppState.training.lastCompletedCountryInfo = countryInfo;
  AppState.training.lastLevelCompleted = levelCompleted;

  try {
    if (typeof renderCountryCompletionScreen === 'function') {
      renderCountryCompletionScreen(levelInfo, countryInfo, true, levelCompleted);
      return;
    }
  } catch (err) {
    console.error('renderCountryCompletionScreen failed:', err);
  }

  renderFallbackOperationalDebriefHard_(levelInfo, countryInfo, levelCompleted);
}


function renderFallbackOperationalDebriefHard_(levelInfo, countryInfo, levelCompleted) {
  var countryLabel = countryInfo.country || 'Country';
  var level = levelInfo.level || 1;

  document.getElementById('contentArea').innerHTML =
    '<section class="panel">' +
      '<p class="eyebrow">Operational Debrief</p>' +
      '<h3>' + (levelCompleted ? 'Level completed' : 'Country route completed') + '</h3>' +
      '<p class="subtitle">' +
        'You completed the ' + escapeHtml(countryLabel) +
        ' ATC communication route for Level ' + escapeHtml(level) + '.' +
      '</p>' +

      '<div class="action-row">' +
        '<button class="btn secondary" onclick="renderCountryTrainingHub(AppState.training.selectedLevelData)">Back to countries</button>' +
        '<button class="btn secondary" onclick="renderProgressPlaceholder()">View progress</button>' +
        (
          levelCompleted
            ? '<button class="btn primary" onclick="renderLevelCertificateScreen(AppState.training.lastCompletedLevelInfo, AppState.training.lastCompletedCountryInfo)">View Level Certificate</button>'
            : ''
        ) +
      '</div>' +
    '</section>';
}

function certSafeHtml(value) {
  if (typeof escapeHtml === 'function') {
    return escapeHtml(value);
  }

  return String(value === undefined || value === null ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function getSeniorPilotName_() {
  return AppState && AppState.user && AppState.user.name
    ? AppState.user.name
    : 'Senior Pilot';
}

function getSeniorCertificateId_(level) {
  var email = AppState && AppState.user && AppState.user.email
    ? AppState.user.email
    : 'pilot';

  var code = String(email)
    .split('@')[0]
    .replace(/[^\w]/g, '')
    .slice(0, 6)
    .toUpperCase();

  var date = new Date();
  var y = date.getFullYear();
  var m = String(date.getMonth() + 1).padStart(2, '0');
  var d = String(date.getDate()).padStart(2, '0');

  return 'ICAO-L' + Number(level || 1) + '-' + y + m + d + '-' + code;
}

function getCountryLabelSenior_(country) {
  if (typeof getCountryUi === 'function') {
    var meta = getCountryUi(country);
    return meta && meta.label ? meta.label : country;
  }

  return country || 'Country';
}

function calculateLevelAverageScore_(levelInfo) {
  if (!levelInfo || !levelInfo.countries || !levelInfo.countries.length) {
    return 0;
  }

  var sum = 0;
  var count = 0;

  levelInfo.countries.forEach(function(country) {
    var score = Number(country.scoreAvg || 0);

    if (score > 0) {
      sum += score;
      count++;
    }
  });

  if (!count) {
    return 0;
  }

  return Math.round(sum / count);
}

function renderLevelCertificateScreen(levelInfo, countryInfo) {
  levelInfo = levelInfo || {};
  countryInfo = countryInfo || {};

  var pilotName = getSeniorPilotName_();
  var level = Number(levelInfo.level || AppState.training.selectedLevel || 1);
  var certId = getSeniorCertificateId_(level);
  var dateText = new Date().toLocaleDateString();
  var avgScore = calculateLevelAverageScore_(levelInfo);

  var countries = '';

  if (levelInfo.countries && levelInfo.countries.length) {
    countries = levelInfo.countries.map(function(c) {
      return getCountryLabelSenior_(c.country);
    }).join(' · ');
  } else if (countryInfo.country) {
    countries = getCountryLabelSenior_(countryInfo.country);
  } else {
    countries = 'N/A';
  }

  document.getElementById('contentArea').innerHTML =
    '<section class="senior-certificate-shell">' +

      '<div class="senior-certificate-toolbar">' +
        '<div>' +
          '<p class="eyebrow">Level completed</p>' +
          '<h2>Certificate ready</h2>' +
          '<p class="subtitle">A professional certificate has been generated for this completed level.</p>' +
        '</div>' +

        '<div class="senior-actions compact">' +
          '<button class="btn secondary" onclick="renderSimulatorPlaceholder()">Back to simulator</button>' +
          '<button class="btn secondary" onclick="renderProgressPlaceholder()">View progress</button>' +
          '<button class="btn primary" onclick="window.print()">Print certificate</button>' +
        '</div>' +
      '</div>' +

      '<div class="senior-certificate-card">' +
        '<div class="senior-cert-watermark">ICAO</div>' +

        '<div class="senior-cert-header">' +
          '<div>' +
            '<p class="senior-cert-kicker">ICAO Trainer Pro</p>' +
            '<h1>Certificate of Operational Proficiency</h1>' +
          '</div>' +

          '<div class="senior-cert-id">' +
            '<span>Certificate ID</span>' +
            '<strong>' + certSafeHtml(certId) + '</strong>' +
          '</div>' +
        '</div>' +

        '<div class="senior-cert-body">' +
          '<p>This certifies that</p>' +
          '<h2>' + certSafeHtml(pilotName) + '</h2>' +
          '<p>has successfully completed</p>' +
          '<h3>Level ' + certSafeHtml(level) + ' Aviation Communication Training</h3>' +

          '<div class="senior-cert-route">' +
            '<span>Completed ATC environments</span>' +
            '<strong>' + certSafeHtml(countries) + '</strong>' +
          '</div>' +
        '</div>' +

        '<div class="senior-cert-metrics">' +
          '<div>' +
            '<span>Average Score</span>' +
            '<strong>' + certSafeHtml(avgScore) + '%</strong>' +
          '</div>' +

          '<div>' +
            '<span>Training Level</span>' +
            '<strong>Level ' + certSafeHtml(level) + '</strong>' +
          '</div>' +

          '<div>' +
            '<span>Date Issued</span>' +
            '<strong>' + certSafeHtml(dateText) + '</strong>' +
          '</div>' +
        '</div>' +

        '<div class="senior-cert-footer">' +
          '<div class="senior-signature">' +
            '<span></span>' +
            '<strong>Training Platform Authority</strong>' +
            '<small>ICAO Trainer Pro</small>' +
          '</div>' +

          '<div class="senior-seal">' +
            '<span>ATP</span>' +
            '<small>Verified</small>' +
          '</div>' +
        '</div>' +

      '</div>' +

    '</section>';
}
