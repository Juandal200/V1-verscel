<script>
/* ── Global mic utility — used by live simulator, ICAO test, and exam ──────── */
(function() {
  var _gMicRecorder = null;
  var _gMicStream   = null;
  var _gMicChunks   = [];
  var _gMicActive   = false;

  // Base phonetic fixes for hard ATC terms the browser consistently mishears.
  var _BASE_FIXES = [
    ['queue and h',  'QNH'],  ['cue and h',  'QNH'],  ['q and h',  'QNH'],
    ['cue nh',       'QNH'],  ['q n h',      'QNH'],  ['key nh',   'QNH'],
    ['hold shirt',   'HOLD SHORT'],
    ['go around',    'GO AROUND'],   ['go-around',   'GO AROUND'],
    ['push back',    'PUSHBACK'],    ['push-back',   'PUSHBACK'],
    ['take off',     'TAKEOFF'],     ['take-off',    'TAKEOFF'],
    ['line up',      'LINE UP'],     ['line-up',     'LINE UP'],
    ['fox trot',     'FOXTROT'],     ['fox-trot',    'FOXTROT'],
    ['touch down',   'TOUCHDOWN'],   ['touch-down',  'TOUCHDOWN'],
    ['will go',      'WILCO'],
    ['squork',       'SQUAWK'],      ['squats',      'SQUAWK'],
    ["i'll",         'ILS'],         ['aisles',      'ILS'],       ['i l s', 'ILS'],
    ["eighty's",     'ATIS'],        ['eight is',    'ATIS'],
    ['alfa',         'ALPHA'],
    ['niner',        'NINER'],       ['liner',       'NINER'],     ['diner', 'NINER']
  ];

  function _scenarioFixes(expectedReadback) {
    if (!expectedReadback) return [];
    var fixes = [];
    var text = String(expectedReadback).toUpperCase().trim();
    var csMatch = text.match(/\b([A-Z]{3,}(?:\s[A-Z]+)?)\s+(\d{1,4}[A-Z]?)\s*$/);
    if (csMatch) {
      var csWord = csMatch[1];
      var csNum  = csMatch[2];
      var split  = csWord.replace(/([A-Z][a-z]*)([A-Z])/g, '$1 $2').toLowerCase();
      if (split !== csWord.toLowerCase()) fixes.push([split + ' ' + csNum, csWord + ' ' + csNum]);
    }
    return fixes;
  }

  function _applyFixes(transcript, extra) {
    // Strip dashes between digits so Whisper's "1-1 0-9" becomes "1 1 0 9"
    var result = transcript.replace(/(\d)-(\d)/g, '$1 $2');
    var all = _BASE_FIXES.concat(extra || []);
    all.sort(function(a, b) { return b[0].length - a[0].length; });
    all.forEach(function(pair) {
      var pat = pair[0].replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      result = result.replace(new RegExp('(?:^|\\b)' + pat + '(?:\\b|$)', 'gi'), pair[1]);
    });
    return result;
  }

  function _resetBtn(btn) {
    if (!btn) return;
    btn.classList.remove('listening', 'processing');
    btn.innerHTML = '&#127908; Tap to speak';
    btn.disabled  = false;
  }

  // Fallback: browser SpeechRecognition when Whisper is unavailable (no API key).
  function _fallbackSpeechRec(textareaId, btnId, expected) {
    var SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    var btn = document.getElementById(btnId);
    if (!SpeechRec) {
      if (btn) { btn.textContent = 'Not supported — use Chrome or Edge'; btn.disabled = true; }
      return;
    }
    var rec = new SpeechRec();
    rec.lang = 'en-US'; rec.interimResults = false; rec.maxAlternatives = 1;
    rec.onstart = function() {
      _gMicActive = true;
      if (btn) { btn.classList.add('listening'); btn.innerHTML = '&#9679; Listening&hellip;'; }
    };
    rec.onresult = function(e) {
      var corrected = _applyFixes(e.results[0][0].transcript, _scenarioFixes(expected));
      var ta = document.getElementById(textareaId);
      if (ta) { ta.value = corrected; ta.focus(); ta.dispatchEvent(new Event('input')); }
    };
    rec.onend  = function() { _gMicActive = false; _resetBtn(btn); };
    rec.onerror = function(e) {
      _gMicActive = false; _resetBtn(btn);
      if (e.error === 'not-allowed') alert('Microphone access was denied. Please allow it in your browser settings.');
    };
    rec.start();
  }

  window.startMicInput = function(textareaId, btnId, expectedReadback) {
    var btn = document.getElementById(btnId);

    // Second tap while recording → stop
    if (_gMicActive) {
      if (_gMicRecorder && _gMicRecorder.state === 'recording') _gMicRecorder.stop();
      return;
    }

    var expected = expectedReadback || (
      window.AppState && AppState.training && AppState.training.scenarios
        ? (AppState.training.scenarios[AppState.training.currentIndex || 0] || {}).expectedReadback : ''
    );

    // No MediaRecorder support → go straight to browser SR fallback
    if (!navigator.mediaDevices || !window.MediaRecorder) {
      _fallbackSpeechRec(textareaId, btnId, expected);
      return;
    }

    navigator.mediaDevices.getUserMedia({ audio: true, video: false })
      .then(function(stream) {
        _gMicStream = stream;
        _gMicChunks = [];
        _gMicActive = true;

        var mimeType = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/ogg']
          .filter(function(t) { return MediaRecorder.isTypeSupported(t); })[0] || '';

        _gMicRecorder = mimeType
          ? new MediaRecorder(stream, { mimeType: mimeType })
          : new MediaRecorder(stream);

        _gMicRecorder.ondataavailable = function(e) {
          if (e.data && e.data.size > 0) _gMicChunks.push(e.data);
        };

        _gMicRecorder.onstop = function() {
          _gMicActive = false;
          stream.getTracks().forEach(function(t) { t.stop(); });

          if (btn) {
            btn.classList.remove('listening');
            btn.classList.add('processing');
            btn.innerHTML = '&#8987; Processing&hellip;';
            btn.disabled  = true;
          }

          var mime = _gMicRecorder.mimeType || 'audio/webm';
          var blob = new Blob(_gMicChunks, { type: mime });

          fetch('/api/whisper', {
            method:  'POST',
            headers: { 'Content-Type': mime },
            body:    blob
          })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            _resetBtn(btn);
            if (data.ok && data.transcript) {
              var corrected = _applyFixes(data.transcript, _scenarioFixes(expected));
              var ta = document.getElementById(textareaId);
              if (ta) { ta.value = corrected; ta.focus(); ta.dispatchEvent(new Event('input')); }
            } else if (data.noKey) {
              // API key not set — fall back to browser SR silently
              _fallbackSpeechRec(textareaId, btnId, expected);
            } else {
              if (btn) {
                btn.innerHTML = '&#9888; Try again';
                setTimeout(function() { _resetBtn(btn); }, 2500);
              }
            }
          })
          .catch(function() {
            _resetBtn(btn);
            _fallbackSpeechRec(textareaId, btnId, expected);
          });
        };

        if (btn) { btn.classList.add('listening'); btn.innerHTML = '&#9679; Listening&hellip; tap to stop'; }
        _gMicRecorder.start();
      })
      .catch(function(err) {
        _gMicActive = false;
        if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
          alert('Microphone access was denied. Please allow it in your browser settings.');
        } else {
          _fallbackSpeechRec(textareaId, btnId, expected);
        }
      });
  };
}());
</script>

    Array.prototype.slice.call(document.querySelectorAll('.screen')).forEach(function(screen) {
      screen.classList.remove('active');
    });

    var target = byId(screenId);
    if (target) target.classList.add('active');

  // Incremented only when the user navigates to a DIFFERENT top-level tab.
  // Async callbacks capture this at call time and bail if it has changed by the time they fire.
  var _navToken = 0;
  var _navLabel = '';

  function setActiveNav(label) {
    if (label !== _navLabel) {
      _navToken++; _navLabel = label; window._navToken = _navToken;
      if (label !== 'Simulator' && typeof window.stopFlightDrift === 'function') window.stopFlightDrift();
    }
    Array.prototype.slice.call(document.querySelectorAll('.nav-item')).forEach(function(btn) {
      btn.classList.remove('active');
      if (btn.textContent.trim() === label) btn.classList.add('active');
    });
    var gamMod     = byId('gamification-module');
    var contentArea = byId('contentArea');
    var isSquadron  = (label === 'Squadron' || label === 'Crew');
    if (gamMod)      gamMod.style.display     = isSquadron ? '' : 'none';
    if (contentArea) contentArea.style.display = isSquadron ? 'none' : '';

  function setLoginMessage(message) {
    var el = byId('loginMessage');
    if (el) el.textContent = message || '';
  }

  function setLoginButtonsDisabled(disabled) {
    var requestBtn = byId('requestCodeBtn');
    var registerBtn = byId('registerUserBtn');
    var verifyBtn = document.querySelector('#otpBox button');

    if (requestBtn) {
      requestBtn.disabled = disabled;
      requestBtn.textContent = disabled ? 'Please wait...' : 'Send access code';
    }

    if (registerBtn) {
      registerBtn.disabled = disabled;
      registerBtn.textContent = disabled ? 'Please wait...' : 'Request account approval';
    }

    if (verifyBtn) verifyBtn.disabled = disabled;
  }

  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email || '').trim());
  }

  function handleServerError(err) {
    console.error(err);
    var message = err && err.message ? err.message : 'Server error.';
    var appScreen = byId('appScreen');

    if (appScreen && appScreen.classList.contains('active')) {
      showContentError(message);
    } else {
      setLoginMessage(message);
    }
  }

  function showContentError(message) {
    var contentArea = byId('contentArea');
    if (!contentArea) return;

    contentArea.innerHTML =
      '<div class="panel">' +
        '<h3>Error</h3>' +
        '<p class="subtitle" style="white-space:pre-wrap;">' + safeText(message) + '</p>' +
      '</div>';
  }

  function _spinnerHtml(label) {
    return '<div class="app-spinner-wrap">' +
      '<div class="app-spinner"></div>' +
      (label ? '<p class="app-spinner-label">' + (label) + '</p>' : '') +
    '</div>';
  }
  window._spinnerHtml = _spinnerHtml;

  function showGasLoadingSkeleton(title, sub) {
    var el = byId('contentArea');
    if (!el) return;
    el.innerHTML = '<div class="panel">' + _spinnerHtml(sub || title || 'Loading...') + '</div>';
  }

  function bindLoginEnterKeys() {
    var emailInput = byId('loginEmail');
    var registerNameInput = byId('registerName');
    var registerEmailInput = byId('registerEmail');
    var codeInput = byId('loginCode');

    if (registerNameInput) {
      registerNameInput.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') requestRegistration();
      });
    }

    if (registerEmailInput) {
      registerEmailInput.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') requestRegistration();
      });
    }

    if (emailInput) {
      emailInput.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') requestLoginCode();
      });
    }

    if (codeInput) {
      codeInput.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') verifyLoginCode();
      });
    }
  }

  function setAuthMode(mode) {
    var loginMode = mode !== 'register';
    var loginForm = byId('loginForm');
    var registerForm = byId('registerForm');
    var loginBtn = byId('loginModeBtn');
    var registerBtn = byId('registerModeBtn');
    var otpBox = byId('otpBox');

    if (loginForm) loginForm.classList.toggle('hidden', !loginMode);
    if (registerForm) registerForm.classList.toggle('hidden', loginMode);
    if (loginBtn) loginBtn.className = 'btn ' + (loginMode ? 'primary' : 'secondary');
    if (registerBtn) registerBtn.className = 'btn ' + (loginMode ? 'secondary' : 'primary');
    if (!loginMode && otpBox) otpBox.classList.add('hidden');

    setLoginMessage('');
  }

  function requestRegistration() {
    var nameEl       = byId('registerName');
    var emailEl      = byId('registerEmail');
    var profEl       = byId('registerProfession');
    var name         = nameEl  ? nameEl.value.trim()              : '';
    var email        = emailEl ? emailEl.value.trim().toLowerCase() : '';
    var profession   = profEl  ? profEl.value.trim()              : '';

    if (!name || name.split(/\s+/).length < 2) {
      setLoginMessage('Enter your full name.');
      return;
    }

    if (!email) {
      setLoginMessage('Enter your email.');
      return;
    }

    if (!isValidEmail(email)) {
      setLoginMessage('Enter a valid email address.');
      return;
    }

    if (!profession) {
      setLoginMessage('Select your profession.');
      return;
    }

    setLoginMessage('Sending registration request...');
    setLoginButtonsDisabled(true);

    google.script.run
      .withSuccessHandler(function(res) {
        setLoginButtonsDisabled(false);

        if (!res || !res.ok) {
          setLoginMessage(res && res.message ? res.message : 'Could not register user.');
          return;
        }

        setLoginMessage(res.message || 'Registration request received.');
        if (String(res.status || '').toUpperCase() === 'ACTIVE') {
          setAuthMode('login');
          var loginEmail = byId('loginEmail');
          if (loginEmail) loginEmail.value = email;
        }
      })
      .withFailureHandler(function(err) {
        setLoginButtonsDisabled(false);
        handleServerError(err);
      })
      .apiRegisterUser({ name: name, email: email, profession: profession });
  }

  function requestLoginCode() {
    var email = byId('loginEmail').value.trim().toLowerCase();

    if (!email) {
      setLoginMessage('Enter your email.');
      return;
    }

    if (!isValidEmail(email)) {
      setLoginMessage('Enter a valid email address.');
      return;
    }

    setLoginMessage('Signing in...');
    setLoginButtonsDisabled(true);

    google.script.run
      .withSuccessHandler(function(res) {
        setLoginButtonsDisabled(false);
        handleLoginResponse(res);
      })
      .withFailureHandler(function(err) {
        setLoginButtonsDisabled(false);
        handleServerError(err);
      })
      .apiDirectLogin({ email: email });
  }

  function verifyLoginCode() {
    var email = byId('loginEmail').value.trim().toLowerCase();
    var code = byId('loginCode').value.trim();

    if (!email || !code) {
      setLoginMessage('Enter email and verification code.');
      return;
    }

    if (!isValidEmail(email)) {
      setLoginMessage('Enter a valid email address.');
      return;
    }

    if (!/^\d{6}$/.test(code)) {
      setLoginMessage('Enter the 6-digit verification code.');
      return;
    }

    setLoginMessage('Verifying code...');
    setLoginButtonsDisabled(true);

    google.script.run
      .withSuccessHandler(function(res) {
        setLoginButtonsDisabled(false);
        handleLoginResponse(res);
      })
      .withFailureHandler(function(err) {
        setLoginButtonsDisabled(false);
        handleServerError(err);
      })
      .apiVerifyLoginCode({ email: email, code: code });
  }

  function handleLoginResponse(res) {
    if (!res || !res.ok) {
      if (res && res.code === 'USER_NOT_ACTIVE') {
        AppState.user = res.user || null;
        showScreen('pendingScreen');
        return;
      }

      setLoginMessage(res && res.message ? res.message : 'Login failed.');
      return;
    }

    AppState.sessionToken  = res.sessionToken;
    AppState.user          = res.user;
    AppState.home          = res.home;
    AppState.accessStatus  = res.accessStatus || null;
    localStorage.setItem('icao_session_token', AppState.sessionToken);
    sessionStorage.setItem('icao_session_token', AppState.sessionToken);
    enterApplication();
  }

  function _clearSession() {
    localStorage.removeItem('icao_session_token');
    sessionStorage.removeItem('icao_session_token');
    AppState.sessionToken = '';
    AppState.user = null;
    AppState.home = null;
  }

  function _showSessionExpiredOverlay() {
    var existing = byId('sessionExpiredOverlay');
    if (existing) return;
    var overlay = document.createElement('div');
    overlay.id = 'sessionExpiredOverlay';
    overlay.innerHTML =
      '<div style="position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;">' +
        '<div style="background:#111;border:1px solid rgba(184,184,184,0.18);border-radius:22px;padding:36px 40px;text-align:center;max-width:360px;width:90%;">' +
          '<p style="font-size:2rem;margin:0 0 12px;">✈</p>' +
          '<h3 style="margin:0 0 8px;color:#f4f4f4;">Session expired</h3>' +
          '<p style="color:#808080;font-size:0.85rem;margin:0 0 24px;line-height:1.5;">Your login session has timed out. Sign in again to continue — your progress is saved.</p>' +
          '<button class="btn primary full" onclick="document.getElementById(\'sessionExpiredOverlay\').remove();showScreen(\'loginScreen\');setLoginMessage(\'\');">Sign in again</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);
  }

  function handleGetMeResponse(res) {
    if (!res || !res.ok) {
      // Distinguish a real auth failure from a transient server error.
      // Only clear the session if the server explicitly rejected the token.
      var isAuthError = !res || res.code === 'SESSION_ERROR' || res.code === 'AUTH_ERROR';
      if (isAuthError) {
        _clearSession();
        // If the app screen is already active, show a gentle overlay instead of a hard redirect.
        var appScreen = byId('appScreen');
        if (appScreen && appScreen.classList.contains('active')) {
          _showSessionExpiredOverlay();
        } else {
          showScreen('loginScreen');
          setLoginMessage('');
        }
      } else {
        // Transient error — don't log the user out, just show an error in the content area.
        showContentError(res && res.message ? res.message : 'Could not reach server. Check your connection and refresh.');
      }
      return;
    }

    AppState.user         = res.user;
    AppState.home         = res.home;
    AppState.accessStatus = res.accessStatus || null;
    enterApplication();
  }

  // Tier progress config — levels needed to enter each tier and its next
  var _TIER_PROGRESS = [
    { key: 'junior',     start: 0,  end: 3,  nextKey: 'senior',     nextAt: 4  },
    { key: 'senior',     start: 4,  end: 6,  nextKey: 'instructor', nextAt: 7  },
    { key: 'instructor', start: 7,  end: 9,  nextKey: 'chief',      nextAt: 10 },
    { key: 'chief',      start: 10, end: 10, nextKey: null,         nextAt: null }
  ];

  function _renderTopbarRank(completedLevels) {
    var profession = AppState.user && AppState.user.profession ? AppState.user.profession : 'PILOT';
    var tier = window._gamTierOf ? _gamTierOf(completedLevels, profession) : null;
    if (!tier) return;

    // ── Rank pill ──
    var pill = byId('userRankPill');
    if (pill) {
      pill.textContent       = tier.abbr;
      pill.style.color       = tier.color;
      pill.style.background  = tier.color + '18';
      pill.style.borderColor = tier.color + '40';
      pill.style.boxShadow   = '0 0 8px ' + tier.glow;
      pill.style.display     = '';
    }

    // ── Crew nav tab rank border ──
    var crewBtn = byId('crewNavBtn');
    if (crewBtn) {
      crewBtn.style.boxShadow = '0 0 0 1.5px ' + tier.color + ', 0 0 8px ' + tier.glow;
      crewBtn.style.transition = 'box-shadow 0.4s ease';
    }

    // ── Stripe badges + label ──
    var strips = byId('userRankStripes');
    if (strips && window._gamStripesSvg) {
      strips.innerHTML =
        _gamStripesSvg(tier.stripes, tier.color) +
        '<span style="font-size:0.67rem;font-weight:600;color:' + tier.color +
        ';margin-left:5px;letter-spacing:0.04em;opacity:0.85;">' + tier.label + '</span>';
      strips.style.display = '';
    }

    // ── Progress to next rank ──
    var prog      = byId('userRankProgress');
    var fill      = byId('userRankProgressFill');
    var lbl       = byId('userRankProgressLabel');
    if (!prog || !fill || !lbl) return;

    var cfg = null;
    for (var i = 0; i < _TIER_PROGRESS.length; i++) {
      if (_TIER_PROGRESS[i].key === tier.key) { cfg = _TIER_PROGRESS[i]; break; }
    }
    if (!cfg) return;

    if (!cfg.nextKey) {
      // Chief rank — peak rank
      fill.style.width      = '100%';
      fill.style.background = tier.color;
      lbl.textContent       = 'Peak rank achieved';
      lbl.style.color       = tier.color;
    } else {
      var span      = cfg.end - cfg.start + 1;
      var done      = Math.max(0, completedLevels - cfg.start);
      var pct       = Math.min(100, Math.round((done / span) * 100));
      var left      = cfg.nextAt - completedLevels;
      var nextLabel = _gamTierLabel(cfg.nextKey, profession);
      fill.style.width      = pct + '%';
      fill.style.background = tier.color;
      lbl.textContent       = left + ' level' + (left === 1 ? '' : 's') + ' to ' + nextLabel;
      lbl.style.color       = tier.color + 'cc';
    }
    prog.style.display = '';
  }

  function enterApplication() {
    if (window.LoginAudio) LoginAudio.stop();
    showScreen('appScreen');

    byId('userName').textContent = AppState.user.name || 'User';
    byId('userRole').textContent = AppState.user.role || '';
    byId('userEmail').textContent = AppState.user.email || '';

    if (window._gamStartPoll) setTimeout(_gamStartPoll, 2000);

    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.ok) _renderTopbarRank(res.completedLevels || 0);
      })
      .withFailureHandler(function() {})
      .getMyCompletedLevels(AppState.sessionToken);

    // Fire a silent TTS call on login to warm up GAS server + Google TTS API,
    // eliminating the cold-start delay when the student first reaches the simulator.
    setTimeout(function() {
      google.script.run
        .withSuccessHandler(function() {})
        .withFailureHandler(function() {})
        .apiGenerateIcaoTestVoice(AppState.sessionToken, { text: 'ready', country: 'USA' });
    }, 300);

    var role = AppState.user.role;
    if (role === 'ADMIN') {
      byId('adminNavButton').classList.remove('hidden');
      if (byId('analyticsNavButton')) byId('analyticsNavButton').classList.remove('hidden');
    } else if (role === 'INSTRUCTOR') {
      byId('adminNavButton').classList.add('hidden');
      if (byId('analyticsNavButton')) byId('analyticsNavButton').classList.remove('hidden');
    } else {
      byId('adminNavButton').classList.add('hidden');
      if (byId('analyticsNavButton')) byId('analyticsNavButton').classList.add('hidden');
    }

    AppState.viewAs = role;
    if (role === 'ADMIN') {
      _injectViewAsSwitcher();
    }

    // Access gate — check before rendering anything
    var _access = AppState.accessStatus;
    if (_access && _access.status === 'expired') {
      _renderPaywall();
      return;
    }

    // First Flight gate — guide new students through their first scenario
    if (AppState.user && AppState.user.role === 'STUDENT' && !AppState.user.firstFlightDone) {
      if (typeof window.renderFirstFlight === 'function') {
        window.renderFirstFlight();
        return;
      }
    }

    var simState = null;
    try { simState = JSON.parse(sessionStorage.getItem('icao_sim_state') || 'null'); } catch(e) {}

    if (simState && simState.level && simState.country) {
      startCountryTraining(simState.country, simState.level);
      return;
    }

    if (typeof window.renderSimulatorPlaceholder === 'function') {
      window.renderSimulatorPlaceholder();
    } else {
      renderHome();
    }

    setTimeout(function() {
      if (byId('appScreen') && byId('appScreen').classList.contains('active') && typeof window.renderHome === 'function') {
        var content = byId('contentArea');
        if (content && content.innerText.indexOf('Secure base ready') >= 0) {
          window.renderHome();
        }
      }
    }, 500);

    setTimeout(function() {
      if (typeof window.maybeShowDemo === 'function') window.maybeShowDemo();
    }, 1000);
  }

  function _injectViewAsSwitcher() {
    var topbar = document.querySelector('.topbar');
    if (!topbar) return;
    var existing = byId('viewAsSwitcher');
    if (existing) existing.remove();
    var el = document.createElement('div');
    el.id = 'viewAsSwitcher';
    el.style.cssText = 'display:flex;gap:6px;align-items:center;';
    el.innerHTML =
      '<span style="font-size:10px;color:#8a929c;font-weight:700;letter-spacing:1px;margin-right:2px;">VIEW AS</span>' +
      ['ADMIN','INSTRUCTOR','STUDENT'].map(function(v) {
        var active = AppState.viewAs === v;
        return '<button onclick="setViewAs(\'' + v + '\')" style="padding:4px 10px;font-size:11px;font-weight:700;border-radius:8px;border:1.5px solid ' +
          (active ? '#a0abb5' : '#363c42') + ';background:' + (active ? '#a0abb5' : 'transparent') +
          ';color:' + (active ? '#fff' : '#8a929c') + ';cursor:pointer;">' + v + '</button>';
      }).join('');
    var userChip = topbar.querySelector('.user-chip');
    if (userChip) topbar.insertBefore(el, userChip);
    else topbar.appendChild(el);

  function setViewAs(v) {
    AppState.viewAs = v;
    _injectViewAsSwitcher();
    if (typeof window.renderHome === 'function') window.renderHome();
    else renderHome();
  }

  window.setViewAs = setViewAs;

  function refreshMeAndHome(callback) {
    if (!AppState.sessionToken) {
      showScreen('loginScreen');
      return;
    }

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok) {
          var isAuthError = !res || res.code === 'SESSION_ERROR' || res.code === 'AUTH_ERROR';
          if (isAuthError) {
            _clearSession();
            _showSessionExpiredOverlay();
          } else {
            showContentError(res && res.message ? res.message : 'Could not load dashboard. Refresh to try again.');
          }
          return;
        }

        AppState.user         = res.user;
        AppState.home         = res.home;
        AppState.accessStatus = res.accessStatus || AppState.accessStatus || null;
        if (typeof callback === 'function') callback();
      })
      .withFailureHandler(handleServerError)
      .apiGetMe(AppState.sessionToken);
  }

    bar.style.cssText = 'background:#000000;border-bottom:1px solid rgba(255,255,255,0.1);color:#fff;text-align:center;padding:10px 16px;font-size:0.85rem;display:flex;align-items:center;justify-content:center;gap:16px;';

  function renderHome() {
    try { sessionStorage.removeItem('icao_sim_state'); } catch(e) {}
    setActiveNav('Dashboard');

    // Access gate
    if (AppState.accessStatus && AppState.accessStatus.status === 'expired') {
      _renderPaywall();
      return;
    }

    showGasLoadingSkeleton('LOADING DASHBOARD', 'Retrieving flight data...');
    var _tok = _navToken;

    refreshMeAndHome(function() {
      if (_navToken !== _tok) return;

      // Re-check after fresh data from server
      if (AppState.accessStatus && AppState.accessStatus.status === 'expired') {
        _renderPaywall();
        return;
      }
      if (AppState.accessStatus && AppState.accessStatus.status === 'trial') {
        _showTrialBanner(AppState.accessStatus.daysLeft);
      }

      var home = AppState.home || {};
      var metrics = home.metrics || {};
      var view = home.view || 'STUDENT';
      var cards = '';

      if (view === 'ADMIN') {
        cards += metricCard('Total users', metrics.totalUsers || 0);
        cards += metricCard('Active users', metrics.activeUsers || 0);

  function cabinaEnterFullscreen() {
    var el = document.documentElement;
    try {
      if (el.requestFullscreen) { el.requestFullscreen(); }
      else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
      else if (el.msRequestFullscreen) { el.msRequestFullscreen(); }
    } catch (e) {}
  }

  function cabinaExitFullscreen() {
    try {
      if (document.exitFullscreen) { document.exitFullscreen(); }
      else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
      else if (document.msExitFullscreen) { document.msExitFullscreen(); }
    } catch (e) {}
  }

  function cabinaStartInstrumentAnimation() {
    var targets = { alt: 5000, spd: 250, hdg: 90, vs: 0 };
    var phase = 0;
    var phaseMap = [
      { alt: 5000,  spd: 250, hdg: 90,  vs:    0 },
      { alt: 7500,  spd: 270, hdg: 92,  vs:  800 },
      { alt: 12000, spd: 290, hdg: 90,  vs: 1200 },
      { alt: 12000, spd: 300, hdg: 90,  vs:    0 },
      { alt: 11000, spd: 285, hdg: 88,  vs: -600 },
      { alt: 3000,  spd: 180, hdg: 90,  vs: -900 },
      { alt: 1500,  spd: 145, hdg: 90,  vs: -500 },
      { alt:  200,  spd: 120, hdg: 90,  vs: -300 }
    ];

    if (_cabinaInstrumentTimer) clearInterval(_cabinaInstrumentTimer);

    _cabinaInstrumentTimer = setInterval(function() {
      if (!byId('cabinaGaugeAlt')) {
        clearInterval(_cabinaInstrumentTimer);
        _cabinaInstrumentTimer = null;
        return;
      }
      phase = _cabinaSelectedIndex % phaseMap.length;
      targets = phaseMap[phase];

      _cabinaInstrumentState.alt += (targets.alt - _cabinaInstrumentState.alt) * 0.05;
      _cabinaInstrumentState.spd += (targets.spd - _cabinaInstrumentState.spd) * 0.05;
      _cabinaInstrumentState.hdg += (targets.hdg - _cabinaInstrumentState.hdg) * 0.05;
      _cabinaInstrumentState.vs  += (targets.vs  - _cabinaInstrumentState.vs)  * 0.05;

      var altEl = byId('cabinaGaugeAlt');
      var spdEl = byId('cabinaGaugeSpd');
      var hdgEl = byId('cabinaGaugeHdg');
      var vsEl  = byId('cabinaGaugeVs');
      var hAlt  = byId('cabinaHdrAlt');
      var hSpd  = byId('cabinaHdrSpd');
      var hHdg  = byId('cabinaHdrHdg');
      var hVs   = byId('cabinaHdrVs');

      var altVal = Math.round(_cabinaInstrumentState.alt);
      var spdVal = Math.round(_cabinaInstrumentState.spd);
      var hdgVal = Math.round(_cabinaInstrumentState.hdg);
      var vsVal  = Math.round(_cabinaInstrumentState.vs);
      var vsStr  = (vsVal >= 0 ? '+' : '') + vsVal;

      if (altEl) altEl.textContent = altVal;
      if (spdEl) spdEl.textContent = spdVal;
      if (hdgEl) hdgEl.textContent = String(hdgVal).padStart(3, '0');
      if (vsEl)  vsEl.textContent  = vsStr;
      if (hAlt)  hAlt.textContent  = altVal;
      if (hSpd)  hSpd.textContent  = spdVal;
      if (hHdg)  hHdg.textContent  = String(hdgVal).padStart(3, '0');
      if (hVs)   hVs.textContent   = vsStr;
    }, 80);
  }

  function cabinaSelectPhase(index) {
    _cabinaSelectedIndex = index;
    var scenario = CABINA_LEVEL1_SCENARIOS[index];
    if (!scenario) return;

    var atcDisplay = byId('cabinaAtcDisplay');
    if (atcDisplay) atcDisplay.textContent = scenario.atcText;

    var contextEl = byId('cabinaPhaseContext');
    if (contextEl) contextEl.textContent = scenario.context;

    var playerStatus = byId('cabinaPlayerStatus');
    if (playerStatus) {
      playerStatus.className = 'cabina-player-status';
      playerStatus.textContent = 'Fase seleccionada: ' + scenario.label;
    }

    Array.prototype.slice.call(document.querySelectorAll('.cabina-phase-item')).forEach(function(el, i) {
      el.classList.toggle('active', i === index);
    });

    if (window.speechSynthesis) window.speechSynthesis.cancel();
  }

  function cabinaPlayAtc() {
    var scenario = CABINA_LEVEL1_SCENARIOS[_cabinaSelectedIndex];
    if (!scenario) return;
    var text = scenario.atcText;
    var statusEl = byId('cabinaPlayerStatus');

    if (!window.speechSynthesis) {
      if (statusEl) { statusEl.className = 'cabina-player-status warn'; statusEl.textContent = 'Síntesis de voz no disponible en este navegador.'; }
      return;
    }

    window.speechSynthesis.cancel();

    function speak() {
      var utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'en-US';
      utter.rate = 0.88;
      utter.pitch = 0.9;
      utter.volume = 1;

      var voices = window.speechSynthesis.getVoices();
      var preferred = null;
      voices.forEach(function(v) {
        if (!preferred && v.lang.indexOf('en') === 0) preferred = v;
      });
      if (preferred) utter.voice = preferred;

      utter.onstart = function() {
        if (statusEl) { statusEl.className = 'cabina-player-status ok'; statusEl.textContent = '▶ Transmisión ATC activa...'; }
      };
      utter.onend = function() {
        if (statusEl) { statusEl.className = 'cabina-player-status'; statusEl.textContent = 'Transmisión completada.'; }
      };
      utter.onerror = function() {
        if (statusEl) { statusEl.className = 'cabina-player-status warn'; statusEl.textContent = 'Error al reproducir transmisión.'; }
      };

      window.speechSynthesis.speak(utter);
    }

    var voices = window.speechSynthesis.getVoices();
    if (voices && voices.length > 0) {
      speak();
    } else {
      window.speechSynthesis.onvoiceschanged = function() {
        window.speechSynthesis.onvoiceschanged = null;
        speak();
      };
    }
  }

  function cabinaStopAtc() {
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    var statusEl = byId('cabinaPlayerStatus');
    if (statusEl) { statusEl.className = 'cabina-player-status'; statusEl.textContent = 'Detenido.'; }
  }

  function vlPlay(voiceName, langCode, defaultText, btn) {
    var text = (byId('vlSampleText') && byId('vlSampleText').value.trim()) || defaultText;
    var status = byId('vlStatus');
    if (status) status.textContent = 'Loading ' + voiceName + '…';
    if (btn) { btn.disabled = true; btn.style.opacity = '0.5'; }
    if (_vlAudio) { try { _vlAudio.pause(); } catch(e){} _vlAudio = null; }

    var langToCountry = { 'en-GB': 'UK', 'en-US': 'USA', 'en-AU': 'AUSTRALIA', 'en-IN': 'INDIA', 'en-CA': 'CANADA', 'en-IE': 'IRELAND', 'en-ZA': 'SOUTH AFRICA' };
    google.script.run
      .withSuccessHandler(function(res) {
        if (btn) { btn.disabled = false; btn.style.opacity = ''; }
        if (!res || !res.ok) {
          if (status) status.textContent = '✗ ' + voiceName + ' — ' + (res && res.message || 'error');
          return;
        }
        if (status) status.textContent = '▶ ' + voiceName;
        _vlAudio = new Audio('data:audio/mp3;base64,' + res.audioBase64);
        _vlAudio.play();
      })
      .withFailureHandler(function(err) {
        if (btn) { btn.disabled = false; btn.style.opacity = ''; }
        if (status) status.textContent = '✗ ' + voiceName + ' — ' + (err && err.message || 'failed');
      })
      .apiAdminPreviewTts(AppState.sessionToken, { text: text, voice: voiceName, country: langToCountry[langCode] || 'USA', rate: 0.93 });
  }

  function vlScanVoices(langCode) {
    var out = byId('vlScanResult');
    if (out) out.innerHTML = 'Querying Google TTS for <strong>' + langCode + '</strong> voices…';
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok || !res.voices) {
          if (out) out.textContent = '✗ Failed: ' + (res && res.message || 'unknown error');
          return;
        }
        var voices = res.voices;
        if (!voices.length) {
          if (out) out.textContent = 'No voices found for ' + langCode;
          return;
        }
        var sampleText = (byId('vlSampleText') && byId('vlSampleText').value.trim()) ||
          'Speedbird two one seven heavy, cleared ILS approach runway two seven.';
        var langToCountry = { 'en-GB': 'UK', 'en-US': 'USA', 'en-AU': 'AUSTRALIA', 'en-IN': 'INDIA', 'en-CA': 'CANADA', 'en-IE': 'IRELAND', 'en-ZA': 'SOUTH AFRICA' };
        var btns = voices.map(function(v) {
          var shortName = v.name.split('-').slice(-2).join('-');
          var gender = v.gender === 'MALE' ? 'M' : v.gender === 'FEMALE' ? 'F' : '?';
          var tier = v.name.indexOf('Neural2') !== -1 ? 'Neural2' :
                     v.name.indexOf('Wavenet') !== -1 ? 'Wavenet' :
                     v.name.indexOf('Studio')  !== -1 ? 'Studio'  : 'Standard';
          return '<button class="btn secondary" style="min-width:130px;font-size:0.78rem;" ' +
            'onclick="vlPlay(\'' + safeJs(v.name) + '\',\'' + safeJs(langCode) + '\',\'' + safeJs(sampleText) + '\',this)">' +
            '<span>' + shortName + '</span> <small style="opacity:.5;">' + tier + ' ' + gender + '</small>' +
            '</button>';

  function runReadbackTestSuite() {
    byId('rtSummary').textContent = 'Running…';
    byId('rtResults').innerHTML = '';
    var level = byId('rtLevel').value;
    var max   = Number(byId('rtMax').value) || 30;
    var seed  = Number(byId('rtSeed').value) || 42;

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok) {
          byId('rtSummary').textContent = 'Error: ' + (res && res.error || 'unknown');
          return;
        }
        var results = res.results || [];
        var total   = res.total   || 0;
        var match   = res.matching || 0;
        var pct     = total ? Math.round(match / total * 100) : 0;
        var pctCol  = pct === 100 ? '#22c55e' : pct >= 90 ? '#f59e0b' : '#ef4444';

        // Build per-label breakdown
        var labelStats = {};
        results.forEach(function(r) {
          if (!labelStats[r.label]) labelStats[r.label] = { ok: 0, bad: 0 };
          r.behaviorOk ? labelStats[r.label].ok++ : labelStats[r.label].bad++;
        });
        var breakdownHtml = Object.keys(labelStats).map(function(lbl) {
          var s = labelStats[lbl];
          var col = s.bad === 0 ? '#22c55e' : '#ef4444';
          return '<span style="margin-right:10px;"><b style="color:' + col + '">' + lbl + '</b>: ' +
            (s.bad === 0 ? '✓ all ok' : '<b style="color:#ef4444;">' + s.bad + ' unexpected</b>') + '</span>';
        }).join('');

        byId('rtSummary').innerHTML =
          '<div style="margin-bottom:6px;">Scenarios: <b>' + (res.scenariosTested || 0) + '</b> &nbsp;|&nbsp; ' +
          'Tests: <b>' + total + '</b> &nbsp;|&nbsp; ' +
          'Overall: <b style="color:' + pctCol + '">' + match + ' / ' + total + ' (' + pct + '%)</b></div>' +
          '<div style="font-size:0.8rem;font-weight:normal;">' + breakdownHtml + '</div>';

        if (!results.length) {
          byId('rtResults').innerHTML = '<p style="color:#8c8c8c;">' + (res.message || 'No scenarios matched.') + '</p>';
          return;
        }

        var scOrder = [];
        var scMap   = {};
        results.forEach(function(r) {
          if (!scMap[r.scenarioId]) { scOrder.push(r.scenarioId); scMap[r.scenarioId] = []; }
          scMap[r.scenarioId].push(r);
        });

        var html =
          '<table style="width:100%;border-collapse:collapse;font-size:0.78rem;">' +
          '<thead><tr style="text-align:left;border-bottom:2px solid #333;">' +
            '<th style="padding:6px 8px;">Scenario</th>' +
            '<th style="padding:6px 8px;">Lvl</th>' +
            '<th style="padding:6px 8px;">Country</th>' +
            '<th style="padding:6px 8px;">Test</th>' +
            '<th style="padding:6px 8px;">Expect</th>' +
            '<th style="padding:6px 8px;">Got</th>' +
            '<th style="padding:6px 8px;">Score</th>' +
            '<th style="padding:6px 8px;">Answer (truncated)</th>' +
          '</tr></thead><tbody>';

        scOrder.forEach(function(scId) {
          scMap[scId].forEach(function(r, i) {
            var rowBg  = r.behaviorOk ? '' : 'background:#3b1a1a;';
            var gotHtml = r.correct
              ? '<span style="color:#22c55e;">PASS</span>'
              : '<span style="color:#ef4444;">FAIL</span>';
            var expTxt = r.shouldPass ? 'PASS' : 'FAIL';
            var mark   = r.behaviorOk ? '<span style="color:#22c55e;">✓</span>' : '<b style="color:#ef4444;">✗</b>';
            html +=
              '<tr style="border-bottom:1px solid #222;' + rowBg + '">' +
                '<td style="padding:5px 8px;font-family:monospace;white-space:nowrap;">' + (i === 0 ? safeText(scId) : '') + '</td>' +
                '<td style="padding:5px 8px;">' + (i === 0 ? safeText(String(r.level)) : '') + '</td>' +
                '<td style="padding:5px 8px;">' + (i === 0 ? safeText(r.country) : '') + '</td>' +
                '<td style="padding:5px 8px;white-space:nowrap;">' + mark + ' ' + safeText(r.label) + '</td>' +
                '<td style="padding:5px 8px;">' + expTxt + '</td>' +
                '<td style="padding:5px 8px;">' + gotHtml + '</td>' +
                '<td style="padding:5px 8px;text-align:right;">' + r.score + '%</td>' +
                '<td style="padding:5px 8px;color:#aaa;max-width:280px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">' + safeText(r.answer) + '</td>' +
              '</tr>';
          });
        });

        html += '</tbody></table>';
        byId('rtResults').innerHTML = html;
      })
      .withFailureHandler(function(err) {
        byId('rtSummary').textContent = 'Error: ' + (err && err.message || String(err));
      })
      .apiAdminRunReadbackTests(AppState.sessionToken, {
        level:        level ? Number(level) : null,
        maxScenarios: max,
        seed:         seed,
      });
  }

  function _renderAuditResults(res) {

    var routesWithIssues = res.routesWithIssues || 0;

    var summaryColor = routesWithIssues === 0 ? '#22c55e' : '#ef4444';
    var summaryMsg = routesWithIssues === 0
      ? '✓ All ' + totalRoutes + ' routes look good — no issues detected.'
      : '⚠ ' + routesWithIssues + ' of ' + totalRoutes + ' routes have issues that need attention.';

    var html =
      '<div class="panel">' +
        renderAdminTabs('audit') +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">' +
          '<div>' +
            '<p class="eyebrow">Scenario Health Check</p>' +

          '<span style="color:#22c55e;">✓ OK</span>' +
        '</div>';

    routes.forEach(function(route) {
      var headerBadge = route.hasIssues
        ? '<span style="background:#ef4444;color:#fff;padding:2px 8px;border-radius:12px;font-size:0.75rem;margin-left:8px;">ISSUES</span>'
        : '<span style="background:#22c55e;color:#fff;padding:2px 8px;border-radius:12px;font-size:0.75rem;margin-left:8px;">OK</span>';

      html +=
        '<div style="border:1px solid var(--border);border-radius:8px;margin-bottom:16px;overflow:hidden;">' +
          '<div style="padding:12px 16px;background:var(--surface-2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;">' +

              '<strong>' + safeText(route.flightScenarioName) + '</strong>' + headerBadge +

              (route.emergencyType ? ' · ' + safeText(route.emergencyType) : '') +
              ' · ' + route.totalPhases + ' phase' + (route.totalPhases !== 1 ? 's' : '') + '</small>' +
            '</div>' +
            '<div style="font-size:0.8rem;text-align:right;">' +
              (route.missingAtcCount      ? '<span style="color:#ef4444;">ATC missing: '       + route.missingAtcCount      + '&nbsp;&nbsp;</span>' : '') +
              (route.missingReadbackCount ? '<span style="color:#ef4444;">Readback missing: '  + route.missingReadbackCount + '&nbsp;&nbsp;</span>' : '') +
              (route.missingKeywordsCount ? '<span style="color:#f59e0b;">Keywords missing: '  + route.missingKeywordsCount + '&nbsp;&nbsp;</span>' : '') +
              (route.duplicateAtcCount    ? '<span style="color:#f59e0b;">Duplicate ATC: '     + route.duplicateAtcCount    + '&nbsp;&nbsp;</span>' : '') +
              (route.consistencyIssueCount? '<span style="color:#f59e0b;">Mismatch: '          + route.consistencyIssueCount + '</span>'           : '') +

          '</div>' +
          '<div class="table-wrap" style="max-height:none;">' +
            '<table>' +

                '<th>Phase</th>' +

                '<th style="text-align:center;">KW match</th>' +
                '<th style="text-align:center;">Active</th>' +

                  ? (phase.duplicateAtcText

              '</tbody>' +

        '<div class="table-wrap" style="margin-bottom:28px;">' +
          '<table style="width:100%;border-collapse:collapse;font-size:0.84rem;">' +
            '<thead><tr>' +
              '<th style="' + thStyle + '">Level</th>' +
              '<th style="' + thStyle + '">Replay Threshold</th>' +
              '<th style="' + thStyle + ';text-align:center">Controls On</th>' +
              '<th style="' + thStyle + '">Start Altitude (ft)</th>' +

        '<h4 style="font-size:0.8rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin:0 0 8px;">Phase Overrides <span style="font-weight:400;font-size:0.72rem;text-transform:none;letter-spacing:0">&mdash; overrides the level default for a specific phase</span></h4>' +

          '<table style="width:100%;border-collapse:collapse;font-size:0.84rem;">' +

              '<th style="' + thStyle + '">Level</th>' +
              '<th style="' + thStyle + '">Phase</th>' +
              '<th style="' + thStyle + '">Status</th>' +
              '<th style="' + thStyle + ';text-align:center">Controls On</th>' +

  function _buildDriftTiersHtml(tiers, thStyle, tdStyle) {
    var defaults = [
      { levelMax: 2,  intervalMs: 4000, altAmounts: [50],                hdgDrops: [1, 2]          },
      { levelMax: 4,  intervalMs: 3000, altAmounts: [50, 100],           hdgDrops: [2, 3, 5]       },
      { levelMax: 6,  intervalMs: 2000, altAmounts: [50, 100, 150],      hdgDrops: [3, 5, 8]       },
      { levelMax: 8,  intervalMs: 1500, altAmounts: [50, 100, 150, 200], hdgDrops: [5, 8, 10]      },
      { levelMax: 99, intervalMs: 1000, altAmounts: [50, 100, 150, 200], hdgDrops: [5, 10, 15, 20] }
    ];
    var data = (tiers && tiers.length === 5) ? tiers : defaults;
    var prevMax = 0;
    var rows = data.map(function(t, i) {
      var lo   = prevMax + 1;
      var hi   = t.levelMax >= 99 ? '10+' : String(t.levelMax);
      var range = lo === Number(hi) ? 'Level ' + lo : 'Levels ' + lo + ' – ' + hi;
      prevMax = t.levelMax >= 99 ? 99 : t.levelMax;
      var intSec = ((t.intervalMs || 1000) / 1000).toFixed(1);
      return '<tr>' +
        '<td style="' + tdStyle + ';color:var(--muted);font-size:0.78rem;">' + range + '</td>' +
        '<td style="' + tdStyle + '">' + _lcInput('driftInterval' + i, 'number', intSec, 'min="0.5" max="10" step="0.5" style="width:60px"') + '<small style="color:var(--muted);margin-left:4px;">s</small></td>' +
        '<td style="' + tdStyle + '"><input id="driftAlt' + i + '" type="text" value="' + (t.altAmounts || []).join(', ') + '" style="width:130px;padding:5px 7px;border:1px solid var(--border);border-radius:6px;background:var(--surface-2);color:var(--text);font-size:0.8rem;" placeholder="50, 100, 200"><small style="color:var(--muted);margin-left:4px;">ft</small></td>' +
        '<td style="' + tdStyle + '"><input id="driftHdg' + i + '" type="text" value="' + (t.hdgDrops || []).join(', ') + '" style="width:110px;padding:5px 7px;border:1px solid var(--border);border-radius:6px;background:var(--surface-2);color:var(--text);font-size:0.8rem;" placeholder="5, 10, 20"><small style="color:var(--muted);margin-left:4px;">°</small></td>' +
        '<td style="' + tdStyle + '">' + _lcInput('driftLevelMax' + i, 'number', t.levelMax >= 99 ? 99 : t.levelMax, 'min="1" max="99" style="width:52px"') + '<small style="color:var(--muted);margin-left:4px;">max lvl</small></td>' +
        '<td style="' + tdStyle + '"><button class="btn primary" style="padding:5px 14px;font-size:0.78rem;" onclick="adminSaveDriftTier(' + i + ')">Save</button></td>' +
      '</tr>';
    }).join('');

    return '<h4 style="font-size:0.8rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin:28px 0 8px;">Flight Drift Difficulty <span style="font-weight:400;font-size:0.72rem;text-transform:none;letter-spacing:0">&mdash; controls how fast heading drops and altitude drifts per level tier</span></h4>' +
      '<div class="table-wrap" style="margin-bottom:8px;">' +
        '<table style="width:100%;border-collapse:collapse;font-size:0.84rem;">' +
          '<thead><tr>' +
            '<th style="' + thStyle + '">Level range</th>' +
            '<th style="' + thStyle + '">Interval</th>' +
            '<th style="' + thStyle + '">Alt drift (ft, comma-separated)</th>' +
            '<th style="' + thStyle + '">Hdg drop (°, comma-separated)</th>' +
            '<th style="' + thStyle + '">Max level</th>' +
            '<th style="' + thStyle + '"></th>' +
          '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
      '</div>' +
      '<p style="font-size:0.72rem;color:var(--muted);margin:0 0 16px;">Each tier applies to levels up to "max level". The last tier (99) covers everything above. Interval is seconds between drift ticks.</p>';
  }

  function adminSaveDriftTier(idx) {
    var intervalSec = parseFloat((byId('driftInterval' + idx) || {}).value || 1);
    var altRaw = ((byId('driftAlt' + idx) || {}).value || '').split(',').map(function(s) { return parseInt(s.trim(), 10); }).filter(function(n) { return !isNaN(n) && n > 0; });
    var hdgRaw = ((byId('driftHdg' + idx) || {}).value || '').split(',').map(function(s) { return parseInt(s.trim(), 10); }).filter(function(n) { return !isNaN(n) && n > 0; });
    var maxLvl = parseInt((byId('driftLevelMax' + idx) || {}).value || 99, 10);
    if (!altRaw.length || !hdgRaw.length || isNaN(intervalSec) || intervalSec <= 0) {
      alert('Please fill all fields with valid numbers.'); return;
    }
    // Collect all 5 tiers from the DOM
    var allTiers = [0,1,2,3,4].map(function(i) {
      var iSec = parseFloat((byId('driftInterval' + i) || {}).value || 1);
      var aRaw = ((byId('driftAlt' + i) || {}).value || '').split(',').map(function(s) { return parseInt(s.trim(),10); }).filter(function(n) { return !isNaN(n) && n > 0; });
      var hRaw = ((byId('driftHdg' + i) || {}).value || '').split(',').map(function(s) { return parseInt(s.trim(),10); }).filter(function(n) { return !isNaN(n) && n > 0; });
      var mLvl = parseInt((byId('driftLevelMax' + i) || {}).value || 99, 10);
      return { levelMax: mLvl, intervalMs: Math.round(iSec * 1000), altAmounts: aRaw, hdgDrops: hRaw };
    });
    var msg = byId('levelCfgMsg');
    if (msg) msg.innerHTML = '<span style="opacity:0.6;">Saving drift tier ' + (idx + 1) + '…</span>';
    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.ok) {
          if (window.AppState) window.AppState.flightDriftConfig = allTiers;
          if (msg) msg.innerHTML = '<span style="color:#22c55e;">✓ Drift tier ' + (idx + 1) + ' saved.</span>';
        } else {
          if (msg) msg.innerHTML = '<span style="color:#ef4444;">' + safeText(res && res.error || 'Error.') + '</span>';
        }
      })
      .withFailureHandler(function(err) {
        if (msg) msg.innerHTML = '<span style="color:#ef4444;">' + safeText(err && err.message || 'Server error.') + '</span>';
      })
      .apiSaveFlightDriftConfig(AppState.sessionToken, allTiers);
  }

  function adminSaveLevelConfig(level) {
    var threshold = Number((byId('rtLevel' + level) || {}).value || 2);
    var enabled   = !!(byId('ctrlLevel' + level) || {}).checked;
    var altitude  = Number((byId('altLevel' + level) || {}).value || 0);
    var heading   = Number((byId('hdgLevel' + level) || {}).value || 360);
    if (isNaN(threshold) || threshold < 1) { alert('Threshold must be at least 1.'); return; }

    var msg = byId('levelCfgMsg');
    if (msg) msg.innerHTML = '<span style="opacity:0.6;">Saving level ' + level + '…</span>';

    google.script.run
      .withSuccessHandler(function(res) {
        if (msg) msg.innerHTML = res && res.ok
          ? '<span style="color:#22c55e;">✓ Level ' + level + ' saved.</span>'
          : '<span style="color:#ef4444;">' + safeText(res && res.error || 'Error saving.') + '</span>';
      })
      .withFailureHandler(function(err) {
        if (msg) msg.innerHTML = '<span style="color:#ef4444;">' + safeText(err && err.message || 'Server error.') + '</span>';
      })
      .apiAdminSaveLevelConfig(AppState.sessionToken, {
        level: level, replayThreshold: threshold,
        enableControls: enabled, startAltitude: altitude, startHeading: heading
      });
  }

  function adminSavePhaseConfig(level, phase) {
    var enabled  = !!(byId('ctrlPh' + level + '_' + phase) || {}).checked;
    var altVal   = (byId('altPh' + level + '_' + phase) || {}).value;
    var hdgVal   = (byId('hdgPh' + level + '_' + phase) || {}).value;
    var altitude = altVal ? Number(altVal) : null;
    var heading  = hdgVal ? Number(hdgVal) : null;

    var msg = byId('levelCfgMsg');
    if (msg) msg.innerHTML = '<span style="opacity:0.6;">Saving phase override…</span>';

    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.ok) { renderAdminLevelConfig(); }
        else if (msg) msg.innerHTML = '<span style="color:#ef4444;">' + safeText(res && res.error || 'Error.') + '</span>';
      })
      .withFailureHandler(function(err) {
        if (msg) msg.innerHTML = '<span style="color:#ef4444;">' + safeText(err && err.message || 'Server error.') + '</span>';
      })
      .apiAdminSavePhaseFlightConfig(AppState.sessionToken, {
        level: level, phase: phase,
        enableControls: enabled, startAltitude: altitude, startHeading: heading
      });
  }

  function adminClearPhaseConfig(level, phase) {
    if (!confirm('Remove override for Level ' + level + ' — ' + phase + '? It will fall back to the level default.')) return;
    var msg = byId('levelCfgMsg');
    if (msg) msg.innerHTML = '<span style="opacity:0.6;">Clearing…</span>';
    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.ok) { renderAdminLevelConfig(); }
        else if (msg) msg.innerHTML = '<span style="color:#ef4444;">' + safeText(res && res.error || 'Error.') + '</span>';
      })
      .withFailureHandler(function() { renderAdminLevelConfig(); })
      .apiAdminSavePhaseFlightConfig(AppState.sessionToken, {
        level: level, phase: phase, clear: true
      });
  }

  window.adminSaveLevelConfig  = adminSaveLevelConfig;
  window.adminSavePhaseConfig  = adminSavePhaseConfig;
  window.adminClearPhaseConfig = adminClearPhaseConfig;
  window.adminSaveDriftTier    = adminSaveDriftTier;

  function adminSetRouteActive(routeKey, active) {

  function routeLevelOptionsHtml(selectedLevel) {
    var html = '';

    for (var i = 1; i <= 50; i++) {
      html += optionHtml(i, selectedLevel, 'Level ' + i);
    }

  function normalizeCountryName(country) {
    var raw = String(country || '').trim();
    var key = raw.toUpperCase();
    if (key === 'US') return 'USA';
    if (key === 'GB') return 'UK';
    if (key === 'IN') return 'India';
    if (key === 'CO') return 'Colombia';
    return raw || 'USA';
  }

  function routeCountriesForLevel(level, selectedCountry) {
    var base = ADMIN_LEVEL_COUNTRY_RULES[Number(level || 1)] || ADMIN_COUNTRIES_MASTER.slice();
    var selected = normalizeCountryName(selectedCountry || '');
    var exists = base.some(function(c) { return String(c).toUpperCase() === String(selected).toUpperCase(); });
    return selected && !exists ? [selected].concat(base) : base;
  }

  function routeCountryOptionsHtml(level, selectedCountry) {
    var countries = routeCountriesForLevel(level, selectedCountry || 'USA');
    var html = '';
    countries.forEach(function(country) {
      html += optionHtml(country, selectedCountry || 'USA', country);
    });
    return html;
  }

  var EMERGENCY_DEFAULT_TRIGGERS = {
    ENGINE_FAILURE: 'DEPARTURE', REJECTED_TAKEOFF: 'TAKEOFF', RADIO_FAILURE: 'CRUISE',

  };

  function routeBuilderOnTypeChanged() {
    var typeEl = byId('routeBuilderScenarioType');
    var emergencyEl = byId('routeBuilderEmergencyType');
    var triggerEl = byId('routeBuilderTriggerPhase');
    if (!typeEl || !emergencyEl) return;

    if (typeEl.value === 'EMERGENCY') {
      emergencyEl.disabled = false;
      if (!emergencyEl.value) emergencyEl.value = 'PAN_PAN';
      if (triggerEl) {
        triggerEl.disabled = false;
        if (!triggerEl.value) {
          triggerEl.value = EMERGENCY_DEFAULT_TRIGGERS[emergencyEl.value] || 'DEPARTURE';
        }
      }
    } else {
      emergencyEl.value = '';

      if (triggerEl) {
        triggerEl.value = '';

      }

  function buildEmergencyPhaseTemplate(phaseCode, emergencyType, triggerPhase, callsign, runway, stand, normal) {

    var po = PHASE_ORDER[phaseCode] || 0;
    var to = PHASE_ORDER[triggerPhase] || 0;
    var role = !to ? 'BEFORE_TRIGGER' : (po < to ? 'BEFORE_TRIGGER' : (po === to ? 'TRIGGER' : 'AFTER_TRIGGER'));
    var el = (emergencyType || 'EMERGENCY').replace(/_/g, ' ');

    if (role === 'BEFORE_TRIGGER') {

        RADIO_FAILURE: { context: el + ' - loss of comms during ' + phaseCode, atcText: callsign + ' IF YOU READ SQUAWK 7600, CONTINUE PRESENT HEADING, EXPECT RADAR VECTORS FOR APPROACH RUNWAY ' + runway, expectedReadback: 'SQUAWKING 7600 CONTINUING PRESENT HEADING ' + callsign, keywordsText: 'SQUAWKING 7600|PRESENT HEADING|' + callsign },
        MEDICAL_EMERGENCY: { context: el + ' - PAN declared during ' + phaseCode, atcText: callsign + ' PAN PAN ACKNOWLEDGED, DESCEND IMMEDIATELY TO 4000 FEET, DIRECT TO RUNWAY ' + runway + ', MEDICAL SERVICES STANDING BY', expectedReadback: 'PAN PAN DESCENDING TO 4000 FEET DIRECT RUNWAY ' + runway + ' ' + callsign, keywordsText: 'PAN PAN|4000 FEET|DIRECT|RUNWAY ' + runway + '|' + callsign },
        WEATHER_DEVIATION: { context: el + ' - deviation request during ' + phaseCode, atcText: callsign + ' DEVIATION APPROVED, TURN LEFT HEADING 240, WHEN ABLE RESUME OWN NAVIGATION', expectedReadback: 'DEVIATION APPROVED TURNING LEFT HEADING 240 WILL RESUME OWN NAVIGATION ' + callsign, keywordsText: 'DEVIATION APPROVED|HEADING 240|OWN NAVIGATION|' + callsign },

        GO_AROUND: { context: el + ' initiated during ' + phaseCode, atcText: callsign + ' GO AROUND, CLIMB STRAIGHT AHEAD TO 3000 FEET, CONTACT APPROACH 119 DECIMAL 7', expectedReadback: 'GO AROUND CLIMBING TO 3000 FEET CONTACT APPROACH 119 DECIMAL 7 ' + callsign, keywordsText: 'GO AROUND|3000 FEET|APPROACH|119 DECIMAL 7|' + callsign },
        MAYDAY: { context: el + ' declared during ' + phaseCode, atcText: callsign + ' MAYDAY MAYDAY MAYDAY ROGER, CLEARED DIRECT RUNWAY ' + runway + ', DESCEND TO 2000 FEET, ALL SERVICES ALERTED', expectedReadback: 'MAYDAY ROGER DIRECT RUNWAY ' + runway + ' DESCENDING 2000 FEET ' + callsign, keywordsText: 'MAYDAY|DIRECT RUNWAY ' + runway + '|2000 FEET|' + callsign },
        PAN_PAN: { context: el + ' declared during ' + phaseCode, atcText: callsign + ' PAN PAN ROGER, EXPEDITE DESCENT, CLEARED DIRECT RUNWAY ' + runway + ', EXPECT IMMEDIATE APPROACH', expectedReadback: 'PAN PAN ROGER EXPEDITING DESCENT DIRECT RUNWAY ' + runway + ' ' + callsign, keywordsText: 'PAN PAN|EXPEDITING DESCENT|DIRECT RUNWAY ' + runway + '|' + callsign }
      };
      return byType[emergencyType] || { context: el + ' declared during ' + phaseCode, atcText: callsign + ' EMERGENCY ACKNOWLEDGED, CLEARED DIRECT RUNWAY ' + runway + ', DESCEND TO 3000 FEET', expectedReadback: 'EMERGENCY ROGER DIRECT RUNWAY ' + runway + ' DESCENDING 3000 FEET ' + callsign, keywordsText: 'EMERGENCY|DIRECT RUNWAY ' + runway + '|3000 FEET|' + callsign };
    }

    var byPhase = {

      STARTUP: { context: el + ' - emergency resolved, normal startup', atcText: callsign + ' START UP APPROVED, EMERGENCY SERVICES STANDING DOWN', expectedReadback: 'START UP APPROVED ' + callsign, keywordsText: 'START UP APPROVED|' + callsign },
      TAXI_OUT: { context: el + ' - emergency exit under escort', atcText: callsign + ' TAXI SLOWLY VIA ALPHA, FOLLOW EMERGENCY VEHICLE, FIRE SERVICES ALONGSIDE', expectedReadback: 'TAXIING SLOWLY VIA ALPHA FOLLOWING EMERGENCY VEHICLE ' + callsign, keywordsText: 'TAXI|ALPHA|EMERGENCY VEHICLE|' + callsign }

    return byPhase[phaseCode] || { context: el + ' - post-emergency phase', atcText: callsign + ' CONTINUE, EMERGENCY SERVICES ADVISED', expectedReadback: 'CONTINUING EMERGENCY SERVICES ADVISED ' + callsign, keywordsText: 'CONTINUING|EMERGENCY|' + callsign };

  function routeBuilderTemplateForPhase(phaseCode) {
    var callsign = String(byId('routeBuilderCallsign').value || 'FASTAIR 345').trim().toUpperCase();
    var runway = String(byId('routeBuilderRunway').value || '27').trim();
    var taxiRoute = String(byId('routeBuilderTaxiRoute').value || 'ALPHA').trim().toUpperCase();
    var stand = String(byId('routeBuilderStand').value || 'B12').trim().toUpperCase();
    var type = String((byId('routeBuilderScenarioType') || {}).value || 'NORMAL').trim().toUpperCase();
    var emergency = String((byId('routeBuilderEmergencyType') || {}).value || '').trim().toUpperCase();
    var triggerPhase = String((byId('routeBuilderTriggerPhase') || {}).value || '').trim().toUpperCase();

    var templates = {
      STARTUP: { context: 'Pre-flight startup clearance', atcText: callsign + ' START UP APPROVED TEMPERATURE MINUS 2', expectedReadback: 'START UP APPROVED ' + callsign, keywordsText: 'START UP APPROVED|' + callsign },
      TAXI_OUT: { context: 'Taxi clearance to holding point', atcText: callsign + ' TAXI TO HOLDING POINT RUNWAY ' + runway + ' VIA ' + taxiRoute, expectedReadback: 'TAXI TO HOLDING POINT RUNWAY ' + runway + ' VIA ' + taxiRoute + ' ' + callsign, keywordsText: 'TAXI|HOLDING POINT|RUNWAY ' + runway + '|' + taxiRoute + '|' + callsign },
      TAKEOFF: { context: 'Takeoff clearance', atcText: callsign + ' WIND 260 DEGREES 8 KNOTS RUNWAY ' + runway + ' CLEARED FOR TAKEOFF', expectedReadback: 'RUNWAY ' + runway + ' CLEARED FOR TAKEOFF ' + callsign, keywordsText: 'RUNWAY ' + runway + '|CLEARED FOR TAKEOFF|' + callsign },
      DEPARTURE: { context: 'Departure climb instruction', atcText: callsign + ' CLIMB FLIGHT LEVEL 120 CONTACT DEPARTURE 119 DECIMAL 7', expectedReadback: 'CLIMB FLIGHT LEVEL 120 CONTACT DEPARTURE 119 DECIMAL 7 ' + callsign, keywordsText: 'CLIMB|FLIGHT LEVEL 120|DEPARTURE|119 DECIMAL 7|' + callsign },
      CRUISE: { context: 'Enroute frequency change', atcText: callsign + ' CONTACT CONTROL 129 DECIMAL 1', expectedReadback: 'CONTACT CONTROL 129 DECIMAL 1 ' + callsign, keywordsText: 'CONTACT CONTROL|129 DECIMAL 1|' + callsign },
      APPROACH: { context: 'Approach clearance', atcText: callsign + ' DESCEND TO 3000 FEET CLEARED ILS APPROACH RUNWAY ' + runway, expectedReadback: 'DESCEND TO 3000 FEET CLEARED ILS APPROACH RUNWAY ' + runway + ' ' + callsign, keywordsText: 'DESCEND|3000 FEET|ILS APPROACH|RUNWAY ' + runway + '|' + callsign },
      LANDING: { context: 'Landing clearance', atcText: callsign + ' WIND 270 DEGREES 6 KNOTS RUNWAY ' + runway + ' CLEARED TO LAND', expectedReadback: 'RUNWAY ' + runway + ' CLEARED TO LAND ' + callsign, keywordsText: 'RUNWAY ' + runway + '|CLEARED TO LAND|' + callsign },
      TAXI_IN: { context: 'Taxi to stand after landing', atcText: callsign + ' TAXI TO STAND ' + stand + ' VIA BRAVO AND CHARLIE', expectedReadback: 'TAXI TO STAND ' + stand + ' VIA BRAVO AND CHARLIE ' + callsign, keywordsText: 'TAXI|STAND ' + stand + '|BRAVO|CHARLIE|' + callsign }
    };

    var t = templates[phaseCode] || templates.STARTUP;

    if (type === 'EMERGENCY' && emergency) {
      return buildEmergencyPhaseTemplate(phaseCode, emergency, triggerPhase, callsign, runway, stand, t);
    }

    return t;
  }

  function routeBuilderLoadTemplates() {
    PHASES.forEach(function(phase) {
      var t = routeBuilderTemplateForPhase(phase.code);
      byId('rb_ctx_' + phase.code).value = t.context;
      byId('rb_atc_' + phase.code).value = t.atcText;
      byId('rb_exp_' + phase.code).value = t.expectedReadback;
      byId('rb_kw_' + phase.code).value = t.keywordsText;
    });

    routeBuilderSetMessage('Standard templates loaded. You can edit each phase before saving.', 'ok');
  }

  function routeBuilderCollectPayload() {
    var phases = PHASES.map(function(phase) {
      return {
        phaseCode: phase.code,
        phaseName: phase.name,
        phaseOrder: phase.order,
        phaseLabel: phase.label,
        scenarioOrder: 1,
        context: byId('rb_ctx_' + phase.code).value.trim(),
        atcText: byId('rb_atc_' + phase.code).value.trim(),
        expectedReadback: byId('rb_exp_' + phase.code).value.trim(),
        keywordsText: byId('rb_kw_' + phase.code).value.trim(),
        videoUrl: byId('rb_vid_' + phase.code).value.trim(),
        imageFileId: byId('rb_img_' + phase.code).value.trim(),
        audioUrl: byId('rb_aud_' + phase.code).value.trim()
      };
    });

    return {
      level: Number(byId('routeBuilderLevel').value || 1),
      country: byId('routeBuilderCountry').value,
      scenarioType: byId('routeBuilderScenarioType').value,
      emergencyType: byId('routeBuilderEmergencyType').value,
      emergencyTriggerPhase: (byId('routeBuilderTriggerPhase') || {}).value || '',
      duplicateMode: byId('routeBuilderDuplicateMode').value,
      isActive: byId('routeBuilderIsActive').checked,
      phases: phases
    };
  }

  function routeBuilderValidate(showMessage) {
    var payload = routeBuilderCollectPayload();
    var errors = [];

    if (!payload.country) errors.push('Country is required.');
    if (payload.scenarioType === 'EMERGENCY' && !payload.emergencyType) errors.push('Emergency type is required for emergency routes.');
    if (payload.scenarioType === 'EMERGENCY' && !payload.emergencyTriggerPhase) errors.push('Emergency trigger phase is required for emergency routes.');

    payload.phases.forEach(function(phase) {
      if (!phase.context) errors.push(phase.phaseCode + ': Context is required.');
      if (!phase.atcText) errors.push(phase.phaseCode + ': ATC text is required.');
      if (!phase.expectedReadback) errors.push(phase.phaseCode + ': Expected read-back is required.');
      if (!phase.keywordsText) errors.push(phase.phaseCode + ': Keywords are required.');
    });

    if (errors.length) {
      if (showMessage) routeBuilderSetMessage(errors.join(' | '), 'error');
      return { ok: false, errors: errors, payload: payload };
    }

    if (showMessage) routeBuilderSetMessage('Route is complete and ready to save.', 'ok');
    return { ok: true, errors: [], payload: payload };
  }

  function routeBuilderSave() {
    var validation = routeBuilderValidate(false);
    var btn = byId('routeBuilderSaveBtn');

    if (!validation.ok) {
      routeBuilderSetMessage(validation.errors.join(' | '), 'error');
      return;
    }

    if (validation.payload.duplicateMode === 'REPLACE_EXISTING') {
      var ok = confirm('This will deactivate existing active scenarios for this Level + Country + Scenario Type and create a new full route. Continue?');
      if (!ok) return;
    }

    if (btn) {
      btn.disabled = true;
      btn.textContent = 'Saving full route...';
    }

    routeBuilderSetMessage('Saving full route. Please wait...', 'warning');

    google.script.run
      .withSuccessHandler(function(res) {
        if (btn) {
          btn.disabled = false;
          btn.textContent = 'Save full route';
        }

        if (!res || !res.ok) {
          routeBuilderSetMessage(res && res.message ? res.message : 'Could not save full route.', 'error');
          return;
        }

        var summary = (res.message || 'Full route saved.') +
          ' Created: ' + ((res.created || []).length) +
          ', skipped: ' + ((res.skipped || []).length) +
          ', deactivated: ' + (res.deactivated || 0) + '.';

        alert(summary);
        renderAdminScenarios();
      })
      .withFailureHandler(function(err) {
        if (btn) {
          btn.disabled = false;
          btn.textContent = 'Save full route';
        }
        routeBuilderSetMessage(err && err.message ? err.message : 'Server error saving full route.', 'error');
      })
      .apiAdminCreateCustomFullRoute(AppState.sessionToken, validation.payload);
  }

  function routeBuilderSetMessage(message, type) {
    var msg = byId('routeBuilderMessage');
    if (!msg) return;

    msg.textContent = message || '';
    msg.className = 'message admin-form-message';
    if (type) msg.classList.add('is-' + type);
  }

  function collectAdminRoutePayload() {

      scenarioType: byId('routeEditorScenarioType').value,

      flightScenarioId: byId('routeEditorFlightId').value.trim(),
      flightScenarioName: byId('routeEditorFlightName').value.trim()
    };

    var cards = Array.prototype.slice.call(document.querySelectorAll('.route-editor-card'));
    var scenarios = cards.map(function(card) {
      var index = card.getAttribute('data-index');
      return {
        scenarioId: byId('route_scenarioId_' + index).value,
        phaseCode: byId('route_phaseCode_' + index).value,
        phaseName: byId('route_phaseName_' + index).value,
        phaseOrder: Number(byId('route_phaseOrder_' + index).value || 0),
        phaseLabel: byId('route_phaseLabel_' + index).value,
        scenarioOrder: 1,
        context: byId('route_context_' + index).value.trim(),
        atcText: byId('route_atc_' + index).value.trim(),

  function validateAdminRoutePayload(payload) {
    var errors = [];

    if (!payload.route.country) errors.push('Country is required.');
    if (!payload.route.flightScenarioId) errors.push('Flight Scenario ID is required.');
    if (!payload.route.flightScenarioName) errors.push('Route Name is required.');

    payload.scenarios.forEach(function(s) {
      if (!s.context) errors.push(s.phaseCode + ': Context is required.');
      if (!s.atcText) errors.push(s.phaseCode + ': ATC text is required.');
      if (!s.expectedReadback) errors.push(s.phaseCode + ': Expected read-back is required.');
      if (!s.keywordsText) errors.push(s.phaseCode + ': Keywords are required.');
    });

    return errors;

  function _adminGetCallsign() {
    // Extract callsign from the STARTUP (index 0) ATC text
    var atc0 = (byId('route_atc_0') || {}).value || '';
    var idx = atc0.toUpperCase().indexOf(' START UP');
    if (idx > 0) return atc0.substring(0, idx).trim().toUpperCase();
    // fallback: first word(s) up to the first verb-like word
    return atc0.split(' ').slice(0, 3).join(' ').toUpperCase();
  }

  function _adminDeriveReadback(atcText, phaseCode, callsign) {
    var text = atcText.trim();
    var csUp = callsign.toUpperCase();
    if (text.toUpperCase().indexOf(csUp) === 0) {
      text = text.substring(callsign.length).trim();
    }
    if (phaseCode === 'TAKEOFF' || phaseCode === 'LANDING') {
      var rwIdx = text.toUpperCase().indexOf('RUNWAY');
      if (rwIdx > 0) text = text.substring(rwIdx);
    }
    return text.trim() + ' ' + callsign.toUpperCase();
  }

  function _adminDeriveKeywords(readback, phaseCode, callsign) {
    var rb    = readback.toUpperCase();
    var parts = [];

    var runwayMatch = rb.match(/RUNWAY\s+(\w+)/);
    var runway      = runwayMatch ? 'RUNWAY ' + runwayMatch[1] : '';
    var freqMatch   = rb.match(/(\d{3})\s+DECIMAL\s+(\d+)/);
    var freq        = freqMatch ? freqMatch[1] + ' DECIMAL ' + freqMatch[2] : '';
    var standMatch  = rb.match(/STAND\s+(\w+)/);
    var stand       = standMatch ? 'STAND ' + standMatch[1] : '';

    switch (phaseCode) {
      case 'STARTUP':
        parts.push('START UP APPROVED');
        var qnhMatch = rb.match(/QNH\s+(\d+)/);
        if (qnhMatch) parts.push('QNH ' + qnhMatch[1]);
        parts.push(callsign.toUpperCase());
        break;
      case 'TAXI_OUT':
        parts.push('TAXI TO HOLDING POINT');
        if (runway) parts.push(runway);
        var viaMatch = rb.match(/VIA\s+(?:TAXIWAY\s+)?(\w+)/);
        if (viaMatch) parts.push(viaMatch[1]);
        if (rb.indexOf('GIVE WAY') >= 0) parts.push('GIVE WAY');
        parts.push(callsign.toUpperCase());
        break;
      case 'TAKEOFF':
        if (runway) parts.push(runway);
        parts.push('CLEARED FOR TAKEOFF');
        parts.push(callsign.toUpperCase());
        break;
      case 'DEPARTURE':
        parts.push('CLIMB');
        if (freq) parts.push(freq);
        parts.push(callsign.toUpperCase());
        break;
      case 'CRUISE':
        parts.push('CONTACT CONTROL');
        if (freq) parts.push(freq);
        parts.push(callsign.toUpperCase());
        break;
      case 'APPROACH':
        parts.push('DESCEND');
        if (rb.indexOf('ILS') >= 0) parts.push('ILS APPROACH');
        if (runway) parts.push(runway);
        parts.push(callsign.toUpperCase());
        break;
      case 'LANDING':
        if (runway) parts.push(runway);
        parts.push('CLEARED TO LAND');
        parts.push(callsign.toUpperCase());
        break;
      case 'TAXI_IN':
        parts.push('TAXI TO');
        if (stand) parts.push(stand);
        parts.push(callsign.toUpperCase());
        break;
      default:
        parts.push(callsign.toUpperCase());
    }
    return parts.join('|');
  }

  function adminAutoFillPhase(index) {
    var atcEl  = byId('route_atc_'      + index);
    var rbEl   = byId('route_expected_' + index);
    var kwEl   = byId('route_keywords_' + index);
    var phEl   = byId('route_phaseCode_'+ index);
    if (!atcEl || !rbEl || !kwEl) return;

    var atcText   = atcEl.value.trim();
    var phaseCode = phEl ? phEl.value.trim() : '';
    if (!atcText) { alert('Enter the ATC text first.'); return; }

    var callsign = _adminGetCallsign();
    var readback = _adminDeriveReadback(atcText, phaseCode, callsign);
    var keywords = _adminDeriveKeywords(readback, phaseCode, callsign);

    rbEl.value = readback;
    kwEl.value = keywords;

    // brief flash to confirm
    rbEl.style.borderColor = '#4ade80';
    kwEl.style.borderColor = '#4ade80';
    setTimeout(function() {
      rbEl.style.borderColor = '';
      kwEl.style.borderColor = '';
    }, 1200);
  }

  function adminAutoFillAll() {
    var cards = document.querySelectorAll('.route-editor-card');
    if (!cards.length) return;
    var callsign = _adminGetCallsign();
    if (!callsign) { alert('Fill in the STARTUP ATC text first — the callsign is read from it.'); return; }
    for (var i = 0; i < cards.length; i++) {

  var VR_EVENT_TYPES = [
    { type: 'double',   chance: 0.08, label: 'DOUBLE XP SECTOR',  icon: '⚡', xpLabel: '2× XP',  cp: 20,
      desc: 'Rare atmospheric window — double XP active',           btn: '⚡ Enter Double XP Sector' },
    { type: 'critical', chance: 0.17, label: 'CRITICAL SCENARIO',  icon: '🔴', xpLabel: '+50 XP', cp: 15,
      desc: 'Emergency procedures — priority clearance assigned',   btn: '🔴 Enter Critical Sector' },
    { type: 'priority', chance: 0.45, label: 'PRIORITY DISPATCH',  icon: '🚨', xpLabel: '+25 XP', cp: 10,
      desc: 'ATC slot allocated — complete to claim recognition',   btn: '🚨 Accept Dispatch' },
    { type: 'hot',      chance: 0.30, label: 'HOT SECTOR',         icon: '📡', xpLabel: '+15 XP', cp: 5,
      desc: 'Favorable conditions — training window open',          btn: '📡 Enter Hot Sector' }
  ];

  function _vrCfg() {
    return window._vrConfig || {
      enabled: true, fireRate: 65, secondaryRate: 18,
      slotMin: 22, slotMax: 56,
      weights: { double: 8, critical: 17, priority: 45, hot: 30 },
      pinned: []
    };
  }

  function _vrEventByType(type) {
    for (var i = 0; i < VR_EVENT_TYPES.length; i++) {
      if (VR_EVENT_TYPES[i].type === type) return VR_EVENT_TYPES[i];
    }
    return VR_EVENT_TYPES[VR_EVENT_TYPES.length - 1];
  }

  function _vrPickEvents(levels) {
    var cfg = _vrCfg();
    if (!cfg.enabled) return {};

    var eligible = levels.filter(function(l) { return (l.level || 0) > 0; });
    var map = {};
    if (!eligible.length) return map;

    // ── Prefer server-side daily assignments only when the server actually assigned something ──
    if (window._vrAssignments && Object.keys(window._vrAssignments).length > 0) {
      Object.keys(window._vrAssignments).forEach(function(lvl) {
        var evType = _vrEventByType(window._vrAssignments[lvl]);
        if (evType) map[parseInt(lvl, 10)] = evType;
      });
      return map;
    }
    // ── Fallback: client-side random (runs when server has no assignments or hasn't responded) ──

    var today = new Date().toISOString().slice(0, 10);

    // Apply admin-pinned events first (guaranteed, no roll needed)
    (cfg.pinned || []).forEach(function(pin) {
      if (pin.until && pin.until < today) return; // expired
      var evType = _vrEventByType(pin.type);
      map[pin.level] = evType;
    });

    // Random selection for remaining levels
    if (Math.random() < cfg.fireRate / 100) {
      // Build weighted type roller from config
      var w = cfg.weights || { double: 8, critical: 17, priority: 45, hot: 30 };
      var total = (w.double || 0) + (w.critical || 0) + (w.priority || 0) + (w.hot || 0) || 100;
      var buildRoller = function() {
        var r = Math.random() * total, cum = 0;
        var keys = ['double', 'critical', 'priority', 'hot'];
        for (var i = 0; i < keys.length; i++) {
          cum += w[keys[i]] || 0;
          if (r < cum) return _vrEventByType(keys[i]);
        }
        return VR_EVENT_TYPES[VR_EVENT_TYPES.length - 1];
      };

      var unpinned = eligible.filter(function(l) { return !map[l.level]; });
      if (unpinned.length) {
        var primary = unpinned[Math.floor(Math.random() * unpinned.length)];
        map[primary.level] = buildRoller();

        // Secondary event
        var rest = unpinned.filter(function(l) { return l.level !== primary.level; });
        if (rest.length && Math.random() < cfg.secondaryRate / 100) {
          map[rest[Math.floor(Math.random() * rest.length)].level] =
            _vrEventByType('hot');
        }
      }
    }

    return map;
  }

  function _vrSlotTime() {
    var cfg = _vrCfg();
    var mn  = cfg.slotMin || 22;
    var mx  = cfg.slotMax || 56;
    var end = new Date(Date.now() + (mn + Math.floor(Math.random() * (mx - mn + 1))) * 60000);
    return end.getUTCHours().toString().padStart(2,'0') +
           end.getUTCMinutes().toString().padStart(2,'0') + 'Z';
  }

    var status = info ? info.status : 'locked';

      badgeCls = 'exam-badge-avail'; badgeText = 'EXAM';

    countries.slice(0, 8).forEach(function(item) {

      html += '<span class="country-flag-pill">' + getFlagHtml(country, 'flag-preview') + '<span>' + safeText(getCountryUi(country).label) + '</span></span>';

    if (countries.length > 8) {
      html += '<span class="country-flag-pill more">+' + safeText(countries.length - 8) + '</span>';
    }

    return html;

  function openLevelCountries(level) {
    var catalog = AppState.training.catalog || {};
    var levels = catalog.levels || [];
    var selected = null;

    for (var i = 0; i < levels.length; i++) {
      if (Number(levels[i].level) === Number(level)) {
        selected = levels[i];
        break;
      }
    }

    if (!selected) {
      showContentError('Level not found.');
      return;
    }

    if (selected.locked || selected.unlocked === false) {
      showContentError('This level is locked.');
      return;
    }

    AppState.training.selectedLevel = selected.level;
    AppState.training.selectedLevelData = selected;
    renderCountryTrainingHub(selected);
  }

    var _wkLvls = (window._gam && (_gam.myWeeklyLevels || 0)) || 0;
