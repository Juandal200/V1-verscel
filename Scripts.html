  function _loadAdmPsychTab() {
    var inner = byId('adm-psy-inner');
    if (!inner || inner.dataset.loaded === '1') return;
    inner.dataset.loaded = '1';
    inner.innerHTML = _spinnerHtml('Loading flight stress analytics...');

    google.script.run
      .withSuccessHandler(function(res) {
        if (!inner) return;
        if (!res || !res.ok) {
          inner.innerHTML = '<div class="panel"><p class="subtitle">' + h(res && res.error || 'Could not load data.') + '</p></div>';
          return;
        }

        window._admPsyRes = res;

        var phases    = res.phaseBreakdown || [];
        var levelList = res.levelList      || [];

        var phaseOpts = '<option value="all">All Phases</option>' +
          phases.map(function(p) { return '<option value="' + h(p.phase) + '">' + h(p.phase) + '</option>'; }).join('');
        var levelOpts = '<option value="all">All Levels</option>' +
          levelList.map(function(l) { return '<option value="' + h(l) + '">Level ' + h(l) + '</option>'; }).join('');

        var filterBar =
          '<div class="psy-filter-bar">' +
            '<label class="psy-filter-label">Phase' +
              '<select id="psyPhaseFilter" class="psy-filter-select" onchange="window._admPsyFilter(this.value,\'all\')">' + phaseOpts + '</select>' +
            '</label>' +
            '<label class="psy-filter-label">Level' +
              '<select id="psyLevelFilter" class="psy-filter-select" onchange="window._admPsyFilter(\'all\',this.value)">' + levelOpts + '</select>' +
            '</label>' +
            '<button class="psy-filter-clear" onclick="window._admPsyFilter(\'all\',\'all\')">Clear filters</button>' +
          '</div>';

        inner.innerHTML = filterBar + '<div id="adm-psy-body"></div>';
        _admPsyRender('all', 'all');
      })
      .withFailureHandler(function(err) {
        if (inner) inner.innerHTML = '<div class="panel"><p class="subtitle">' + h(err && err.message || 'Server error.') + '</p></div>';
      })
      .apiGetFlightStressAnalytics(AppState.sessionToken);
  }

  function _admPsyRender(phaseFilter, levelFilter) {
    var body = byId('adm-psy-body');
    if (!body || !window._admPsyRes) return;

    var pSel = byId('psyPhaseFilter');
    var lSel = byId('psyLevelFilter');
    if (pSel) pSel.value = phaseFilter;
    if (lSel) lSel.value = levelFilter;

    var res      = window._admPsyRes;
    var allUsers = res.users         || [];
    var phases   = res.phaseBreakdown || [];
    var sum      = res.summary       || {};

    var thS = 'padding:9px 12px;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;';
    var tdS = 'padding:10px 12px;vertical-align:middle;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.83rem;';

    var filterKey = phaseFilter !== 'all' ? 'byPhase' : levelFilter !== 'all' ? 'byLevel' : null;
    var filterVal = phaseFilter !== 'all' ? phaseFilter : levelFilter !== 'all' ? levelFilter : null;
    var isFiltered = filterKey !== null;

    function computeMetrics(entry) {
      if (!entry || !entry.warnings) return { warnings: 0, corrections: 0, recoveryRate: 100, avgCorrectionSec: 0, multitaskingScore: 100 };
      var rec  = Math.round((entry.corrections / entry.warnings) * 100);
      var avgC = (entry.corrTimes && entry.corrTimes.length)
        ? Math.round(entry.corrTimes.reduce(function(s,x){return s+x;},0) / entry.corrTimes.length) : 0;
      var spd  = avgC > 0 ? Math.max(0, Math.min(100, Math.round(100 - (avgC - 3) * (100/27)))) : 100;
      return { warnings: entry.warnings, corrections: entry.corrections, recoveryRate: rec, avgCorrectionSec: avgC,
               multitaskingScore: Math.min(100, Math.round(rec * 0.6 + spd * 0.4)) };
    }

    var users = allUsers.map(function(u) {
      if (!isFiltered) return u;
      var entry = ((u[filterKey] || {})[filterVal]) || { warnings: 0, corrections: 0, corrTimes: [] };
      var m = computeMetrics(entry);
      return { userId: u.userId, name: u.name, email: u.email,
               warnings: m.warnings, corrections: m.corrections,
               recoveryRate: m.recoveryRate, avgCorrectionSec: m.avgCorrectionSec,
               multitaskingScore: m.multitaskingScore, byPhase: u.byPhase, byLevel: u.byLevel };
    }).filter(function(u) { return !isFiltered || u.warnings > 0; })
      .sort(function(a,b) { return b.multitaskingScore - a.multitaskingScore; });

    var scoreBadge = function(s) {
      var c = s >= 80 ? '#22c55e' : s >= 60 ? '#f59e0b' : '#ef4444';
      return '<span style="font-weight:700;color:' + c + '">' + s + '</span>';
    };

    var avgMulti = users.length
      ? Math.round(users.reduce(function(s, u) { return s + (u.multitaskingScore || 0); }, 0) / users.length) : 0;
    var attentionColor = avgMulti >= 80 ? '#22c55e' : avgMulti >= 60 ? '#f59e0b' : '#ef4444';
    var attentionLabel = avgMulti >= 80 ? 'Excellent focus' : avgMulti >= 60 ? 'Moderate focus' : 'Needs improvement';
    var scopeLabel = isFiltered
      ? (phaseFilter !== 'all' ? 'phase: ' + phaseFilter : 'level: ' + levelFilter)
      : 'all phases & levels';
    var attentionHeroHtml = users.length
      ? '<div class="psy-attention-hero">' +
          '<div class="psy-attention-score" style="color:' + attentionColor + '">' + avgMulti + '</div>' +
          '<div>' +
            '<div class="psy-attention-label">Platform Attention Score &nbsp;&bull;&nbsp; ' + h(scopeLabel) + '</div>' +
            '<div style="font-size:0.95rem;font-weight:700;color:' + attentionColor + ';margin-bottom:4px">' + attentionLabel + '</div>' +
            '<div class="psy-attention-desc">Average multitasking score across ' + users.length + ' student' + (users.length !== 1 ? 's' : '') + '. Measures ability to maintain flight parameters while processing ATC communications.</div>' +
          '</div>' +
        '</div>'
      : '<p class="mgmt-empty-state" style="margin:12px 0">No data for the selected filter.</p>';

    var filtTotalWarn = users.reduce(function(s,u){ return s + (u.warnings||0); }, 0);
    var filtCorrTimes = [];
    if (isFiltered) {
      users.forEach(function(u) {
        var entry = ((u[filterKey] || {})[filterVal]) || {};
        (entry.corrTimes || []).forEach(function(t) { filtCorrTimes.push(t); });
      });
    }
    var filtAvgCorr = filtCorrTimes.length
      ? Math.round(filtCorrTimes.reduce(function(s,x){return s+x;},0) / filtCorrTimes.length)
      : (isFiltered ? 0 : (sum.avgCorrectionSec || 0));
    var filtRecovery = users.length
      ? Math.round(users.reduce(function(s,u){return s+(u.recoveryRate||0);},0)/users.length)
      : (sum.avgRecoveryRate || 0);

    var kpiHtml =
      '<div class="mgmt-kpi-strip">' +
        _kpiCard('Drift Events',   String(isFiltered ? filtTotalWarn : (sum.totalWarnings || 0)), 'Altitude/heading deviations', '') +
        _kpiCard('Avg Correction', filtAvgCorr + 's', 'Time from alert to recovery', filtAvgCorr > 0 && filtAvgCorr <= 5 ? 'good' : filtAvgCorr > 10 ? 'low' : 'mid') +
        _kpiCard('Recovery Rate',  filtRecovery + '%', 'Deviations corrected in time', filtRecovery >= 80 ? 'good' : filtRecovery >= 60 ? 'mid' : 'low') +
        _kpiCard('Students',       String(isFiltered ? users.length : (sum.studentsTracked || 0)), isFiltered ? 'With data in this filter' : 'With flight stress data', '') +
      '</div>';

    var tableRows = users.length ? users.map(function(u, i) {
      var rankColor = i === 0 ? '#f59e0b' : i === 1 ? '#94a3b8' : i === 2 ? '#cd7f32' : 'var(--muted)';
      var worstPhase = '', worstCount = 0;
      if (!isFiltered) {
        Object.keys(u.byPhase || {}).forEach(function(ph) {
          if ((u.byPhase[ph].warnings || 0) > worstCount) { worstCount = u.byPhase[ph].warnings; worstPhase = ph; }
        });
      }
      return '<tr>' +
        '<td style="' + tdS + ';color:' + rankColor + ';font-weight:700">#' + (i+1) + '</td>' +
        '<td style="' + tdS + '"><strong style="color:var(--text)">' + h(u.name) + '</strong><br><small style="color:var(--muted)">' + h(u.email) + '</small></td>' +
        '<td style="' + tdS + ';text-align:center">' + u.warnings + '</td>' +
        '<td style="' + tdS + ';text-align:center">' + scoreBadge(u.recoveryRate) + '%</td>' +
        '<td style="' + tdS + ';text-align:center">' + (u.avgCorrectionSec > 0 ? u.avgCorrectionSec + ' s' : '—') + '</td>' +
        '<td style="' + tdS + ';text-align:center">' + scoreBadge(u.multitaskingScore) + '</td>' +
        (!isFiltered ? '<td style="' + tdS + ';color:var(--muted)">' + h(worstPhase || '—') + '</td>' : '') +
      '</tr>';
    }).join('') : '<tr><td colspan="' + (isFiltered ? '6' : '7') + '" style="padding:16px;color:var(--muted);text-align:center">No data for the selected filter.</td></tr>';

    var tableHtml =
      '<div class="table-wrap">' +
        '<table style="width:100%;border-collapse:collapse;">' +
          '<thead><tr>' +
            '<th style="' + thS + '">#</th>' +
            '<th style="' + thS + '">Student</th>' +
            '<th style="' + thS + ';text-align:center">Drift Events</th>' +
            '<th style="' + thS + ';text-align:center">Recovery Rate</th>' +
            '<th style="' + thS + ';text-align:center">Avg Correction</th>' +
            '<th style="' + thS + ';text-align:center">Multitasking Score</th>' +
            (!isFiltered ? '<th style="' + thS + '">Weakest Phase</th>' : '') +
          '</tr></thead>' +
          '<tbody>' + tableRows + '</tbody>' +
        '</table>' +
      '</div>' +
      '<p style="font-size:0.72rem;color:var(--muted);margin-top:6px;">' +
        '<strong>Multitasking Score</strong> = recovery rate (60%) + correction speed (40%) &nbsp;&bull;&nbsp; ' +
        '<strong>Recovery Rate</strong> = % of deviations corrected before moving on' +
      '</p>';

    var chartPhases = phases;
    if (levelFilter !== 'all') {
      var lvlPhaseWarn = {};
      allUsers.forEach(function(u) {
        if (!((u.byLevel || {})[levelFilter] || {}).warnings) return;
        Object.keys(u.byPhase || {}).forEach(function(ph) {
          var w = (u.byPhase[ph].warnings || 0);
          if (w) lvlPhaseWarn[ph] = (lvlPhaseWarn[ph] || 0) + w;
        });
      });
      chartPhases = Object.keys(lvlPhaseWarn)
        .map(function(ph){ return { phase: ph, warnings: lvlPhaseWarn[ph] }; })
        .sort(function(a,b){ return b.warnings - a.warnings; });
    }
    var maxWarn = 1;
    chartPhases.forEach(function(p) { if (p.warnings > maxWarn) maxWarn = p.warnings; });
    var phaseChart = chartPhases.length
      ? '<div class="prog-bar-list">' + chartPhases.map(function(p) {
          var pct = Math.round((p.warnings / maxWarn) * 100);
          var isHighlighted = phaseFilter !== 'all' && p.phase === phaseFilter;
          var barColor = phaseFilter !== 'all' ? (isHighlighted ? '#f59e0b' : 'rgba(245,158,11,0.22)') : '#f59e0b';
          return '<div class="prog-bar-row">' +
            '<span' + (isHighlighted ? ' style="font-weight:700;color:#f59e0b"' : '') + '>' + h(p.phase) + '</span>' +
            '<div class="analytics-bar-track"><div class="analytics-bar-fill" style="width:' + pct + '%;background:' + barColor + '"></div></div>' +
            '<strong style="color:' + barColor + '">' + p.warnings + '</strong>' +
          '</div>';
        }).join('') + '</div>'
      : '<p class="mgmt-empty-state">No phase data for this filter.</p>';

    var needsCoaching = users.filter(function(u) { return u.multitaskingScore < 60; });
    var insightHtml = '';
    if (needsCoaching.length) {
      insightHtml = _insightBanner('critical', '!',
        needsCoaching.length + ' student' + (needsCoaching.length > 1 ? 's need' : ' needs') + ' coaching — multitasking score below 60',
        needsCoaching.map(function(u) { return u.name + ' (' + u.multitaskingScore + ')'; }).join(', ') + '. Consider reducing drift intensity or scheduling a 1-on-1 review.');
    } else if (users.length > 0 && avgMulti >= 75) {
      insightHtml = _insightBanner('good', '✓',
        'Class performing well — avg attention score ' + avgMulti,
        'All students are managing flight controls effectively during ATC communications. Consider increasing drift difficulty.');
    }

    var coachingHtml = '';
    if (needsCoaching.length) {
      coachingHtml = '<div class="mgmt-section psy-needs-coaching">' +
        _sectionHead('Needs Coaching', needsCoaching.length + ' student' + (needsCoaching.length !== 1 ? 's' : '') + ' below threshold') +
        needsCoaching.map(function(u) {
          return '<div class="psy-coaching-row">' +
            '<div><div class="psy-coaching-name">' + h(u.name) + '</div><div class="psy-coaching-email">' + h(u.email) + '</div></div>' +
            '<div class="psy-coaching-chips">' +
              '<span class="psy-coaching-chip" style="color:#ef4444">Score: ' + u.multitaskingScore + '</span>' +
              '<span class="psy-coaching-chip">Recovery: ' + u.recoveryRate + '%</span>' +
              '<span class="psy-coaching-chip">Correction: ' + (u.avgCorrectionSec > 0 ? u.avgCorrectionSec + 's' : '—') + '</span>' +
              '<span class="psy-coaching-chip">Drift events: ' + u.warnings + '</span>' +
            '</div>' +
          '</div>';
        }).join('') +
      '</div>';
    }

    var compHtml = isFiltered ? '' : _buildScenarioDifficultyHtml(res.scenarioComparisons || []);

    body.innerHTML =
      attentionHeroHtml +
      insightHtml +
      kpiHtml +
      coachingHtml +
      '<div class="mgmt-two-col">' +
        '<div class="mgmt-section">' + _sectionHead('Student Multitasking Performance', users.length + ' student' + (users.length !== 1 ? 's' : '')) + tableHtml + '</div>' +
        '<div class="mgmt-section">' + _sectionHead('Most Stressful Phases', isFiltered ? 'Filtered view' : 'By warning count') + phaseChart + '</div>' +
      '</div>' +
      compHtml;
  }

  window._admPsyFilter = function(phaseFilter, levelFilter) {
    var pSel = byId('psyPhaseFilter');
    var lSel = byId('psyLevelFilter');
    if (pSel) pSel.value = phaseFilter;
    if (lSel) lSel.value = levelFilter;
    _admPsyRender(phaseFilter, levelFilter);
  };

  function _buildScenarioDifficultyHtml(comparisons) {
    var thS = 'padding:9px 12px;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);border-bottom:1px solid rgba(255,255,255,0.08);text-align:left;white-space:nowrap;';
    var tdS = 'padding:10px 12px;vertical-align:middle;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.83rem;';

    if (!comparisons || !comparisons.length) {
      return '<div class="mgmt-section" style="margin-top:24px;">' +
        _sectionHead('Scenario Difficulty', 'Ranked by class recovery rate') +
        '<p class="mgmt-empty-state">Data appears once 2+ students complete the same phase.</p>' +
      '</div>';
    }

    // Compute aggregate per scenario
    var scenarios = comparisons.map(function(sc) {
      var n = sc.students.length || 1;
      var avgRecovery = Math.round(sc.students.reduce(function(s, u) { return s + (u.recoveryRate || 0); }, 0) / n);
      var avgFix      = Math.round(sc.students.reduce(function(s, u) { return s + (u.avgCorrectionSec || 0); }, 0) / n);
      var totalWarn   = sc.students.reduce(function(s, u) { return s + (u.warnings || 0); }, 0);
      return { route: sc.route, phase: sc.phase, students: sc.students,
               avgRecovery: avgRecovery, avgFix: avgFix, totalWarn: totalWarn, n: n };
    }).sort(function(a, b) { return a.avgRecovery - b.avgRecovery; });

    var hardest = scenarios[0];
    var easiest = scenarios[scenarios.length - 1];

    // Insight banner
    var insightHtml = '';
    if (hardest.avgRecovery < 70) {
      insightHtml = _insightBanner('critical', '!',
        '"' + hardest.phase + '" is the hardest phase — only ' + hardest.avgRecovery + '% avg recovery',
        'Consider reviewing this phase with the class or reducing drift intensity before progressing.');
    } else if (hardest.avgRecovery >= 80) {
      insightHtml = _insightBanner('good', '✓',
        'All scenarios above 80% avg recovery — strong class performance',
        'Students are handling drift correction well across all phases.');
    }

    // Bar chart rows
    var barRows = scenarios.map(function(sc, i) {
      var barColor = sc.avgRecovery >= 80 ? '#22c55e' : sc.avgRecovery >= 65 ? '#f59e0b' : '#ef4444';
      var isHardest = i === 0;
      var badge = isHardest
        ? '<span class="psy-diff-hardest-badge">Hardest</span>'
        : (i === scenarios.length - 1 && scenarios.length > 1 ? '<span class="psy-diff-easy-badge">Easiest</span>' : '');
      return '<div class="psy-diff-row' + (isHardest ? ' psy-diff-row-hardest' : '') + '">' +
        '<div class="psy-diff-label">' +
          badge +
          '<span class="psy-diff-scenario">' + h(sc.phase) + '</span>' +
          '<span class="psy-diff-route">' + h(sc.route) + '</span>' +
        '</div>' +
        '<div class="psy-diff-bar-wrap">' +
          '<div class="psy-diff-bar" style="width:' + sc.avgRecovery + '%;background:' + barColor + '"></div>' +
        '</div>' +
        '<span class="psy-diff-pct" style="color:' + barColor + '">' + sc.avgRecovery + '%</span>' +
        '<span class="psy-diff-meta">' + sc.totalWarn + ' drift events &middot; ' + sc.n + ' students</span>' +
      '</div>';
    }).join('');

    // Hardest scenario student breakdown
    var scoreBadge = function(s) {
      var c = s >= 80 ? '#22c55e' : s >= 60 ? '#f59e0b' : '#ef4444';
      return '<span style="font-weight:700;color:' + c + '">' + s + '</span>';
    };
    var drillRows = hardest.students
      .slice().sort(function(a, b) { return a.recoveryRate - b.recoveryRate; })
      .map(function(u) {
        return '<tr>' +
          '<td style="' + tdS + '"><strong style="color:var(--text)">' + h(u.name) + '</strong><br><small style="color:var(--muted)">' + h(u.email) + '</small></td>' +
          '<td style="' + tdS + ';text-align:center">' + u.warnings + '</td>' +
          '<td style="' + tdS + ';text-align:center">' + scoreBadge(u.recoveryRate) + '%</td>' +
          '<td style="' + tdS + ';text-align:center">' + (u.avgCorrectionSec > 0 ? u.avgCorrectionSec + 's' : '&mdash;') + '</td>' +
        '</tr>';
      }).join('');

    var drillHtml =
      '<div class="psy-diff-drill">' +
        '<p class="psy-diff-drill-label">Student breakdown &mdash; ' + h(hardest.phase) + ' (hardest scenario)</p>' +
        '<div class="table-wrap">' +
          '<table style="width:100%;border-collapse:collapse;">' +
            '<thead><tr>' +
              '<th style="' + thS + '">Student</th>' +
              '<th style="' + thS + ';text-align:center">Drift Events</th>' +
              '<th style="' + thS + ';text-align:center">Recovery</th>' +
              '<th style="' + thS + ';text-align:center">Avg Fix</th>' +
            '</tr></thead>' +
            '<tbody>' + drillRows + '</tbody>' +
          '</table>' +
        '</div>' +
      '</div>';

    return '<div class="mgmt-section" style="margin-top:28px;">' +
      _sectionHead('Scenario Difficulty', 'Class avg recovery rate per phase &mdash; hardest to easiest') +
      insightHtml +
      '<div class="psy-diff-chart">' + barRows + '</div>' +
      drillHtml +
    '</div>';
  }

            '<div class="ent-pf-row"><span class="ent-pf-label pass">Pass</span><div class="ent-pf-track"><div class="ent-pf-fill pass" style="width:' + passNum + '%"></div></div><span class="ent-pf-pct">' + passRate + '</span></div>' +

          '<span class="ent-alert-icon">' + (r.highRiskPilotCount > 0 ? '⚠' : '✓') + '</span>' +

          '<span class="ent-alert-icon">' + (r.recurrentCriticalMistakes > 0 ? '!' : '✓') + '</span>' +

        '</div>' +
        '<div class="ent-risk-col">' +
          '<div class="mgmt-section-head"><p class="eyebrow">Phraseology Gaps</p><h3>Missed Keywords</h3></div>' +
          '<div class="sc-missed-list">' + kwHtml + '</div>' +
        '</div>' +

      .apiB2bGetRisk(AppState.sessionToken, companyId);

  function _fmtDur(sec) {
    sec = Number(sec) || 0;
    return Math.floor(sec / 60) + 'm ' + (sec % 60) + 's';
  }

  function _fmtSessionTs(ts) {
    if (!ts) return { date: '—', time: '' };
    var d = new Date(ts);
    if (isNaN(d.getTime())) return { date: String(ts).slice(0, 10), time: '' };
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var date = months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
    var time = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
    return { date: date, time: time };
  }

  function _starsHtml(avg) {
    var filled = Math.round(avg);
    var s = '';
    for (var i = 1; i <= 5; i++) s += i <= filled ? '★' : '☆';
    return s;
  }

  function _b2bBreakdownHtml(map, emptyLabel) {
    var keys = Object.keys(map || {});
    if (!keys.length) return '<p class="b2b-empty">' + emptyLabel + '</p>';
    var total = keys.reduce(function(s, k) { return s + (map[k] || 0); }, 0) || 1;
    var html = '<div class="b2b-bar-list">';
    keys.sort(function(a, b) { return map[b] - map[a]; }).forEach(function(k) {
      var pct = Math.round((map[k] / total) * 100);
      html +=
        '<div class="b2b-bar-row">' +
          '<span class="b2b-bar-label">' + h(k) + '</span>' +
          '<div class="b2b-bar-track"><div class="b2b-bar-fill" style="width:' + pct + '%"></div></div>' +
          '<span class="b2b-bar-count">' + h(map[k]) + '</span>' +
        '</div>';
    });
    return html + '</div>';
  }

  function _b2bTableHtml(rows, colLabel) {
    if (!rows || !rows.length) return '<p class="b2b-empty">No data yet — will populate as B2B tenants onboard.</p>';
    var html = '<table><thead><tr><th>' + colLabel + '</th><th>Events</th></tr></thead><tbody>';
    rows.forEach(function(r) {
      html += '<tr><td style="font-family:monospace;font-size:0.82rem;">' + h(r.id) + '</td><td>' + h(r.events) + '</td></tr>';
    });
    return html + '</tbody></table>';
  }

      '<span class="mgmt-kpi-label">' + label + '</span>' +

      '<span class="mgmt-kpi-sub">' + sub + '</span>' +

  function _insightBanner(type, icon, headline, detail) {
    var palettes = {
      good:     { bg: 'rgba(34,197,94,0.07)',  border: 'rgba(34,197,94,0.4)',  text: '#22c55e' },
      warning:  { bg: 'rgba(245,158,11,0.07)', border: 'rgba(245,158,11,0.4)', text: '#f59e0b' },
      critical: { bg: 'rgba(239,68,68,0.07)',  border: 'rgba(239,68,68,0.4)',  text: '#ef4444' },
      info:     { bg: 'rgba(99,179,237,0.07)', border: 'rgba(99,179,237,0.4)', text: '#63b3ed' }
    };
    var p = palettes[type] || palettes.info;
    return '<div class="analytics-insight-banner" style="background:' + p.bg + ';border-left-color:' + p.border + ';color:' + p.text + '">' +
      '<span class="aib-icon">' + icon + '</span>' +
      '<div class="aib-body"><strong class="aib-headline">' + h(headline) + '</strong><span class="aib-detail">' + h(detail) + '</span></div>' +
    '</div>';

  function _drawAdminAnalytics(data) {
    var ss  = data.sessionStats    || {};
    var fb  = data.feedbackSummary || {};
    var b2b = data.b2bStats        || {};
    var sc  = data.scenarioStats   || {};
    var adm = data.admin           || {};
    var eff = data.effectiveness   || {};
    var charts = data.charts       || {};
    var sessions = data.recentSessions || [];
    var recentAttempts  = data.recentAttempts   || [];
    var levelProgression = data.levelProgression || [];
    var diff  = fb.difficulty    || { easy: 0, ok: 0, hard: 0 };
    var exits = fb.exitReasons   || {};
    var wua   = fb.wouldUseAgain || { yes: 0, no: 0, maybe: 0 };
    var texts = fb.recentFreeTexts || [];
    var scenarioRatings  = fb.scenarioRatings  || [];
    var scenarioComments = fb.scenarioComments || [];

    var diffTotal = (diff.easy || 0) + (diff.ok || 0) + (diff.hard || 0) || 1;
    var wuaTotal  = (wua.yes  || 0) + (wua.no   || 0) + (wua.maybe || 0) || 1;
    function pct(n) { return Math.round(((n || 0) / diffTotal) * 100); }
    var pctEasy = Math.round(((diff.easy || 0) / diffTotal) * 100);
    var pctWua  = Math.round(((wua.yes   || 0) / wuaTotal)  * 100);
    var compRate = Number(ss.completionRate || 0);

    // ── Build row HTML ─────────────────────────────────────────────────
    var exitRows = '', dropRows = '', sessionRows = '', textHtml = '';
    Object.keys(exits).sort(function(a,b){ return (exits[b]||0)-(exits[a]||0); })
      .forEach(function(r) {
        exitRows += '<tr><td>' + h(r) + '</td><td class="td-num">' + h(exits[r]) + '</td></tr>';
      });
    if (!exitRows) exitRows = '<tr><td colspan="2" class="td-empty">No exit feedback yet.</td></tr>';

    (ss.dropoffPoints || []).forEach(function(d) {
      dropRows += '<tr><td>' + h(d.phase) + '</td><td class="td-num">' + h(d.count) + '</td></tr>';
    });
    if (!dropRows) dropRows = '<tr><td colspan="2" class="td-empty">No drop-off data yet.</td></tr>';

    sessions.forEach(function(s) {
      sessionRows +=
        '<tr>' +
          '<td class="td-mono">' + h(s.sessionId) + '…</td>' +
          '<td>' + h(s.email) + '</td>' +
          '<td class="td-num">' + _fmtDur(s.durationSec) + '</td>' +
          '<td class="td-muted">' + h(s.timestamp) + '</td>' +
        '</tr>';
    });
    if (!sessionRows) sessionRows = '<tr><td colspan="4" class="td-empty">No sessions logged yet.</td></tr>';

    texts.forEach(function(t) {
      textHtml += '<div class="mgmt-quote-card">' +
        '<span class="mgmt-quote-mark">"</span>' +
        '<p>' + h(t) + '</p>' +
      '</div>';
    });
    if (!textHtml) textHtml = '<p class="mgmt-empty-state">No free-text comments yet.</p>';

    var ratingsHtml = '';
    if (scenarioRatings.length) {
      ratingsHtml = '<div class="mgmt-rating-list">';
      scenarioRatings.forEach(function(r) {
        ratingsHtml +=
          '<div class="mgmt-rating-row">' +
            '<span class="mgmt-rating-stars">' + _starsHtml(r.avg) + '</span>' +
            '<span class="mgmt-rating-id">' + h(r.scenarioId) + '</span>' +
            '<span class="mgmt-rating-score">' + h(r.avg.toFixed(1)) + ' / 5</span>' +
            '<span class="mgmt-rating-count">' + h(r.count) + ' rating' + (r.count !== 1 ? 's' : '') + '</span>' +
          '</div>';
      });
      ratingsHtml += '</div>';
    } else {
      ratingsHtml = '<p class="mgmt-empty-state">No scenario ratings yet.</p>';

(function () {

  // ── Module state ────────────────────────────────────────────────────────────
  var _gam = {
    myEmail:      null,
    pendingCount: 0,
    chalCount:    0,
    targetEmail:  null,
    targetName:   null,
    searchTimer:  null
  };

  // ── DOM helpers ─────────────────────────────────────────────────────────────
  function _gEl(id)  { return document.getElementById(id); }
  function _gQA(sel) { return Array.prototype.slice.call(document.querySelectorAll(sel)); }

  // ── Init ────────────────────────────────────────────────────────────────────
  function _gamInit() {
    _gam.myEmail = (window.AppState && AppState.user && AppState.user.email)
      ? AppState.user.email : null;
    if (!_gam.myEmail) return;

    // Clear demo static content from GamificationUI.html template
    var searchResults = _gEl('gamSearchResults');
    if (searchResults) searchResults.innerHTML = '';
    var roster = _gEl('gamRoster');
    if (roster) roster.innerHTML = '<div class="gam-empty-state">Loading squadron...</div>';

    _gamBindSearch();
    _gamBindModal();
    _gamBindBellFooter();

    _gamLoadSquadron();
    _gamLoadPendingRequests();
    _gamLoadIncomingChallenges();
    _gamLoadLeaderboard();
    _gamLoadCareerStats();
  }

  // ── Search — 500 ms debounce ─────────────────────────────────────────────────
  function _gamBindSearch() {
    var input = _gEl('gamSearchInput');
    if (!input) return;
    input.addEventListener('input', function () {
      clearTimeout(_gam.searchTimer);
      var q   = input.value.trim();
      var box = _gEl('gamSearchResults');
      if (!box) return;
      if (q.length < 2) { box.innerHTML = ''; return; }
      box.innerHTML = '<div class="gam-search-status">Searching...</div>';
      _gam.searchTimer = setTimeout(function () {
        google.script.run
          .withSuccessHandler(_gamOnSearch)
          .withFailureHandler(function () {
            var b = _gEl('gamSearchResults');
            if (b) b.innerHTML = '<div class="gam-search-status gam-search-status--err">Connection error. Try again.</div>';
          })
          .searchPilot(q, _gam.myEmail);
      }, 500);
    });
  }

  function _gamOnSearch(res) {
    var box = _gEl('gamSearchResults');
    if (!box) return;
    if (res.status !== 'success') {
      box.innerHTML = '<div class="gam-search-status gam-search-status--err">' + _gEsc(res.message || 'Search failed.') + '</div>';
      return;
    }
    var pilots = res.data || [];
    if (!pilots.length) {
      box.innerHTML = '<div class="gam-search-status">No pilots found.</div>';
      return;
    }
    box.innerHTML = pilots.map(function (p) {
      var e = _gEsc(p.email), n = _gEsc(p.name);
      return '<div class="result-card">' +
        '<div class="result-card-avatar">' + _gIni(p.name) + '</div>' +
        '<div class="result-card-info">' +
          '<span class="result-card-name">' + n + '</span>' +
          '<span class="result-card-email">' + e + '</span>' +
        '</div>' +
        '<button class="gam-add-btn" data-email="' + e + '">&#10133; Add</button>' +

      var rankCls = rank <= 3 ? ' gam-lb-rank--' + rank : '';

      var rowCls  = isMe ? ' gam-lb-row--me' : '';
      var barW    = Math.min(100, Math.round((p.totalCp / maxCp) * 100));
      var nameTag = _gEsc(p.name) + (isMe
        ? ' <span style="color:var(--gam-green);font-size:0.62rem;font-weight:700;margin-left:5px;">YOU</span>'
        : '');
      var streakTxt = p.maxStreak >= 2
        ? '<span class="gam-streak-chip">🔥 ' + p.maxStreak + '</span>' : '';

      html +=
        '<div class="gam-lb-row' + rowCls + '">' +
          '<span class="gam-lb-rank' + rankCls + '">' + medal + '</span>' +
          '<div class="gam-lb-avatar' + avaCls + '">' + _gIni(p.name) + '</div>' +
          '<div class="gam-lb-info">' +
            '<div class="gam-lb-name">' + nameTag + streakTxt + '</div>' +
            '<div class="gam-lb-bar-wrap">' +
              '<div class="gam-lb-bar" style="width:' + barW + '%;background:linear-gradient(90deg,#DAA520,#DAA52088);"></div>' +
            '</div>' +
          '</div>' +
          '<div class="gam-lb-right">' +
            '<span class="gam-lb-score">' + p.totalCp + ' CP</span>' +
            '<span class="gam-lb-level" style="color:var(--gam-muted);">' + p.toursCompleted + ' tours</span>' +
          '</div>' +
        '</div>';
    });
    box.innerHTML = fallbackNote + html;
  }

  // Rank tier definition — single source of truth used by renderer and chip helper
  var GAM_TIERS = [
    { key: 'chief',      label: 'Chief',      abbr: 'CHIEF', color: '#990011', glow: 'rgba(153,0,17,0.28)',   stripes: 4 },
    { key: 'instructor', label: 'Instructor', abbr: 'INSTR', color: '#DAA520', glow: 'rgba(218,165,32,0.28)', stripes: 3 },
    { key: 'senior',     label: 'Senior',     abbr: 'SR',    color: '#C0C7D1', glow: 'rgba(192,199,209,0.22)',stripes: 2 },
    { key: 'junior',     label: 'Junior',     abbr: 'JR',    color: '#0E65F4', glow: 'rgba(14,101,244,0.25)', stripes: 1 }
  ];

  // Profession-specific tier label map
  var PROFESSION_TIERS = {
    'PILOT':       { junior: 'Junior Captain',     senior: 'Senior Captain',     instructor: 'Instructor Captain',     chief: 'Chief Pilot'        },
    'CONTROLLER':  { junior: 'Junior Controller',  senior: 'Senior Controller',  instructor: 'Instructor Controller',  chief: 'Chief Controller'   },
    'AMT':         { junior: 'Junior AMT',         senior: 'Senior AMT',         instructor: 'Instructor AMT',         chief: 'Chief AMT'          },
    'FIREFIGHTER': { junior: 'Junior Firefighter', senior: 'Senior Firefighter', instructor: 'Instructor Firefighter', chief: 'Chief Firefighter'  },
    'DRIVER':      { junior: 'Junior Driver',      senior: 'Senior Driver',      instructor: 'Instructor Driver',      chief: 'Chief Driver'       }
  };

  function _gamTierLabel(tierKey, profession) {
    var prof = PROFESSION_TIERS[String(profession || '').toUpperCase()] || PROFESSION_TIERS['PILOT'];
    return prof[tierKey] || tierKey;
  }

  function _gamTierOf(completedLevels, profession) {
    var base = completedLevels >= 10 ? GAM_TIERS[0]
             : completedLevels >= 7  ? GAM_TIERS[1]
             : completedLevels >= 4  ? GAM_TIERS[2]
             : GAM_TIERS[3];
    var label = _gamTierLabel(base.key, profession);
    return { key: base.key, label: label, abbr: base.abbr, color: base.color, glow: base.glow, stripes: base.stripes };
  }

  // CP formula mirroring TourService — base 50, +10% per consecutive level
  function _cpNextLevelValue(n) { return Math.round(50 * (1 + 0.10 * n)); }
  function _cpMultiplierDisplay(n) { return Math.round((1 + 0.10 * n) * 10) / 10; }

  function _gamStripesSvg(n, color) {
    var s = '';
    for (var i = 0; i < n; i++) {
      s += '<span style="display:inline-block;width:12px;height:2px;background:' + color +
           ';margin-right:2px;border-radius:1px;vertical-align:middle;"></span>';
    }
    return s;
  }

  function _gamRenderLeaderboard(res) {
    var box = _gEl('gamLeaderboard');
    if (!box) return;
    if ((!res.ok && res.status !== 'success') || !res.data || !res.data.length) {
      box.innerHTML = '<div class="gam-lb-empty">No ranking data yet. Complete scenarios to appear here.</div>';
      return;
    }
    var myEmail = _gam.myEmail ? _gam.myEmail.toLowerCase() : '';
    var medals  = ['🥇', '🥈', '🥉'];

    // Group professionals by tier using this week's completed levels — resets every tour.
    var groups = { chief: [], instructor: [], senior: [], junior: [] };
    res.data.forEach(function (p) {
      var tier = _gamTierOf(p.completedLevels, p.profession);
      groups[tier.key].push(p);
    });

    // Use the highest XP in this week's data as the bar ceiling so the top
    // scorer always fills to 100% — works correctly on 2× XP weeks too.
    var maxXpInData = 1;
    res.data.forEach(function (p) { if (p.totalXp > maxXpInData) maxXpInData = p.totalXp; });

    var html = '';
    GAM_TIERS.forEach(function (tier) {
      var pilots = groups[tier.key];
      if (!pilots.length) return;

      // Tier divider header
      html += '<div class="gam-lb-tier-divider" style="border-color:' + tier.color + '30;">' +
        '<span class="gam-lb-tier-label" style="color:' + tier.color + ';text-shadow:0 0 12px ' + tier.glow + ';">' +
          _gamStripesSvg(tier.stripes, tier.color) + '&nbsp;&nbsp;' + tier.label.toUpperCase() +
        '</span>' +
        '<span class="gam-lb-tier-count" style="color:' + tier.color + '80;">' + pilots.length + ' professional' + (pilots.length !== 1 ? 's' : '') + '</span>' +
      '</div>';

      pilots.forEach(function (p) {
        var rank      = p.rank;
        var pilotTier = _gamTierOf(p.completedLevels, p.profession);
        var isMe    = (String(p.email || '').toLowerCase() === myEmail);
        var medal   = rank <= 3 ? medals[rank - 1] : rank;
        var rankCls = rank <= 3 ? ' gam-lb-rank--' + rank : '';
        var avaCls  = rank <= 3 ? ' gam-lb-avatar--' + rank : '';
        var rowCls  = isMe ? ' gam-lb-row--me' : '';
        var barW    = Math.min(100, Math.round((p.totalXp / maxXpInData) * 100));
        var nameTag = _gEsc(p.name) + (isMe
          ? ' <span style="color:var(--gam-green);font-size:0.62rem;font-weight:700;margin-left:5px;letter-spacing:0.05em;">YOU</span>'
          : '');
        if (isMe) _gam.myWeeklyLevels = p.completedLevels || 0;

        html +=
          '<div class="gam-lb-row' + rowCls + '">' +
            '<span class="gam-lb-rank' + rankCls + '">' + medal + '</span>' +
            '<div class="gam-lb-avatar' + avaCls + '">' + _gIni(p.name) + '</div>' +
            '<div class="gam-lb-info">' +
              '<div class="gam-lb-name">' + nameTag + '</div>' +
              '<div class="gam-lb-bar-wrap">' +
                '<div class="gam-lb-bar" style="width:' + barW + '%;background:linear-gradient(90deg,' + pilotTier.color + ',' + pilotTier.color + '88);"></div>' +
              '</div>' +
            '</div>' +
            '<div class="gam-lb-right">' +
              '<span class="gam-lb-score">' + p.totalXp + ' XP</span>' +
              '<span class="gam-lb-level" style="color:#DAA520;font-weight:700;">' + (p.weeklyCP || 0) + ' CP</span>' +
            '</div>' +
          '</div>';
      });
    });

    box.innerHTML = html;
  }

  // ── Bootstrap ────────────────────────────────────────────────────────────────
  // Expose so renderSquadron() can call it directly after login.
  // ── Critical Scenario variable-ratio bonus ────────────────────────────────
  // Fires on ~20% of leaderboard loads after the weekly board renders.
  // Pure motivational flourish — highlights the pilot's XP with a flash overlay.
  function _gamMaybeCriticalScenario() {
    if (Math.random() > 0.20) return;
    var box = _gEl('gamLeaderboard');
    if (!box) return;
    var myRow = box.querySelector('.gam-lb-row--me');
    if (!myRow) return;
    var scoreEl = myRow.querySelector('.gam-lb-score');
    if (!scoreEl) return;
    var orig = scoreEl.textContent;
    myRow.classList.add('gam-critical-flash');
    var badge = document.createElement('span');
    badge.className   = 'gam-critical-badge';
    badge.textContent = '⚡ CRITICAL SCENARIO';
    myRow.insertBefore(badge, myRow.firstChild);
    setTimeout(function () {
      myRow.classList.remove('gam-critical-flash');
      if (badge.parentNode) badge.parentNode.removeChild(badge);
    }, 3200);
  }

  // ── Career stats sidebar update ───────────────────────────────────────────
  function _gamLoadCareerStats() {
    google.script.run
      .withSuccessHandler(function (res) {
        if (!res || !res.ok) return;
        _gamRenderTourBanner(res.activeTour, res.activeTour && res.activeTour.isDoubleXp);
        _gamUpdateStreakChip(res.currentStreak, res.streakBonusPct);
        _gamRenderMedallions(res.medallions || []);
      })
      .withFailureHandler(function () {})
      .apiGetMyCareerStats(window.AppState && AppState.sessionToken);
  }

  // Medallion color based on completion level
  function _gamMedallionColor(completedLevels) {
    if (completedLevels >= 10) return '#DAA520';        // gold  — full
    if (completedLevels >= 7)  return '#DAA52077';      // gold dimmed
    if (completedLevels >= 4)  return '#64748b';        // silver
    if (completedLevels >= 1)  return 'transparent';    // outline only
    return 'transparent';                               // missed
  }

  function _gamRenderMedallions(medallions) {
    var el = _gEl('gamMedallions');
    if (!el) return;
    if (!medallions || !medallions.length) { el.style.display = 'none'; return; }

    var html = '<span class="gam-med-label">TOUR HISTORY</span>';
    medallions.forEach(function (m) {
      var lvls   = parseInt(m.completedLevels, 10) || 0;
      var color  = _gamMedallionColor(lvls);
      var border = lvls > 0 ? color : '#334155';
      var bg     = lvls > 0 ? color : 'transparent';
      var dxp    = m.isDoubleXp  ? ' gam-med--dxp' : '';
      var back   = m.isComeback  ? ' gam-med--comeback' : '';
      var missed = lvls === 0    ? ' gam-med--missed' : '';
      var title  = 'Tour ' + (m.weekNumber || '') + ' · ' + lvls + '/10 levels · ' + (m.careerPoints || 0) + ' CP';

      html +=
        '<span class="gam-medallion' + dxp + back + missed + '"' +
          ' title="' + title + '"' +
          ' style="background:' + bg + ';border-color:' + border + ';">' +
          (m.isDoubleXp ? '<span class="gam-med-icon">⚡</span>' :
           m.isComeback ? '<span class="gam-med-icon">🔥</span>' : '') +
        '</span>';
    });

    el.innerHTML     = html;
    el.style.display = '';
  }

  function _gamUpdateStreakChip(streak, bonusPct) {
    var chip = _gEl('gamStreakChip');
    if (!chip) return;
    if (!streak || streak < 2) { chip.style.display = 'none'; return; }
    chip.textContent    = '🔥 ' + streak + '-week streak · +' + bonusPct + '% CP';
    chip.style.display  = '';
  }

  window._gamInit            = _gamInit;
  window._gamStartPoll       = _gamStartPoll;
  window._gamSwitchTab       = _gamSwitchTab;
  window._gamLoadLeaderboard = _gamLoadLeaderboard;
  window._gamSwitchLbTab     = _gamSwitchLbTab;
  window._gamRefreshLb       = _gamRefreshLb;
  window._gamTierOf          = _gamTierOf;
  window._gamTierLabel       = _gamTierLabel;
  window._gamStripesSvg      = _gamStripesSvg;

  // Staggered load: fires 1500 ms after DOM ready so the main app initialises first.
  // If the user isn't logged in yet, _gamInit() exits early; renderSquadron() will
  // call it again at the right time.
  document.addEventListener('DOMContentLoaded', function () {
    setTimeout(_gamInit, 1500);
  });

})();

/* ===========================================================================
 * FIRST FLIGHT - Onboarding for new students
 * Uses T03 (Tower - Takeoff), the simplest Level 1 scenario (2 keywords).
 * Reuses _clientEvaluate for keyword scoring, same as the main simulator.
 * =========================================================================== */
(function() {
  'use strict';

  var _SC = {
    country:          'USA',
    callsign:         'aerocomms 123',
    atcText:          'AEROCOMMS one two three, taxi to runway zero one.',
    expectedReadback: 'Taxi to runway zero one, AEROCOMMS one two three.',
    keywordsText:     'runway|aerocomms'
  };

  var _FF = { audioReady: false, audioData: null };

  function _esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // -- Helpers
  function _overlay() { return document.getElementById('ffOverlay'); }

  function _mount() {
    var old = document.getElementById('ffOverlay');
    if (old) old.remove();
    var el = document.createElement('div');
    el.id = 'ffOverlay'; el.className = 'ff-overlay';
    document.body.appendChild(el);
    return el;
  }

  function _close(then) {
    var o = _overlay();
    if (!o) { if (then) then(); return; }
    o.classList.add('ff-fade-out');
    setTimeout(function() { if (o.parentNode) o.remove(); if (then) then(); }, 300);
  }

  function _markDone(cb) {
    if (!window.AppState || !AppState.sessionToken) { if (cb) cb(); return; }
    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.ok && res.user) AppState.user = res.user;
        else if (AppState.user) AppState.user.firstFlightDone = true;
        if (cb) cb();
      })
      .withFailureHandler(function() {
        if (AppState.user) AppState.user.firstFlightDone = true;
        if (cb) cb();
      })
      .apiMarkFirstFlightDone(AppState.sessionToken);
  }

  function _goHome() {
    if (typeof window.renderHome === 'function') window.renderHome(); else renderHome();
  }

  function _playBase64(b64, onEnd) {
    try {
      var a = new Audio('data:audio/mp3;base64,' + b64);
      a.onended = onEnd; a.onerror = onEnd;
      a.play().catch(onEnd);
    } catch(e) { if (onEnd) onEnd(); }
  }

  // -- Phase 0: Briefing
  function renderFirstFlight() {
    _FF.audioReady = false; _FF.audioData = null;
    var o = _mount();
    o.innerHTML =
      '<div class="ff-card ff-card-briefing">' +
        '<div class="ff-radar-bg"></div>' +
        '<div class="ff-briefing-content">' +
          '<div class="ff-mission-tag">MISSION 01</div>' +
          '<h1 class="ff-title">First Flight</h1>' +
          '<p class="ff-subtitle">Do one real ATC exercise to see exactly how the simulator works.</p>' +
          '<div class="ff-checklist">' +
            '<div class="ff-check-item"><span class="ff-check-num">1</span><span>Listen to a tower transmission</span></div>' +
            '<div class="ff-check-item"><span class="ff-check-num">2</span><span>Type the pilot\'s readback</span></div>' +
            '<div class="ff-check-item"><span class="ff-check-num">3</span><span>See which keywords you got right</span></div>' +
          '</div>' +
          '<button class="btn primary ff-cta-btn" onclick="window._ffStart()">Start First Flight &rarr;</button>' +
          '<button class="ff-skip-btn" onclick="window._ffSkip()">Skip &mdash; explore on my own</button>' +
        '</div>' +
      '</div>';
    // Pre-fetch audio silently
    if (window.AppState && AppState.sessionToken) {
      google.script.run
        .withSuccessHandler(function(res) { if (res && res.ok && res.audioBase64) { _FF.audioData = res; _FF.audioReady = true; } })
        .withFailureHandler(function() {})
        .apiGenerateIcaoTestVoice(AppState.sessionToken, { text: _SC.atcText, country: _SC.country });
    }
  }

  // -- Phase 1: Exercise
  function _ffStart() {
    var o = _overlay(); if (!o) return;
    o.innerHTML =
      '<div class="ff-card ff-card-guided">' +
        '<div class="ff-guided-header">' +
          '<div class="ff-mission-tag">GROUND CONTROL</div>' +
          '<div class="ff-country-flag">&#127482;&#127480; USA GROUND</div>' +
        '</div>' +
        '<div class="ff-instruction">&#128266;&nbsp; Press <strong>Play</strong> to hear the ATC, then type what the pilot says back.</div>' +
        '<div class="ff-sim-area">' +
          '<div class="ff-play-area">' +
            '<button id="ffPlayBtn" class="ff-play-btn" onclick="window._ffPlay()">' +
              '<span class="ff-play-icon"></span>' +
              '<span id="ffPlayLabel">Play Transmission</span>' +
            '</button>' +
            '<p id="ffPlayStatus" class="ff-play-status"></p>' +
          '</div>' +
          '<div class="ff-readback-area">' +
            '<label class="ff-readback-label">Your Readback <span class="ff-callsign-hint">(callsign: aerocomms 123)</span></label>' +
            '<textarea id="ffReadbackInput" class="ff-readback-input" rows="3"></textarea>' +
          '</div>' +
          '<button class="btn primary ff-submit-btn" onclick="window._ffSubmit()">Submit Readback</button>' +
        '</div>' +
      '</div>';
    // Pre-fill callsign at end of textarea; place cursor at position 0 so student types the clearance first
    var ta = document.getElementById('ffReadbackInput');
    if (ta) {
      ta.value = _SC.callsign + '.';
      ta.setSelectionRange(0, 0);
      ta.focus();
    }
  }

  function _ffPlay() {
    var btn    = document.getElementById('ffPlayBtn');
    var label  = document.getElementById('ffPlayLabel');
    var status = document.getElementById('ffPlayStatus');
    if (btn)    btn.classList.add('ff-playing');
    if (label)  label.textContent = _FF.audioReady ? 'Playing...' : 'Loading...';
    // Always show ATC text so user can read it even if audio is blocked
    if (status) { status.textContent = _SC.atcText; status.classList.add('ff-play-status-visible'); }

    function _onEnd() {
      if (btn)   btn.classList.remove('ff-playing');
      if (label) label.textContent = 'Play Again';
    }

    if (_FF.audioReady && _FF.audioData) {
      if (label) label.textContent = 'Playing...';
      _playBase64(_FF.audioData.audioBase64, _onEnd);
    } else {
      google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.ok && res.audioBase64) {
            _FF.audioData = res; _FF.audioReady = true;
            if (label) label.textContent = 'Playing...';
            _playBase64(res.audioBase64, _onEnd);
          } else {
            _onEnd();
          }
        })
        .withFailureHandler(function() { _onEnd(); })
        .apiGenerateIcaoTestVoice(AppState.sessionToken, { text: _SC.atcText, country: _SC.country });
    }
  }

  function _ffSubmit() {
    var input = document.getElementById('ffReadbackInput');
    var answer = (input ? input.value : '').trim();
    if (!answer) {
      var instr = _overlay() && _overlay().querySelector('.ff-instruction');
      if (instr) instr.textContent = 'Type your readback first, then hit Submit.';
      return;
    }
    var norm = answer.toUpperCase().replace(/\b(\d+)\b/g, function(n) {
      var m = {'0':'ZERO','1':'ONE','2':'TWO','3':'THREE','4':'FOUR','5':'FIVE','6':'SIX','7':'SEVEN','8':'EIGHT','9':'NINER'};
      return n.split('').map(function(d){ return m[d]||d; }).join(' ');
    }).replace(/[^A-Z0-9 ]/g, ' ').replace(/\s+/g, ' ').trim();
    var keywords = _SC.keywordsText.split('|');
    var okKws = [], missingKws = [];
    keywords.forEach(function(kw) {
      (norm.indexOf(kw.toUpperCase()) !== -1 ? okKws : missingKws).push(kw);
    });
    var score = Math.round((okKws.length / keywords.length) * 100);
    var ev = { correct: missingKws.length === 0, score: score, keywordsOk: okKws, keywordsMissing: missingKws };
    _renderResult(ev, answer);
  }

  // -- Phase 2: Result
  function _renderResult(ev, userAnswer) {
    var o = _overlay(); if (!o) return;
    var ok      = ev.correct === true || String(ev.correct).toUpperCase() === 'TRUE';
    var missing = ev.keywordsMissing || [];
    var okKws   = ev.keywordsOk     || [];

    var kwHtml = '';
    okKws.forEach(function(k)   { kwHtml += '<div class="ff-kw-item ff-kw-found">&#10003; ' + _esc(k) + '</div>'; });
    missing.forEach(function(k) { kwHtml += '<div class="ff-kw-item ff-kw-miss">&#10007; ' + _esc(k) + '</div>'; });

    var expectedLine = _SC.expectedReadback
      ? '<p class="ff-expected-label">Expected readback:</p>' +
        '<p class="ff-expected-text">"' + _esc(_SC.expectedReadback) + '"</p>'
      : '';

    var retryBtn = '<button class="btn secondary ff-retry-btn" onclick="window._ffStart()">Try Again</button>';

    o.innerHTML =
      '<div class="ff-card ff-card-completion">' +
        '<div class="ff-result-header ' + (ok ? 'ff-result-ok' : 'ff-result-fail') + '">' +
          (ok ? '&#10003; Read-back accepted' : '&#10007; Non-standard read-back') +
        '</div>' +
        '<div class="ff-result-body">' +
          '<p class="ff-score-line"><strong>Score:</strong> ' + _esc(ev.score || 0) + '/100</p>' +
          '<div class="ff-keyword-list">' + (kwHtml || '<div class="ff-kw-item ff-kw-found">&#10003; All required elements included.</div>') + '</div>' +
          expectedLine +
          '<div class="ff-result-actions">' +
            (ok
              ? '<button class="btn primary ff-cta-btn" onclick="window._ffComplete()">Begin Level 1 &rarr;</button>' + retryBtn
              : retryBtn + '<button class="btn primary ff-cta-btn" onclick="window._ffComplete()">Continue to Level 1 &rarr;</button>'
            ) +
          '</div>' +
        '</div>' +
      '</div>';
  }

  // -- Actions
  function _ffComplete() { _markDone(function() { _close(_goHome); }); }
  function _ffSkip()     { _markDone(function() { _close(_goHome); }); }

  window.renderFirstFlight = renderFirstFlight;
  window._ffStart          = _ffStart;
  window._ffPlay           = _ffPlay;
  window._ffSubmit         = _ffSubmit;
  window._ffComplete       = _ffComplete;
  window._ffSkip           = _ffSkip;
})();

/* ===========================================================================
 * EXAMS - Checkpoint exams between levels 3/4, 6/7, 9/10

    if (!o) { if (then) then(); return; }

  function _goHome() {

      a.onended = onEnd; a.onerror = onEnd;
      a.play().catch(onEnd);
    } catch(e) { if (onEnd) onEnd(); }

  // ── Phase 0: Intro card ───────────────────────────────────────────────────
  function _examOpen(examNum) {

    var o = _mount();
    o.innerHTML =
      '<div class="exam-card-overlay exam-intro">' +
        '<div class="exam-intro-badge">CHECKPOINT ' + examNum + '</div>' +
        '<h2 class="exam-intro-title">Exam ' + examNum + '</h2>' +
        '<p class="exam-intro-sub">A complete 8-phase flight drawn from Levels ' + prereqs + '.</p>' +
        '<ul class="exam-rules-list">' +
          '<li>Listen to each ATC transmission and type the pilot readback</li>' +
          '<li>No feedback between phases — focus and stay consistent</li>' +

          '<li>Pass threshold: <strong>85%</strong></li>' +
          '<li>You have <strong>2 attempts</strong></li>' +
        '</ul>' +
        '<div class="exam-intro-actions">' +
          '<button class="btn primary exam-start-btn" onclick="window._examBegin(' + examNum + ')">Start Exam &rarr;</button>' +
          '<button class="btn secondary" onclick="window._examClose()">Cancel</button>' +
        '</div>' +
      '</div>';

  // ── Load scenarios then go to phase 1 ────────────────────────────────────
  function _examBegin(examNum) {
    var o = _overlay(); if (!o) return;
    o.innerHTML =
      '<div class="exam-card-overlay exam-loading">' +
        '<div class="exam-loading-spinner"></div>' +
        '<p class="exam-loading-text">Loading flight data...</p>' +
      '</div>';

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok || !res.phases || !res.phases.length) {
          _examError('Could not load exam scenarios. Please try again.');
          return;
        }
        _EX.examNum    = examNum;
        _EX.phases     = res.phases;
        _EX.answers    = [];
        _EX.phaseIndex = 0;
        _EX.routeId    = res.routeId || '';
        _EX.submitted  = false;
        _examPhase();
      })
      .withFailureHandler(function(err) {
        _examError('Server error: ' + (err && err.message ? err.message : 'unknown'));
      })
      .apiStartExam(AppState.sessionToken, examNum);

  // ── Render one phase ──────────────────────────────────────────────────────
  function _examPhase() {
    var o = _overlay(); if (!o) return;
    var idx    = _EX.phaseIndex;
    var total  = _EX.phases.length;
    var phase  = _EX.phases[idx];
    if (!phase) { _examError('Phase not found.'); return; }

    _EX.audioReady = false;
    _EX.audioData  = null;
    _EX.playsUsed  = 0;

    // Dot progress
    var dots = '';
    for (var d = 0; d < total; d++) {
      dots += '<span class="exam-dot' + (d < idx ? ' exam-dot-done' : d === idx ? ' exam-dot-active' : '') + '"></span>';
    }

    var isLast = idx === total - 1;
    o.innerHTML =
      '<div class="exam-card-overlay exam-phase">' +
        '<div class="exam-phase-header">' +
          '<span class="exam-phase-num">Phase ' + (idx + 1) + ' / ' + total + '</span>' +
          '<span class="exam-phase-name">' + _esc(phase.phaseName || phase.phaseCode) + '</span>' +
        '</div>' +
        '<div class="exam-dots">' + dots + '</div>' +
        '<div class="exam-phase-body">' +
          '<div class="exam-play-area">' +
            '<button id="examPlayBtn" class="exam-play-btn" onclick="window._examPlay()">' +
              '<span class="ff-play-icon"></span>' +
              '<span id="examPlayLabel">Play Transmission</span>' +
            '</button>' +
            '<span id="examPlayCount" class="exam-play-count">0 / 3</span>' +
            '<p id="examPlayStatus" class="exam-play-status"></p>' +
          '</div>' +
          '<div class="exam-readback-area">' +
            '<label class="exam-readback-label">Your Readback</label>' +
            '<textarea id="examReadbackInput" class="exam-readback-input" rows="3" placeholder="Type the pilot readback..."></textarea>' +
            '<button id="examMicBtn" class="demo-mic-btn" style="margin-top:8px;" onclick="startMicInput(\'examReadbackInput\',\'examMicBtn\',' + JSON.stringify(phase.expectedReadback || '') + ')">&#127908; Tap to speak</button>' +
          '</div>' +
          '<button class="btn primary exam-next-btn" onclick="window._examNext()">' +
            (isLast ? 'Submit Exam' : 'Next Phase &rarr;') +
          '</button>' +
        '</div>' +
      '</div>';

    // Pre-fetch audio silently using the phase-assigned voice + rate
    if (window.AppState && AppState.sessionToken) {
      google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.ok && res.audioBase64) { _EX.audioData = res; _EX.audioReady = true; }
        })
        .withFailureHandler(function() {})
        .apiGenerateIcaoTestVoice(AppState.sessionToken, {
          text:         phase.atcText,
          country:      phase.country,
          voice:        phase.voice        || '',
          speakingRate: phase.speakingRate || 1.0
        });
    }

    var ta = document.getElementById('examReadbackInput');
    if (ta) ta.focus();

  // ── Play ATC audio ────────────────────────────────────────────────────────
  var EXAM_MAX_PLAYS = 3;

  function _updatePlayCount() {
    var countEl = document.getElementById('examPlayCount');
    var btn     = document.getElementById('examPlayBtn');
    var label   = document.getElementById('examPlayLabel');
    var used    = _EX.playsUsed;
    var maxed   = used >= EXAM_MAX_PLAYS;
    if (countEl) {
      countEl.textContent = used + ' / ' + EXAM_MAX_PLAYS;
      countEl.className   = 'exam-play-count' + (maxed ? ' exam-play-count-maxed' : '');
    }
    if (maxed && btn) {
      btn.disabled = true;
      btn.classList.add('exam-play-disabled');
      if (label) label.textContent = 'Max replays reached';
    }
  }

  function _examPlay() {
    if (_EX.playsUsed >= EXAM_MAX_PLAYS) return;
    var phase  = _EX.phases[_EX.phaseIndex];
    var btn    = document.getElementById('examPlayBtn');
    var label  = document.getElementById('examPlayLabel');
    var status = document.getElementById('examPlayStatus');
    if (btn)    btn.classList.add('ff-playing');
    if (label)  label.textContent = _EX.audioReady ? 'Playing...' : 'Loading...';
    if (status) status.textContent = '';

    _EX.playsUsed++;
    _updatePlayCount();

    function _onEnd() {
      if (btn) btn.classList.remove('ff-playing');
      if (_EX.playsUsed < EXAM_MAX_PLAYS) {
        if (label) label.textContent = 'Play Again';
      }
    }

    function _onAudioFail() {
      if (status) status.textContent = 'Audio unavailable. Try refreshing or check your connection.';
      _onEnd();
    }

    if (_EX.audioReady && _EX.audioData) {
      if (label) label.textContent = 'Playing...';
      _playBase64Ex(_EX.audioData.audioBase64, _onEnd);
    } else {
      google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.ok && res.audioBase64) {
            _EX.audioData = res; _EX.audioReady = true;
            if (label) label.textContent = 'Playing...';
            _playBase64Ex(res.audioBase64, _onEnd);
          } else { _onAudioFail(); }
        })
        .withFailureHandler(_onAudioFail)
        .apiGenerateIcaoTestVoice(AppState.sessionToken, {
          text:         phase.atcText,
          country:      phase.country,
          voice:        phase.voice        || '',
          speakingRate: phase.speakingRate || 1.0
        });
    }

  // ── Advance to next phase (or submit) ────────────────────────────────────
  function _examNext() {
    if (_EX.submitted) return;
    var ta     = document.getElementById('examReadbackInput');
    var answer = ta ? ta.value.trim() : '';
    if (!answer) {
      var lbl = document.querySelector('#examOverlay .exam-readback-label');
      if (lbl) { lbl.textContent = 'Type your readback before continuing'; lbl.style.color = '#ef4444'; }
      return;
    }
    _EX.answers.push({ scenarioId: _EX.phases[_EX.phaseIndex].scenarioId, answer: answer });

    if (_EX.phaseIndex < _EX.phases.length - 1) {
      _EX.phaseIndex++;
      _examPhase();
    } else {
      _examSubmitToServer();
    }
  }

  // ── Submit all answers to server ─────────────────────────────────────────
  function _examSubmitToServer() {
    _EX.submitted = true;
    var o = _overlay(); if (!o) return;
    o.innerHTML =
      '<div class="exam-card-overlay exam-loading">' +
        '<div class="exam-loading-spinner"></div>' +
        '<p class="exam-loading-text">Scoring your exam...</p>' +
      '</div>';

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok) { _examError('Could not record exam result.'); return; }
        _examResult(res);
      })
      .withFailureHandler(function(err) {
        _examError('Server error: ' + (err && err.message ? err.message : 'unknown'));
      })
      .apiSubmitExam(AppState.sessionToken, {
        examNum:  _EX.examNum,
        routeId:  _EX.routeId,
        answers:  _EX.answers
      });
  }

  // ── Show final result ────────────────────────────────────────────────────
  function _examResult(res) {
    var o = _overlay(); if (!o) return;
    var passed  = res.passed === true;
    var score   = Number(res.score || 0);
    var status  = String(res.examStatus || '');
    var nextLvl = _EX.examNum === 1 ? 4 : _EX.examNum === 2 ? 7 : 10;

    var actionBtn = passed
      ? '<button class="btn primary exam-cta-btn" onclick="window._examClose()">Continue to Level ' + nextLvl + ' &rarr;</button>'
      : (status === 'replay_required'
          ? '<button class="btn secondary exam-cta-btn" onclick="window._examClose()">Review Levels ' + (nextLvl - 3) + '&ndash;' + (nextLvl - 1) + '</button>'
          : '<button class="btn primary exam-cta-btn" onclick="window._examOpen(' + _EX.examNum + ')">Retry Exam</button>');

    var attemptsLeft = passed ? '' : (status === 'replay_required'
      ? '<p class="exam-result-sub">You\'ve used both attempts. Review the preceding levels and try again.</p>'
      : '<p class="exam-result-sub">Attempt ' + (res.attemptNumber || 1) + ' of 2 &mdash; 1 attempt remaining.</p>');

    o.innerHTML =
      '<div class="exam-card-overlay exam-result">' +
        '<div class="exam-result-header ' + (passed ? 'exam-result-pass' : 'exam-result-fail') + '">' +
          (passed ? '&#10003; Exam Passed' : '&#10007; Exam Not Passed') +
        '</div>' +
        '<div class="exam-result-body">' +
          '<div class="exam-score-ring ' + (passed ? 'exam-score-pass' : 'exam-score-fail') + '">' +
            '<span class="exam-score-num">' + score + '</span>' +
            '<span class="exam-score-label">/ 100</span>' +
          '</div>' +
          '<p class="exam-result-threshold">Pass threshold: 85</p>' +
          attemptsLeft +
          '<div class="exam-result-actions">' +
            actionBtn +
            '<button class="btn secondary" onclick="window._examClose()">Back to Levels</button>' +
          '</div>' +
        '</div>' +
      '</div>';

    // Refresh exam status in AppState so level grid is up to date on next render
    if (window.AppState && AppState.sessionToken) {
      google.script.run
        .withSuccessHandler(function(r) { if (r && r.ok) AppState.examStatus = r.exams || []; })
        .withFailureHandler(function() {})
        .apiGetExamStatus(AppState.sessionToken);
    }
  }

  // ── Error screen ─────────────────────────────────────────────────────────
  function _examError(msg) {
    var o = _overlay(); if (!o) return;
    o.innerHTML =
      '<div class="exam-card-overlay exam-error">' +
        '<p style="font-size:1.3rem;margin-bottom:12px;">&#9888;</p>' +
        '<p style="color:#ef4444;margin-bottom:20px;">' + _esc(msg) + '</p>' +
        '<button class="btn secondary" onclick="window._examClose()">Close</button>' +
      '</div>';
  }

  // ── View passed result (read-only) ───────────────────────────────────────
  function _examViewResult(examNum) {
    var examStatus = AppState.examStatus || [];
    var info = null;
    for (var i = 0; i < examStatus.length; i++) {
      if (examStatus[i].examNum === examNum) { info = examStatus[i]; break; }
    }
    var o = _mount();
    o.innerHTML =
      '<div class="exam-card-overlay exam-result">' +
        '<div class="exam-result-header exam-result-pass">&#10003; Exam ' + examNum + ' Passed</div>' +
        '<div class="exam-result-body">' +
          '<div class="exam-score-ring exam-score-pass">' +
            '<span class="exam-score-num">' + (info && info.score !== null ? info.score : '--') + '</span>' +
            '<span class="exam-score-label">/ 100</span>' +
          '</div>' +
          '<p class="exam-result-threshold">Pass threshold: 85</p>' +
          '<div class="exam-result-actions">' +
            '<button class="btn secondary" onclick="window._examClose()">Close</button>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  function _examClose() { _close(_goHome); }

  window._examOpen       = _examOpen;
  window._examBegin      = _examBegin;
  window._examPlay       = _examPlay;
  window._examNext       = _examNext;
  window._examClose      = _examClose;
  window._examViewResult = _examViewResult;
})();

(function() {

      })
      .withFailureHandler(function(err) {
        _placementError('Server error: ' + (err && err.message ? err.message : 'unknown'));
      })
      .apiSubmitPlacementTest(AppState.sessionToken, { answers: _PL.answers });
  }

  function _placementResult(res) {
    var o     = _overlay(); if (!o) return;
    var level = Number(res.placedAtLevel || 1);
    var r1    = Number(res.round1Score   || 0);
    var r2    = Number(res.round2Score   || 0);

    var levelMsg = level === 7
      ? 'You are placed at Level 7. Levels 1–6 entry points have been unlocked.'
      : level === 4
        ? 'You are placed at Level 4. Level 1–3 are still accessible if you want a refresher.'
        : 'You are placed at Level 1. Start from the foundation and build up.';

    o.innerHTML =
      '<div class="exam-card-overlay exam-result">' +
        '<div class="exam-result-header exam-result-pass" style="font-size:1.05rem;letter-spacing:0.04em;">Placement Complete</div>' +
        '<div class="exam-result-body">' +
          '<div style="font-size:2.8rem;margin:10px 0 6px;">&#127919;</div>' +
          '<p style="font-size:1.9rem;font-weight:900;color:#fff;margin:0 0 4px;">Level ' + level + '</p>' +
          '<p style="font-size:0.85rem;color:#8fa3bb;margin:0 0 22px;line-height:1.5;">' + _esc(levelMsg) + '</p>' +
          '<div style="display:flex;gap:24px;justify-content:center;margin-bottom:26px;">' +
            '<div style="text-align:center;">' +
              '<div style="font-size:1.5rem;font-weight:900;color:' + (r1 >= 75 ? '#00d48e' : '#ef4444') + ';">' + r1 + '%</div>' +
              '<div style="font-size:0.7rem;color:#6e7a88;margin-top:2px;">Round 1</div>' +
            '</div>' +
            '<div style="text-align:center;">' +
              '<div style="font-size:1.5rem;font-weight:900;color:' + (r2 >= 75 ? '#00d48e' : '#ef4444') + ';">' + r2 + '%</div>' +
              '<div style="font-size:0.7rem;color:#6e7a88;margin-top:2px;">Round 2</div>' +
            '</div>' +
          '</div>' +
          '<div class="exam-result-actions">' +
            '<button class="btn primary exam-cta-btn" onclick="window._placementClose()">Continue to Level ' + level + ' &rarr;</button>' +
          '</div>' +
        '</div>' +
      '</div>';

    if (window.AppState) {
      AppState.placementStatus = { status: 'taken', placedAtLevel: level, round1Score: r1, round2Score: r2 };
    }
    if (window.AppState && AppState.sessionToken) {
      google.script.run
        .withSuccessHandler(function(r) { if (r && r.ok) AppState.examStatus = r.exams || []; })
        .withFailureHandler(function() {})
        .apiGetExamStatus(AppState.sessionToken);
    }
  }

  function _placementError(msg) {
    var o = _overlay(); if (!o) return;
    o.innerHTML =
      '<div class="exam-card-overlay exam-error">' +
        '<p style="font-size:1.3rem;margin-bottom:12px;">&#9888;</p>' +
        '<p style="color:#ef4444;margin-bottom:20px;">' + _esc(msg) + '</p>' +
        '<button class="btn secondary" onclick="window._placementClose()">Close</button>' +
      '</div>';
  }

  function _placementClose() { _close(_goHome); }

  window._placementOpen  = _placementOpen;
  window._placementBegin = _placementBegin;
  window._placementPlay  = _placementPlay;
  window._placementNext  = _placementNext;
  window._placementClose = _placementClose;
})();

(function() {
