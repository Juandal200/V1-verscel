      transcript:'Mayday, unruly passenger threatening crew, attempting flight deck access, unable to restrain, diverting, request police on arrival, forty minutes from alternate.' },
    part_2c_3: { voice:'en-AU-Chirp3-HD-Vindemiatrix', lang:'en-AU',
      script:'Tower, Qantas one seven three, windshear alert, going around. Encountered significant windshear on final at five hundred feet, airspeed excursion forty knots. Climbing out, need to hold thirty minutes, advise other traffic of windshear.',
      transcript:'Qantas one seven three, windshear alert going around, windshear at five hundred feet, forty knot airspeed excursion, holding thirty minutes, advise traffic.' }
  };

  var TEA_ORDER = [
    'part_2a_1','part_2a_2','part_2a_3','part_2a_4','part_2a_5','part_2a_6',
    'part_2b_1','part_2b_2','part_2b_3','part_2b_4',
    'part_2c_1','part_2c_2','part_2c_3'
  ];

  var TEA_IMAGES = [
    { id:'image_1', label:'IMAGE 1 — ATC Operations Room',
      desc:'An air traffic control operations room. Controllers seated at radar screens displaying green returns on dark backgrounds. Headsets on, microphones active. Strip holders on desks. A large flight progress board on the far wall. Low lighting. The atmosphere is focused and quiet.' },
    { id:'image_2', label:'IMAGE 2 — Runway Environment',
      desc:'An airport runway seen from the control tower. A commercial aircraft on short final approach, undercarriage extended, full flap, aligned with centreline. Ground vehicles on the apron to the left. Windsock visible indicating crosswind. Threshold markings and PAPI lights visible. Overcast sky.' }
  ];

  // ── State ─────────────────────────────────────────────────────────────────
  var _t = { history:[], audioIdx:0, imageIdx:0, audioCache:{}, audioEl:null, busy:false, timerIv:null };

  function _resetState() {
    _t.history=[]; _t.audioIdx=0; _t.imageIdx=0; _t.audioCache={}; _t.busy=false;
    if (_t.timerIv) clearInterval(_t.timerIv);
    if (_t.audioEl) { _t.audioEl.pause(); _t.audioEl=null; }
  }

  // ── Timer ─────────────────────────────────────────────────────────────────
  function _startTimer() {
    var start = Date.now();
    _t.timerIv = setInterval(function() {
      var el = document.getElementById('teaTimer');
      if (!el) { clearInterval(_t.timerIv); return; }
      var s = Math.floor((Date.now() - start) / 1000);
      var m = Math.floor(s / 60); s = s % 60;
      el.textContent = (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
    }, 1000);
  }

  // ── API ───────────────────────────────────────────────────────────────────
  function _chat(userText, cb) {
    if (userText !== null) _t.history.push({ role:'user', content:userText });
    fetch('/api/tea', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ history: _t.history })
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.ok && d.message) { _t.history.push({ role:'assistant', content:d.message }); cb(null,d.message); }
      else cb(d.error||'API error');
    })
    .catch(function(e){ cb(e.message); });
  }

  function _fetchAudio(id, cb) {
    if (_t.audioCache[id]) { cb(null, _t.audioCache[id]); return; }
    var sc = TEA_AUDIO[id];
    if (!sc) { cb('Unknown: '+id); return; }
    fetch('/api/tea-audio', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text:sc.script, voice:sc.voice, lang:sc.lang, rate:0.93 })
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.ok) { _t.audioCache[id]=d.audioBase64; cb(null,d.audioBase64); }
      else cb(d.error||'Audio error');
    })
    .catch(function(e){ cb(e.message); });
  }

  // ── UI helpers ────────────────────────────────────────────────────────────
  function _scrollChat() { var c=document.getElementById('teaCards'); if(c) c.scrollTop=c.scrollHeight; }

  function _setStatus(text, state) {
    // state: 'thinking' | 'speaking' | 'listening' | 'idle'
    var label = document.getElementById('teaStatusLabel');
    var ring  = document.getElementById('teaRing');
    if (label) label.textContent = text;
    if (ring) {
      ring.className = 'tea-ring';
      if (state) ring.classList.add('tea-ring--' + state);
    }
  }

  // Text bubbles are hidden — only update status display
  function _addMsg(role, text) {
    if (role === 'examiner') _setStatus('Examiner speaking...', 'speaking');
    // No visible text bubbles
  }

  function _showThinking() { _setStatus('Thinking...', 'thinking'); }
  function _removeThinking() { /* status is updated by _addMsg */ }

  function _setEnabled(on) {
    ['teaInput','teaSend','teaMic'].forEach(function(id){
      var el=document.getElementById(id); if(el) el.disabled=!on;
    });
    if (on) _setStatus('Your turn — speak or type', 'listening');
  }

  function _addAudioCard(id) {
    var chat=document.getElementById('teaCards'); if(!chat) return null;
    var wrap=document.createElement('div'); wrap.className='tea-msg examiner';
    var av=document.createElement('div'); av.className='tea-avatar'; av.textContent='EX'; wrap.appendChild(av);
    var card=document.createElement('div'); card.className='tea-audio-card';
    var btn=document.createElement('button'); btn.className='tea-audio-play'; btn.id='teaPlay_'+id;
    btn.innerHTML='&#9654;'; btn.disabled=true; card.appendChild(btn);
    var info=document.createElement('div');
    info.innerHTML='<div class="tea-audio-label">Recording — '+id.replace(/_/g,' ').toUpperCase()+'</div>'+
      '<div class="tea-audio-status" id="teaAudioSt_'+id+'">Loading...</div>';
    card.appendChild(info); wrap.appendChild(card); chat.appendChild(wrap); _scrollChat();
    return btn;
  }

  function _addImageCard(img) {
    var chat=document.getElementById('teaCards'); if(!chat) return;
    var wrap=document.createElement('div'); wrap.className='tea-msg examiner';
    var av=document.createElement('div'); av.className='tea-avatar'; av.textContent='EX'; wrap.appendChild(av);
    var card=document.createElement('div'); card.className='tea-image-card';
    card.innerHTML='<div class="tea-image-card-label">'+img.label+'</div>'+
      '<div class="tea-image-card-desc">'+img.desc+'</div>';
    wrap.appendChild(card); chat.appendChild(wrap); _scrollChat();
  }

  // ── Examiner TTS ──────────────────────────────────────────────────────────
  // Consistent British male voice for the examiner throughout the exam.
  var EXAMINER_VOICE = 'en-GB-Chirp3-HD-Schedar';
  var EXAMINER_LANG  = 'en-GB';

  function _speakExaminer(text, onDone) {
    // Show scoring as text, skip TTS for it
    if (text.indexOf('Pronunciation') !== -1 && text.indexOf('Score') !== -1) {
      var cards = document.getElementById('teaCards');
      if (cards) {
        var box = document.createElement('div');
        box.className = 'tea-score-box';
        box.textContent = text;
        cards.appendChild(box);
        _scrollChat();
      }
      onDone(); return;
    }
    _setStatus('Examiner speaking...', 'speaking');
    fetch('/api/tea-audio', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ text: text, voice: EXAMINER_VOICE, lang: EXAMINER_LANG, rate: 0.95 })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok && d.audioBase64) {
        if (_t.audioEl) _t.audioEl.pause();
        _t.audioEl = new Audio('data:audio/mp3;base64,' + d.audioBase64);
        _t.audioEl.onended = onDone;
        _t.audioEl.onerror = onDone;
        _t.audioEl.play();
      } else {
        onDone();
      }
    })
    .catch(function() { onDone(); });
  }

  // ── Exam flow ──────────────────────────────────────────────────────────────
  function _onExaminerMsg(msg) {
    _removeThinking(); _addMsg('examiner', msg);

    // Speak the examiner's message, then handle logic after audio ends
    _speakExaminer(msg, function() {
      _t.busy = false;
      _setEnabled(true);

      // Audio cue detected — play next scenario recording
      if (msg.indexOf('Please listen to the following recording') !== -1 &&
          _t.audioIdx < TEA_ORDER.length) {
        _setEnabled(false);
        _playItem(TEA_ORDER[_t.audioIdx]);
        return;
      }

      // Part 3 — inject next image if all audio items are done
      if (_t.audioIdx >= TEA_ORDER.length && _t.imageIdx < TEA_IMAGES.length) {
        var img = TEA_IMAGES[_t.imageIdx++];
        _addImageCard(img);
        _sendMsg('[' + img.id.toUpperCase() + ': ' + img.desc + ']');
      }
    });
  }

  function _playItem(id) {
    var sc = TEA_AUDIO[id];
    var btn = _addAudioCard(id);

    _fetchAudio(id, function(err, b64) {
      var st = document.getElementById('teaAudioSt_'+id);
      if (err) {
        if(st) st.textContent='Audio unavailable — proceeding';
        _t.audioIdx++;
        _sendMsg('[AUDIO_COMPLETE: '+id+' | transcript: "'+sc.transcript+'"]');
        return;
      }
      if(btn) btn.disabled=false;
      if(st) st.textContent='Ready — press play';

      btn.onclick = function() {
        if(_t.audioEl) _t.audioEl.pause();
        _t.audioEl = new Audio('data:audio/mp3;base64,'+b64);
        btn.innerHTML='&#9646;&#9646;';
        if(st) st.textContent='Playing...';
        _t.audioEl.onended = function() {
          btn.innerHTML='&#9654;'; if(st) st.textContent='Complete';
          _t.audioIdx++;
          _setEnabled(false);
          _sendMsg('[AUDIO_COMPLETE: '+id+' | transcript: "'+sc.transcript+'"]');
        };
        _t.audioEl.play();
      };
    });

    _sendMsg('[AUDIO_READY: '+id+']');
  }

  function _sendMsg(text) {
    _t.busy=true; _setEnabled(false); _showThinking();
    _chat(text, function(err, msg) {
      if (err) {
        _removeThinking(); _addMsg('system','Error: '+err); _setEnabled(true); _t.busy=false; return;
      }
      _onExaminerMsg(msg);
    });
  }

  function _submit() {
    if (_t.busy) return;
    var ta=document.getElementById('teaInput'); var text=ta?ta.value.trim():'';
    if (!text) return;
    if(ta) ta.value='';
    _addMsg('candidate', text);
    _sendMsg(text);
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function renderTeaExam() {
    if (typeof setActiveNav==='function') setActiveNav('TEA Exam');
    _resetState();
    var content = document.getElementById('contentArea'); if(!content) return;
    content.innerHTML =
      '<div style="display:flex;flex-direction:column;height:calc(100vh - 60px);background:#080c10;">' +
        '<div class="tea-header">' +
          '<div><div class="tea-part-badge">ICAO TEA</div>' +
          '<div class="tea-header-title">Test of English for Aviation</div></div>' +
          '<div class="tea-header-meta">Elapsed&nbsp;<span id="teaTimer" class="tea-timer">00:00</span></div>' +
        '</div>' +

        // Examiner avatar + status
        '<div class="tea-stage">' +
          '<div id="teaRing" class="tea-ring tea-ring--thinking">' +
            '<div class="tea-ring-inner">EX</div>' +
          '</div>' +
          '<div id="teaStatusLabel" class="tea-status-label">Connecting...</div>' +
        '</div>' +

        // Cards area — audio players and image cards only
        '<div id="teaCards" class="tea-cards"></div>' +

        // Input bar
        '<div class="tea-input-bar">' +
          '<button id="teaMic" class="demo-mic-btn" style="flex:0 0 auto;width:auto;padding:10px 16px;margin:0;font-size:1.1rem;" ' +
            'onclick="startMicInput(\'teaInput\',\'teaMic\')">&#127908;</button>' +
          '<textarea id="teaInput" class="tea-textarea" rows="1" ' +
            'placeholder="Speak via mic or type here..."></textarea>' +
          '<button id="teaSend" class="tea-send-btn" onclick="window._teaSubmit()">Send</button>' +
        '</div>' +
      '</div>';

    _startTimer();
    _setEnabled(false);
    _setStatus('Connecting...', 'thinking');

    var ta=document.getElementById('teaInput');
    if(ta) ta.addEventListener('keydown', function(e){
      if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();_submit();}
    });

    _sendMsg('Begin the TEA examination now. Greet the candidate and start Part 1.');
  }

  window.renderTeaExam = renderTeaExam;
  window._teaSubmit    = _submit;

}());
