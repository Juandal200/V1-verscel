<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Factors — AEROCOMMS LMS</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:       #07101e;
    --navy-2:     #0d1b2e;
    --navy-3:     #132240;
    --border:     rgba(255,255,255,0.08);
    --accent:     #00d48e;
    --accent-dim: rgba(0,212,142,0.10);
    --text:       #dde6f0;
    --muted:      #6b8aad;
    --radius:     12px;
    --purple:     #a855f7;
    --purple-dim: rgba(168,85,247,0.10);
  }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
    min-height: 100vh;
    padding: 32px 16px 80px;
  }

  /* ── Header ── */
  .lms-header {
    max-width: 900px; margin: 0 auto 32px;
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 16px; flex-wrap: wrap;
  }
  .lms-eyebrow {
    font-size: 10px; font-weight: 800; letter-spacing: 2px;
    text-transform: uppercase; color: var(--purple); opacity: 0.9; margin-bottom: 4px;
  }
  .lms-title   { font-size: 22px; font-weight: 700; color: #f0f6ff; letter-spacing: -0.3px; }
  .lms-subtitle { font-size: 13px; color: var(--muted); margin-top: 3px; }

  .lms-badge {
    display: flex; align-items: center; gap: 8px;
    background: rgba(168,85,247,0.08);
    border: 1px solid rgba(168,85,247,0.2);
    border-radius: 8px; padding: 10px 16px;
    font-size: 12px; color: var(--muted); white-space: nowrap;
  }
  .lms-badge strong { color: var(--purple); font-size: 20px; font-weight: 700; }

  /* ── Instructions ── */
  .instructions {
    max-width: 900px; margin: 0 auto 28px;
    background: rgba(168,85,247,0.06); border: 1px solid rgba(168,85,247,0.18);
    border-radius: var(--radius); padding: 14px 18px;
    font-size: 13px; color: #c4a8e0; line-height: 1.6;
    display: flex; align-items: flex-start; gap: 12px;
  }

  /* ── Search ── */
  .search-wrap {
    max-width: 900px; margin: 0 auto 24px; position: relative;
  }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 14px; color: var(--muted); pointer-events: none;
  }
  .search-input {
    width: 100%; background: var(--navy-2);
    border: 1px solid var(--border); border-radius: 9px;
    padding: 11px 14px 11px 38px;
    font-size: 13px; color: var(--text); outline: none;
    transition: border-color 0.15s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: rgba(168,85,247,0.5); }

  /* ── Concept grid ── */
  .concept-grid {
    max-width: 900px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 12px;
  }

  /* ── Concept card ── */
  .concept-card {
    background: var(--navy-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.18s;
  }
  .concept-card:hover { border-color: rgba(168,85,247,0.3); }
  .concept-card.playing { border-color: var(--purple); box-shadow: 0 0 0 1px rgba(168,85,247,0.4); }

  .concept-main {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
  }

  .concept-index {
    width: 28px; height: 28px; border-radius: 7px;
    background: var(--purple-dim);
    border: 1px solid rgba(168,85,247,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; color: var(--purple);
    flex-shrink: 0;
  }

  .concept-text { flex: 1; min-width: 0; }
  .concept-name {
    font-size: 14px; font-weight: 700; color: #f0f6ff;
    margin-bottom: 3px; line-height: 1.3;
  }
  .concept-desc {
    font-size: 12.5px; color: var(--muted); line-height: 1.55;
  }

  /* ── Play button ── */
  .play-btn {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 7px;
    background: rgba(168,85,247,0.1);
    border: 1px solid rgba(168,85,247,0.25);
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 12px; font-weight: 700; color: var(--purple);
    cursor: pointer; white-space: nowrap;
    transition: background 0.15s, border-color 0.15s, opacity 0.15s;
  }
  .play-btn:hover:not(:disabled) { background: rgba(168,85,247,0.18); border-color: rgba(168,85,247,0.5); }
  .play-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .play-btn.loading  { color: var(--muted); border-color: var(--border); background: rgba(255,255,255,0.04); }
  .play-btn.playing  { color: var(--accent); border-color: rgba(0,212,142,0.4); background: var(--accent-dim); }

  .play-icon { font-size: 14px; line-height: 1; }

  /* Audio waveform bar (visible while playing) */
  .wave-bars {
    display: none;
    align-items: flex-end;
    gap: 2px;
    height: 14px;
  }
  .wave-bars.active { display: flex; }
  .wave-bar {
    width: 3px; border-radius: 2px;
    background: var(--accent);
    animation: wavePulse 0.6s ease-in-out infinite alternate;
  }
  .wave-bar:nth-child(1) { height: 5px;  animation-delay: 0s;    }
  .wave-bar:nth-child(2) { height: 10px; animation-delay: 0.1s;  }
  .wave-bar:nth-child(3) { height: 14px; animation-delay: 0.2s;  }
  .wave-bar:nth-child(4) { height: 8px;  animation-delay: 0.15s; }
  .wave-bar:nth-child(5) { height: 5px;  animation-delay: 0.05s; }
  @keyframes wavePulse {
    from { opacity: 0.4; transform: scaleY(0.5); }
    to   { opacity: 1;   transform: scaleY(1);   }
  }

  /* Progress bar under card while loading */
  .concept-loader {
    height: 2px;
    background: linear-gradient(90deg, var(--purple), var(--accent));
    border-radius: 0 0 var(--radius) var(--radius);
    display: none;
    animation: loaderSlide 1.4s ease-in-out infinite;
  }
  .concept-loader.active { display: block; }
  @keyframes loaderSlide {
    0%   { transform: translateX(-100%); opacity: 0.6; }
    50%  { transform: translateX(0%);    opacity: 1;   }
    100% { transform: translateX(100%);  opacity: 0.6; }
  }

  /* ── Empty / loading state ── */
  .state-msg { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border); border-top-color: var(--purple);
    border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 13px; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a2a3a; border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 22px;
    font-size: 13px; color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transition: transform 0.28s cubic-bezier(.22,1,.36,1), opacity 0.28s;
    opacity: 0; pointer-events: none; z-index: 999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<!-- Header -->
<div class="lms-header">
  <div>
    <div class="lms-eyebrow">AEROCOMMS LMS &mdash; Module 3</div>
    <h1 class="lms-title">Human Factors</h1>
    <p class="lms-subtitle">CRM, TEM and cognitive performance concepts</p>
  </div>
  <div class="lms-badge">
    <div>
      <div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;">Concepts</div>
      <strong id="conceptCount">—</strong>
    </div>
  </div>
</div>

<!-- Instructions -->
<div class="instructions">
  <span style="font-size:16px;flex-shrink:0;">&#129504;</span>
  <span>Review each concept and its description. Click <strong>Play Audio</strong> to hear the concept read aloud via text-to-speech. Use the search bar to filter concepts by keyword.</span>
</div>

<!-- Search -->
<div class="search-wrap">
  <span class="search-icon">&#128269;</span>
  <input class="search-input" id="searchInput" type="text" placeholder="Search concepts…" oninput="filterConcepts()" />
</div>

<!-- Grid -->
<div class="concept-grid" id="conceptGrid">
  <div class="state-msg"><div class="spinner"></div>Loading concepts…</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  var _concepts    = [];   // [{Concept, Description}]
  var _currentAudio = null; // HTMLAudioElement currently playing
  var _playingId    = null; // id of card currently playing

  /* ── Boot ── */
  window.onload = function() {
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(onDataLoaded)
        .withFailureHandler(onLoadError)
        .fetchLMSData('Admin_HumanFactors');
    } else {
      // Dev fallback
      onDataLoaded([
        { Concept: 'Situational Awareness',   Description: 'The ability to perceive, comprehend and project the status of all relevant elements in the environment.' },
        { Concept: 'Crew Resource Management', Description: 'Effective use of all available resources — human, hardware and information — to achieve safe flight operations.' },
        { Concept: 'Threat and Error Management', Description: 'A framework for identifying threats, managing errors and containing undesired aircraft states before they escalate.' },
        { Concept: 'Fixation',                Description: 'Focusing on a single aspect of a situation to the exclusion of other important information.' },
        { Concept: 'Complacency',             Description: 'A state of self-satisfaction that reduces vigilance and the likelihood of detecting hazards or errors.' },
        { Concept: 'Fatigue',                 Description: 'A physiological and mental state resulting from prolonged activity, sleep loss or circadian disruption.' },
        { Concept: 'Communication Breakdown', Description: 'Failure to transmit, receive or interpret information correctly, leading to misunderstanding between crew members.' },
        { Concept: 'Decision Making',         Description: 'The process of identifying and selecting a course of action to resolve a problem or manage a risk.' }
      ]);
    }
  };

  function onDataLoaded(rows) {
    _concepts = (rows || []).filter(function(r) { return r.Concept && r.Description; });
    byId('conceptCount').textContent = _concepts.length;
    if (!_concepts.length) {
      byId('conceptGrid').innerHTML =
        '<div class="empty-state">No data found in <strong>Admin_HumanFactors</strong>. Add Concept/Description rows first.</div>';
      return;
    }
    renderConcepts(_concepts);
  }

  function onLoadError(err) {
    byId('conceptGrid').innerHTML =
      '<div class="state-msg" style="color:#ef4444;">Failed to load: ' + esc(err.message || err) + '</div>';
  }

  /* ── Render ── */
  function renderConcepts(list) {
    if (!list.length) {
      byId('conceptGrid').innerHTML = '<div class="empty-state">No concepts match your search.</div>';
      return;
    }
    byId('conceptGrid').innerHTML = list.map(function(c, i) {
      var idx = _concepts.indexOf(c);
      var id  = 'concept-' + idx;
      return '<div class="concept-card" id="' + id + '">' +
        '<div class="concept-main">' +
          '<div class="concept-index">' + (idx + 1) + '</div>' +
          '<div class="concept-text">' +
            '<div class="concept-name">' + esc(c.Concept) + '</div>' +
            '<div class="concept-desc">' + esc(c.Description) + '</div>' +
          '</div>' +
          '<button class="play-btn" id="btn-' + idx + '" onclick="requestAudio(' + idx + ')">' +
            '<span class="play-icon" id="icon-' + idx + '">&#9654;</span>' +
            '<div class="wave-bars" id="wave-' + idx + '">' +
              '<div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>' +
              '<div class="wave-bar"></div><div class="wave-bar"></div>' +
            '</div>' +
            '<span id="btn-label-' + idx + '">Play</span>' +
          '</button>' +
        '</div>' +
        '<div class="concept-loader" id="loader-' + idx + '"></div>' +
      '</div>';
    }).join('');
  }

  /* ── Search ── */
  function filterConcepts() {
    var q = byId('searchInput').value.trim().toLowerCase();
    if (!q) { renderConcepts(_concepts); return; }
    var filtered = _concepts.filter(function(c) {
      return c.Concept.toLowerCase().indexOf(q) !== -1 ||
             c.Description.toLowerCase().indexOf(q) !== -1;
    });
    renderConcepts(filtered);
  }

  /* ── Audio request ── */
  function requestAudio(idx) {
    var concept = _concepts[idx];
    if (!concept) return;

    // If already playing this one — stop it
    if (_playingId === idx) {
      stopAudio();
      return;
    }

    // Stop any current playback
    stopAudio();

    setLoadingState(idx, true);

    var text = concept.Concept + '. ' + concept.Description;

    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(function(base64Audio) {
          setLoadingState(idx, false);
          if (!base64Audio) { showToast('No audio returned from server.'); return; }
          playAudio(base64Audio, idx);
        })
        .withFailureHandler(function(err) {
          setLoadingState(idx, false);
          showToast('TTS error: ' + (err.message || err));
        })
        .generateTTS(text);
    } else {
      // Dev mode — simulate a short delay then show error gracefully
      setTimeout(function() {
        setLoadingState(idx, false);
        showToast('TTS not available outside the app.');
      }, 800);
    }
  }

  /* ── playAudio — decodes base64 and plays via Web Audio / Audio element ── */
  function playAudio(base64Audio, idx) {
    try {
      // Decode base64 → binary → Blob → Object URL
      var binary  = atob(base64Audio);
      var bytes   = new Uint8Array(binary.length);
      for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      var blob    = new Blob([bytes], { type: 'audio/mpeg' });
      var url     = URL.createObjectURL(blob);

      var audio   = new Audio(url);
      _currentAudio = audio;
      _playingId    = idx;

      setPlayingState(idx, true);

      audio.onended = function() {
        URL.revokeObjectURL(url);
        setPlayingState(idx, false);
        _currentAudio = null;
        _playingId    = null;
      };
      audio.onerror = function() {
        URL.revokeObjectURL(url);
        setPlayingState(idx, false);
        _currentAudio = null;
        _playingId    = null;
        showToast('Audio playback error.');
      };

      audio.play().catch(function(e) {
        setPlayingState(idx, false);
        showToast('Playback blocked. Tap once to enable audio.');
      });

    } catch(e) {
      setPlayingState(idx, false);
      showToast('Could not decode audio: ' + e.message);
    }
  }

  function stopAudio() {
    if (_currentAudio) {
      _currentAudio.pause();
      _currentAudio.currentTime = 0;
      _currentAudio = null;
    }
    if (_playingId !== null) {
      setPlayingState(_playingId, false);
      _playingId = null;
    }
  }

  /* ── UI state helpers ── */
  function setLoadingState(idx, loading) {
    var btn    = byId('btn-'       + idx);
    var loader = byId('loader-'    + idx);
    var icon   = byId('icon-'      + idx);
    var label  = byId('btn-label-' + idx);
    var wave   = byId('wave-'      + idx);

    if (!btn) return;
    if (loading) {
      btn.disabled = true;
      btn.classList.add('loading');
      if (icon)  icon.textContent  = '…';
      if (label) label.textContent = 'Loading';
      if (wave)  wave.classList.remove('active');
      if (loader) loader.classList.add('active');
    } else {
      btn.disabled = false;
      btn.classList.remove('loading');
      if (icon)  icon.innerHTML    = '&#9654;';
      if (label) label.textContent = 'Play';
      if (loader) loader.classList.remove('active');
    }
  }

  function setPlayingState(idx, playing) {
    var btn   = byId('btn-'       + idx);
    var icon  = byId('icon-'      + idx);
    var label = byId('btn-label-' + idx);
    var wave  = byId('wave-'      + idx);
    var card  = byId('concept-'   + idx);

    if (!btn) return;
    if (playing) {
      btn.classList.add('playing');
      btn.classList.remove('loading');
      btn.disabled = false;
      if (icon)  icon.innerHTML    = '&#9646;&#9646;';   // pause icon
      if (label) label.textContent = 'Playing';
      if (wave)  wave.classList.add('active');
      if (card)  card.classList.add('playing');
    } else {
      btn.classList.remove('playing', 'loading');
      btn.disabled = false;
      if (icon)  icon.innerHTML    = '&#9654;';
      if (label) label.textContent = 'Play';
      if (wave)  wave.classList.remove('active');
      if (card)  card.classList.remove('playing');
    }
  }

  /* ── Utilities ── */
  function byId(id)  { return document.getElementById(id); }
  function esc(str)  {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  var _toastTimer = null;
  function showToast(msg) {
    var t = byId('toast');
    t.innerHTML = msg;
    t.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(function() { t.classList.remove('show'); }, 3000);
  }
</script>
</body>
</html>
